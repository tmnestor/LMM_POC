name: unified_vision_processor

# ============================================================================
# CHANNELS - PACKAGE SOURCES
# ============================================================================
channels:
  - pytorch          # PyTorch official channel (CUDA support)
  - nvidia          # NVIDIA packages (CUDA libraries)
  - conda-forge     # Community packages (latest versions)

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
variables:
  KMP_DUPLICATE_LIB_OK: 'TRUE'  # Fix OpenMP library conflicts (MKL/OpenBLAS)

# ============================================================================
# CONDA DEPENDENCIES (System-Level Packages)
# ============================================================================
dependencies:
  # -------------------------------------------------------------------------
  # CORE SYSTEM LIBRARIES
  # -------------------------------------------------------------------------
  - python=3.11.13              # Python interpreter
  - pip=25.1.1                  # Python package manager
  - setuptools=80.9.0           # Python build tools
  - wheel=0.45.1                # Python wheel format
  
  # -------------------------------------------------------------------------
  # MATH AND SCIENTIFIC COMPUTING
  # -------------------------------------------------------------------------
  - mkl=2022.2.1                # Intel Math Kernel Library (optimized BLAS)
  - blas=1.0=mkl               # Basic Linear Algebra Subprograms (MKL backend)
  - libblas=3.9.0              # BLAS library interface
  - libcblas=3.9.0             # C interface to BLAS
  - liblapack=3.9.0            # Linear Algebra PACKage
  - libopenblas=0.3.30         # Open source BLAS (fallback)
  - numpy                       # Will be overridden by pip (see below)
  - scipy=1.16.0               # Scientific computing
  - pandas=2.3.1               # Data analysis and manipulation
  - scikit-learn=1.7.0         # Machine learning library
  - statsmodels=0.14.5         # Statistical modeling
  
  # -------------------------------------------------------------------------
  # DEEP LEARNING FRAMEWORKS
  # -------------------------------------------------------------------------
  - pytorch=2.5.1              # PyTorch deep learning framework
  - pytorch-cuda=12.1          # PyTorch CUDA support
  - pytorch-mutex=1.0=cuda     # Ensures CUDA-enabled PyTorch
  - torchtriton=3.1.0          # Triton GPU kernel compiler
  
  # -------------------------------------------------------------------------
  # CUDA RUNTIME LIBRARIES
  # -------------------------------------------------------------------------
