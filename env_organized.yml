  - cuda-cudart=12.1.105       # CUDA runtime
  - cuda-cupti=12.1.105        # CUDA Profiling Tools Interface
  - cuda-libraries=12.1.0      # CUDA libraries collection
  - cuda-nvrtc=12.1.105        # NVIDIA Runtime Compilation
  - cuda-nvtx=12.1.105         # NVIDIA Tools Extension
  - cuda-opencl=12.9.19        # OpenCL support
  - cuda-runtime=12.1.0        # CUDA runtime environment
  
  # CUDA Library Components
