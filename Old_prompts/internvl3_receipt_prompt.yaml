complete_prompt: 'CRITICAL: Pay extreme attention to EXACT digits and numbers.

  STEP 1: Carefully examine the entire document image.

  STEP 2: Identify the document type and key sections.

  STEP 3: Extract EXACTLY {field_count} fields with PRECISE digit accuracy.


