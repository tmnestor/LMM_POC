# ---------------------------------------------------------------------------
# Conda environment for vLLM 0.11.2 on CUDA 12.4
# ---------------------------------------------------------------------------
# Target stack (all exact pins from the vLLM 0.11.2 wheel METADATA):
#   vLLM        0.11.2
#   torch       2.9.0     \
#   torchvision 0.24.0    |  exact ==  pins; must install together from the
#   torchaudio  2.9.0     /  same CUDA build (cu124) or vLLM will fail to load
#   xformers    0.0.33.post1   (pinned ==, transitive from vLLM)
#   flashinfer  0.5.2          (pinned ==, transitive from vLLM)
#   Python      3.12      (hard requirement — prod runs 3.12; vLLM
#                          supports 3.10–3.13, but the rest of the LMM_POC
#                          codebase targets 3.12 and uses PEP 695 `type`
#                          statements that require 3.12+)
#   CUDA        12.4      (dev machine has 12.4; cu124 wheels also run on
#                          prod's cu128 driver via CUDA forward compatibility)
#
# Why cu124 and not cu128:
#   torchvision==0.24.0 is NOT published on the PyTorch cu128 wheel index
#   (only 0.24.1 is), so the vLLM exact-pin contract can only be satisfied
#   from cu124. This is verified — the cu128 index's torchvision listing is
#   0.17.2, 0.18.1, 0.20.1, 0.22.0, 0.23.0, 0.24.1, 0.25.0 — no 0.24.0.
#   Plain PyPI serves the cu124 build of torch 2.9.0 by default, so no
#   extra index is required (and none is specified below).
#
# Why pip, not conda, for torch:
#   vLLM's custom CUDA kernels are built against the ABI of the pip torch
#   wheels. Conda-forge torch drifts from that ABI and causes
#   `undefined symbol` / `no kernel image available` errors at first
#   inference. Only Python and pip come from conda.
#
# Flash-Attention:
#   Deliberately NOT installed — the prod environment does not permit it.
#   vLLM will use xformers (a hard transitive dep) as the attention backend.
#   Set VLLM_ATTENTION_BACKEND=XFORMERS before running `vllm serve`.
#
# Every other vLLM dependency (fastapi, uvicorn, pydantic, openai, ray,
# transformers, tokenizers, outlines, xgrammar, prometheus_client, aiohttp,
# httpx, partial-json-parser, jsonschema, sentencepiece, numpy, protobuf,
# msgspec, pyzmq, pillow, mistral_common, nvidia-ml-py, ...) is resolved
# transitively from `vllm==0.11.2` and does not need to be listed here.
#
# Usage on the dev machine:
#   conda env create -f vllm-0.11.2-cu124.yml
#   conda activate vllm-0.11.2
#   pip freeze > vllm-0.11.2-frozen-requirements.txt   # <-- give this to
#                                                      #     data engineering
#
# Verify:
#   python -c "
#   import vllm, torch, torchvision, torchaudio, xformers, flashinfer
#   print('vllm       ', vllm.__version__)
#   print('torch      ', torch.__version__, 'cuda', torch.version.cuda)
#   print('torchvision', torchvision.__version__)
#   print('torchaudio ', torchaudio.__version__)
#   print('xformers   ', xformers.__version__)
#   print('flashinfer ', flashinfer.__version__)
#   from vllm import _custom_ops
#   print('custom ops loaded OK')
#   print('devices:', torch.cuda.device_count())
#   "
# ---------------------------------------------------------------------------
 
name: vllm-0.11.2
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip>=24.0
 
  - pip:
      # Torch family — installed from plain PyPI. PyPI's default torch 2.9.0
      # wheel IS a cu124 build, so all three resolve to the correct CUDA
      # variant without any custom index. Do not add --index-url here; data
      # engineering policy forbids extra indexes.
      - torch==2.9.0
      - torchvision==0.24.0
      - torchaudio==2.9.0
 
      # vLLM and its two most version-sensitive hard deps. Listed explicitly
      # (even though transitive) so an accidental later `pip install --upgrade`
      # of xformers or flashinfer-python cannot silently break vLLM.
      - vllm==0.11.2
      - xformers==0.0.33.post1
      - flashinfer-python==0.5.2
 
# Environment variables automatically exported on `conda activate` and
# unset on `conda deactivate`. Pins vLLM's attention backend to xformers
# so it never tries to import flash-attn (which is unavailable on prod).
variables:
  VLLM_ATTENTION_BACKEND: XFORMERS