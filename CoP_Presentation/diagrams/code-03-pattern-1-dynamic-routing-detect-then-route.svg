<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="586.0" height="216"
     viewBox="0 0 586.0 216">

  <!-- Background -->
  <rect width="586.0" height="216"
        rx="10" ry="10"
        fill="#282a36" />

  <!-- Title bar -->
  <rect y="0" width="586.0" height="32"
        rx="10" ry="10"
        fill="#44475a" />
  <!-- Square off bottom corners of title bar -->
  <rect y="22"
        width="586.0" height="10"
        fill="#44475a" />

  <!-- Title text -->
  <text x="20" y="21"
        font-family="monospace" font-size="14px"
        fill="#f8f8f2">pattern_1_dynamic_ro.txt</text>

  <!-- Code -->
  <g font-family="monospace" font-size="14px">
    <ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="62" xml:space="preserve"><ns0:tspan fill="#f8f8f2">What type of business document is this?</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="81" xml:space="preserve"><ns0:tspan fill="#f8f8f2" /></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="100" xml:space="preserve"><ns0:tspan fill="#f8f8f2">Answer with one of:</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="119" xml:space="preserve"><ns0:tspan fill="#f8f8f2">- INVOICE (includes bills, quotes, estimates)</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="138" xml:space="preserve"><ns0:tspan fill="#f8f8f2">- RECEIPT (includes purchase receipts)</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="157" xml:space="preserve"><ns0:tspan fill="#f8f8f2">- BANK_STATEMENT (includes credit card statements)</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="176" xml:space="preserve"><ns0:tspan fill="#f8f8f2">- TRAVEL_EXPENSE (includes boarding passes, airline tickets)</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="195" xml:space="preserve"><ns0:tspan fill="#f8f8f2">- VEHICLE_LOGBOOK (includes motor vehicle logbooks, mileage logs)</ns0:tspan></ns0:text>
<ns0:text xmlns:ns0="http://www.w3.org/2000/svg" x="20" y="214" xml:space="preserve"><ns0:tspan fill="#f8f8f2" /></ns0:text>
  </g>
</svg>