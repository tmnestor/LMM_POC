# Llama Single-Pass Prompt - Original approach that achieved ~84% accuracy
# This prompt asks for all 25 fields at once in a single request

single_pass:
  expertise_frame: "Extract key-value data from this business document image"
  
  critical_instructions:
    - "Output ONLY the structured data below"
    - "Do NOT include any conversation text" 
    - "Do NOT repeat the user's request"
    - "Do NOT include <image> tokens"
    - "Start immediately with ABN"
    - "Stop immediately after DESCRIPTIONS"
  
  output_format: "REQUIRED OUTPUT FORMAT - EXACTLY 25 LINES"
  
  # All 25 fields in order with their instructions
  field_instructions:
    ABN: "[11-digit Australian Business Number or NOT_FOUND]"
    ACCOUNT_HOLDER: "[account holder name or NOT_FOUND]"
    BANK_ACCOUNT_NUMBER: "[account number or NOT_FOUND]"
    BANK_NAME: "[bank name (NOT supplier name) or NOT_FOUND]"
    BSB_NUMBER: "[6-digit BSB (NOT ABN) or NOT_FOUND]"
    BUSINESS_ADDRESS: "[business address or NOT_FOUND]"
    BUSINESS_PHONE: "[business phone number or NOT_FOUND]"
    CLOSING_BALANCE: "[closing balance with 2 decimals (NOT total) from bank statements or NOT_FOUND]"
    DESCRIPTIONS: "[list of transaction descriptions or NOT_FOUND]"
    DOCUMENT_TYPE: "[document type (invoice/receipt/statement) or NOT_FOUND]"
    DUE_DATE: "[payment due date or NOT_FOUND]"
    GST: "[GST amount in dollars with 2 decimals (e.g. $5.33) or NOT_FOUND]"
    INVOICE_DATE: "[invoice date or NOT_FOUND]"
    OPENING_BALANCE: "[opening balance with 2 decimals from bank statements or NOT_FOUND]"
    PAYER_ADDRESS: "[payer address or NOT_FOUND]"
    PAYER_EMAIL: "[payer email address or NOT_FOUND]"
    PAYER_NAME: "[payer name or NOT_FOUND]"
    PAYER_PHONE: "[payer phone number or NOT_FOUND]"
    PRICES: "[individual prices in dollars or NOT_FOUND]"
    QUANTITIES: "[list of quantities or NOT_FOUND]"
    STATEMENT_PERIOD: "[statement period or NOT_FOUND]"
    SUBTOTAL: "[subtotal amount in dollars with 2 decimals (e.g. $53.29) or NOT_FOUND]"
    SUPPLIER: "[supplier name or NOT_FOUND]"
    SUPPLIER_WEBSITE: "[supplier website or NOT_FOUND]"
    TOTAL: "[total amount in dollars with 2 decimals (e.g. $58.62) or NOT_FOUND]"

  format_rules:
    - "Use exactly: KEY: value (colon and space)"
    - "NEVER use: **KEY:** or **KEY** or *KEY* or any formatting"
    - "Plain text only - NO markdown, NO bold, NO italic"
    - "Include ALL 25 keys even if value is NOT_FOUND"
    - "Output ONLY these 25 lines, nothing else"

  stop_instruction: "STOP after DESCRIPTIONS line. Do not add explanations or comments."

# Notes:
# - This single-pass approach was preferred by Llama over grouped strategies
# - Simpler, more direct than complex 6-group cognitive load management
# - May avoid markdown formatting issues seen in grouped approach
# - Original performance: ~84% accuracy (better than current 79.6% with groups)