# On V100 Production Machine:
git checkout main  
git pull origin main
python internvl3_keyvalue.py --extraction-mode detailed_grouped --limit-images 1 --debug

Alternative (if branch doesn't exist locally yet)

# Fetch and checkout in one command
git fetch origin refactor/yaml-single-source-of-truth:refactor/yaml-single-source-of-truth
git checkout refactor/yaml-single-source-of-truth

Key Points:
- git fetch origin downloads all new branches without switching
- git checkout refactor/yaml-single-source-of-truth switches to the branch
- git branch --show-current confirms you're on the right branch
- Both machines will need the same commands since they're pulling from the same remote repository

This ensures all three machines (Mac M1, H200, V100) are synchronized on the new branch for the migration work.