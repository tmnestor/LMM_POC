# ============================================================================
# MERGING BACK TO MAIN - PHASE 4 COMPLETE
# ============================================================================

# 1. Ensure your feature branch is up to date with main
git checkout refactor/yaml-single-source-of-truth
git fetch origin
git merge origin/main  # Resolve any conflicts if they exist

# 2. Run final validation tests
python test_phase4_migration.py  # Ensure all tests pass
ruff check *.py models/*.py common/*.py  # Ensure code quality

# 3. Switch to main branch
git checkout main
git pull origin main  # Get latest changes

# 4. Merge the feature branch into main
git merge refactor/yaml-single-source-of-truth --no-ff -m "feat: complete YAML single source of truth migration (Phase 4)

- Implemented schema-driven dynamic prompt generation
- Replaced hardcoded YAML prompt files with template system  
- Added field interdependency validation framework
- Configured multiple grouping strategies (field_grouped, detailed_grouped)
- Exposed grouping strategies directly in CLI
- Removed editorial messages from reporting
- Added comprehensive business logic validation system

BREAKING CHANGE: CLI now uses --extraction-mode with explicit strategies instead of generic 'grouped' mode"

# 5. Push the merged changes to remote
git push origin main

# 6. Optional: Delete the feature branch locally and remotely
git branch -d refactor/yaml-single-source-of-truth  # Delete local branch
git push origin --delete refactor/yaml-single-source-of-truth  # Delete remote branch

# 7. Tag the release (optional but recommended)
git tag -a v2.0.0 -m "Release v2.0.0 - YAML Single Source of Truth Migration Complete"
git push origin v2.0.0

