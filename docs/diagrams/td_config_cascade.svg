878906)" style="" class="label"><rect/><g><rect style="stroke: none" class="background"/><text style="" y="-10.1"><tspan dy="1.1em" y="-0.1em" x="0" class="text-outer-tspan"><tspan font-weight="normal" class="text-inner-tspan" font-style="normal">Dataclass</tspan><tspan font-weight="normal" class="text-inner-tspan" font-style="normal"> defaults</tspan></tspan><tspan dy="1.1em" y="1em" x="0" class="text-outer-tspan"><tspan font-weight="normal" class="text-inner-tspan" font-style="normal">(lowest</tspan><tspan font-weight="normal" class="text-inner-tspan" font-style="normal"> priority)</tspan></tspan></text></g></g></g></g></g></g><style>/* Presentation-quality overrides: thick lines, large text */

/* Force all strokes thicker via SVG attribute selectors */
.edge-thickness-normal { stroke-width: 3px !important; }
.edge-thickness-thick { stroke-width: 5px !important; }
.flowchart-link { stroke-width: 3px !important; }
.edgePath .path { stroke-width: 3px !important; }

.marker { stroke-width:3.5px !important; }
