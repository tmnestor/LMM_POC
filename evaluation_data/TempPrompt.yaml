      ## DATE-GROUPED BANK STATEMENT STRUCTURE:

      This statement uses DATE SECTION HEADERS that group multiple transactions:

      **Example**

      Date 1
          Description1 | Debit1 |         | Balance1
          Description2 |        | Credit2 | Balance2

      Date 2
          Description3 | Debit3 |          | Balance3

      Date 3
          Description4 |        | Credit4 | Balance4
          Description5 | Debit5 |         | Balance5
          Description6 | Debit6 |         | Balance6

      **Example above would be extracted as:**
      
      | Date   | Description  | Debit  | Credit  | Balance |
      | --- | --- | --- | --- | --- |
      | Date 1 | Description1 | Debit1 |         | Balance1 |
      | Date 1 | Description2 |        | Credit2 | Balance2 |
      | Date 2 | Description3 | Debit3 |         | Balance3 |
      | Date 3 | Description4 |        | Credit4 | Balance4 |
      | Date 3 | Description5 | Debit5 |         | Balance5 |
      | Date 3 | Description6 | Debit6 |         | Balance6 |

      **Critical Extraction Rules:**
      1. **Date Headers** appear as standalone lines (no amounts)
      2. **CHRONOLOGICAL Date ORDER MUST BE MAINTAINED**
      2. **Transaction Rows** appear indented under each date header
      3. **Debit Credit** Transaction Rows  have either a Debit or a Credit - never both
      4. **Multiple transactions** can share the same date header
      5. **Repeat Dates**: Use the date header for ALL transactions beneath it
      6. **Each transaction row** has its own Balance value (rightmost column)
      7. **Balance values** always end with " CR" suffix
      8. **Maintain Date Order**: The extracted table must strictly maintain date order
      9. **Row Count* The number of table rows must equal the number of Balance Values

