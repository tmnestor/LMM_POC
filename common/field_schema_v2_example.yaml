# Document Type Specific Field Schema - Version 2.0 Example
# This demonstrates the proposed hierarchical schema structure
# Supporting different extraction fields based on document type

schema_version: "2.0"
extraction_mode: "document_type_specific"  # Options: "document_type_specific" or "unified"

# ============================================================================
# COMMON FIELDS - Shared across multiple document types
# ============================================================================
common_fields:
  business_identity:
    - name: "DOCUMENT_TYPE"
      type: "text"
      evaluation_logic: "exact_match"
      group: "metadata"
      description: "Type of business document"
      instruction: "[document type (invoice/receipt/bank_statement) or NOT_FOUND]"
      
    - name: "BUSINESS_ABN"
      type: "numeric_id"
      evaluation_logic: "exact_numeric_match"
      group: "critical"
      description: "11-digit Australian Business Number"
      instruction: "[11-digit Australian Business Number or NOT_FOUND]"
      
    - name: "SUPPLIER_NAME"
      type: "text"
      evaluation_logic: "fuzzy_text_match"
      group: "business_entity"
      description: "Business/supplier name"
      instruction: "[business/supplier name or NOT_FOUND]"

  contact_details:
    - name: "BUSINESS_ADDRESS"
      type: "text"
      evaluation_logic: "fuzzy_text_match"
      group: "business_entity"
      description: "Business address"
      instruction: "[business address or NOT_FOUND]"
      
    - name: "BUSINESS_PHONE"
      type: "text"
      evaluation_logic: "fuzzy_text_match"
      group: "business_entity"
      description: "Business phone number"
      instruction: "[business phone number or NOT_FOUND]"

  monetary_common:
    - name: "TOTAL_AMOUNT"
      type: "monetary"
      evaluation_logic: "monetary_with_tolerance"
      group: "critical"
      description: "Total amount in dollars"
      instruction: "[total amount in dollars with 2 decimals or NOT_FOUND]"

# ============================================================================
# DOCUMENT TYPE: INVOICE
# ============================================================================
document_schemas:
  invoice:
    metadata:
      document_type_values: ["invoice", "tax invoice", "bill", "sales invoice"]
      total_fields: 18
      description: "Sales invoice or bill for goods/services"
      
    inherits:
      - "common_fields.business_identity"
      - "common_fields.contact_details"
      - "common_fields.monetary_common"
      
    specific_fields:
      identification:
        - name: "INVOICE_NUMBER"
          type: "text"
          evaluation_logic: "exact_match"
          group: "metadata"
          description: "Invoice reference number"
          instruction: "[invoice number/reference or NOT_FOUND]"
          
      customer_info:
        - name: "PAYER_NAME"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "payer_info"
          description: "Customer/payer name"
          instruction: "[customer/payer name or NOT_FOUND]"
          
        - name: "PAYER_ADDRESS"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "payer_info"
          description: "Customer address"
          instruction: "[customer address or NOT_FOUND]"
          
      dates:
        - name: "INVOICE_DATE"
          type: "date"
          evaluation_logic: "flexible_date_match"
          group: "dates"
          description: "Invoice issue date"
          instruction: "[invoice date or NOT_FOUND]"
          
        - name: "DUE_DATE"
          type: "date"
          evaluation_logic: "flexible_date_match"
          group: "dates"
          description: "Payment due date"
          instruction: "[payment due date or NOT_FOUND]"
          
      line_items:
        - name: "LINE_ITEM_DESCRIPTIONS"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Product/service descriptions"
          instruction: "[comma-separated list of items or NOT_FOUND]"
          
        - name: "LINE_ITEM_QUANTITIES"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Quantities ordered"
          instruction: "[comma-separated quantities or NOT_FOUND]"
          
        - name: "LINE_ITEM_PRICES"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Unit prices"
          instruction: "[comma-separated unit prices or NOT_FOUND]"
          
      financial:
        - name: "SUBTOTAL_AMOUNT"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Subtotal before tax"
          instruction: "[subtotal amount or NOT_FOUND]"
          
        - name: "GST_AMOUNT"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "GST/tax amount"
          instruction: "[GST amount or NOT_FOUND]"
          
    validation_rules:
      - rule: "subtotal_gst_total"
        type: "mathematical"
        formula: "SUBTOTAL_AMOUNT + GST_AMOUNT = TOTAL_AMOUNT"
        tolerance: 0.02
        
      - rule: "line_item_consistency"
        type: "list_length_match"
        fields: ["LINE_ITEM_DESCRIPTIONS", "LINE_ITEM_QUANTITIES", "LINE_ITEM_PRICES"]
        
      - rule: "date_sequence"
        type: "temporal"
        check: "DUE_DATE >= INVOICE_DATE"

# ============================================================================
# DOCUMENT TYPE: BANK STATEMENT
# ============================================================================
  bank_statement:
    metadata:
      document_type_values: ["bank statement", "account statement", "statement of account"]
      total_fields: 15
      description: "Bank account statement showing transactions"
      
    inherits:
      - "common_fields.business_identity"  # For bank's ABN if present
      
    specific_fields:
      banking_info:
        - name: "BANK_NAME"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "banking"
          description: "Financial institution name"
          instruction: "[bank name or NOT_FOUND]"
          
        - name: "BANK_BSB_NUMBER"
          type: "numeric_id"
          evaluation_logic: "exact_numeric_match"
          group: "banking"
          description: "6-digit BSB"
          instruction: "[6-digit BSB number or NOT_FOUND]"
          
        - name: "BANK_ACCOUNT_NUMBER"
          type: "numeric_id"
          evaluation_logic: "exact_numeric_match"
          group: "banking"
          description: "Account number"
          instruction: "[account number or NOT_FOUND]"
          
        - name: "ACCOUNT_HOLDER"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "banking"
          description: "Account holder name"
          instruction: "[account holder name or NOT_FOUND]"
          
      period:
        - name: "STATEMENT_DATE_RANGE"
          type: "date_range"
          evaluation_logic: "flexible_date_match"
          group: "dates"
          description: "Statement period"
          instruction: "[statement period (e.g., May 2025) or NOT_FOUND]"
          
      balances:
        - name: "OPENING_BALANCE"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Starting balance"
          instruction: "[opening balance or NOT_FOUND]"
          
        - name: "CLOSING_BALANCE"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Ending balance"
          instruction: "[closing balance or NOT_FOUND]"
          
        - name: "TOTAL_CREDITS"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Total deposits/credits"
          instruction: "[total credits or NOT_FOUND]"
          
        - name: "TOTAL_DEBITS"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Total withdrawals/debits"
          instruction: "[total debits or NOT_FOUND]"
          
      transactions:
        - name: "TRANSACTION_DESCRIPTIONS"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "transactions"
          description: "Transaction descriptions"
          instruction: "[comma-separated transaction descriptions or NOT_FOUND]"
          
        - name: "TRANSACTION_AMOUNTS"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "transactions"
          description: "Transaction amounts"
          instruction: "[comma-separated amounts or NOT_FOUND]"
          
        - name: "TRANSACTION_DATES"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "transactions"
          description: "Transaction dates"
          instruction: "[comma-separated dates or NOT_FOUND]"
          
    validation_rules:
      - rule: "balance_calculation"
        type: "mathematical"
        formula: "OPENING_BALANCE + TOTAL_CREDITS - TOTAL_DEBITS = CLOSING_BALANCE"
        tolerance: 0.02
        
      - rule: "transaction_consistency"
        type: "list_length_match"
        fields: ["TRANSACTION_DESCRIPTIONS", "TRANSACTION_AMOUNTS", "TRANSACTION_DATES"]

# ============================================================================
# DOCUMENT TYPE: RECEIPT
# ============================================================================
  receipt:
    metadata:
      document_type_values: ["receipt", "purchase receipt", "payment receipt", "sales receipt"]
      total_fields: 12
      description: "Proof of purchase or payment"
      
    inherits:
      - "common_fields.business_identity"
      - "common_fields.monetary_common"
      
    specific_fields:
      identification:
        - name: "RECEIPT_NUMBER"
          type: "text"
          evaluation_logic: "exact_match"
          group: "metadata"
          description: "Receipt reference number"
          instruction: "[receipt number or NOT_FOUND]"
          
        - name: "STORE_LOCATION"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "business_entity"
          description: "Store/branch location"
          instruction: "[store location or NOT_FOUND]"
          
      transaction_info:
        - name: "TRANSACTION_DATE"
          type: "date"
          evaluation_logic: "flexible_date_match"
          group: "dates"
          description: "Date of purchase"
          instruction: "[transaction date or NOT_FOUND]"
          
        - name: "TRANSACTION_TIME"
          type: "time"
          evaluation_logic: "exact_match"
          group: "dates"
          description: "Time of purchase"
          instruction: "[transaction time or NOT_FOUND]"
          
        - name: "PAYMENT_METHOD"
          type: "text"
          evaluation_logic: "fuzzy_text_match"
          group: "payment"
          description: "Payment type (cash/card/etc)"
          instruction: "[payment method or NOT_FOUND]"
          
        - name: "CARD_LAST_DIGITS"
          type: "text"
          evaluation_logic: "exact_match"
          group: "payment"
          description: "Last 4 digits if card payment"
          instruction: "[last 4 card digits or NOT_FOUND]"
          
      items:
        - name: "LINE_ITEM_DESCRIPTIONS"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Items purchased"
          instruction: "[comma-separated items or NOT_FOUND]"
          
        - name: "LINE_ITEM_QUANTITIES"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Quantities"
          instruction: "[comma-separated quantities or NOT_FOUND]"
          
        - name: "LINE_ITEM_PRICES"
          type: "list"
          evaluation_logic: "list_overlap_match"
          group: "item_details"
          description: "Prices"
          instruction: "[comma-separated prices or NOT_FOUND]"
          
      totals:
        - name: "SUBTOTAL_AMOUNT"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "Subtotal"
          instruction: "[subtotal or NOT_FOUND]"
          
        - name: "GST_AMOUNT"
          type: "monetary"
          evaluation_logic: "monetary_with_tolerance"
          group: "monetary"
          description: "GST amount"
          instruction: "[GST or NOT_FOUND]"
          
    validation_rules:
      - rule: "subtotal_gst_total"
        type: "mathematical"
        formula: "SUBTOTAL_AMOUNT + GST_AMOUNT = TOTAL_AMOUNT"
        tolerance: 0.02
        
      - rule: "item_consistency"
        type: "list_length_match"
        fields: ["LINE_ITEM_DESCRIPTIONS", "LINE_ITEM_QUANTITIES", "LINE_ITEM_PRICES"]

# ============================================================================
# PROCESSING CONFIGURATION
# ============================================================================
processing_config:
  document_detection:
    method: "two_pass"  # Options: "two_pass", "single_pass_with_detection"
    detection_prompt: |
      Identify the document type of this image.
      Options: invoice, bank_statement, receipt
      Output only the document type, nothing else.
    confidence_threshold: 0.85
    fallback_to_unified: true
    
  extraction_strategy:
    max_retries: 2
    temperature: 0.0
    optimization_level: "aggressive"  # Fewer fields = more aggressive optimization
    
# ============================================================================
# MODEL-SPECIFIC CONFIGURATIONS
# ============================================================================
model_configs:
  llama:
    document_detection:
      max_tokens: 50
      system_prompt: "You are a document classifier. Output only: invoice, bank_statement, or receipt."
      
    extraction:
      invoice:
        opening: "Extract invoice information from this image."
        focus: "Focus on invoice number, dates, customer details, line items, and amounts."
        
      bank_statement:
        opening: "Extract bank statement information from this image."
        focus: "Focus on account details, statement period, balances, and transactions."
        
      receipt:
        opening: "Extract receipt information from this image."
        focus: "Focus on store details, transaction info, items purchased, and payment details."
        
  internvl3:
    document_detection:
      max_tokens: 20
      prompt: "Document type: invoice, bank_statement, or receipt?"
      
    extraction:
      invoice:
        prompt: "Extract invoice fields: {field_list}"
        
      bank_statement:
        prompt: "Extract bank statement fields: {field_list}"
        
      receipt:
        prompt: "Extract receipt fields: {field_list}"

# ============================================================================
# MIGRATION CONFIGURATION
# ============================================================================
migration:
  backward_compatibility: true
  unified_schema_fallback: "field_schema.yaml"
  feature_flags:
    enable_document_detection: true
    enable_type_specific_extraction: true
    enable_validation_rules: true
    log_comparison_metrics: true