# Document Type Specific Field Schema - Version 2.0
# Hierarchical schema supporting targeted extraction based on document type
# Maintains backward compatibility with unified approach

schema_version: "2.0"
extraction_mode: "document_type_specific"  # Options: "document_type_specific" or "unified"
created_from_git_hash: "4b866e0f3dca8e298d47290b5bbce1d803dc3297"

# ============================================================================
# COMMON FIELDS - Shared across multiple document types
# ============================================================================
common_fields:
  - name: "DOCUMENT_TYPE"
    type: "text"
    evaluation_logic: "exact_match"
    group: "metadata"
    description: "Type of business document"
    instruction: "[document type (invoice/receipt/bank_statement) or NOT_FOUND]"
    ato_note: "Must be labeled as 'Tax Invoice' for ATO compliance when applicable"
    
  - name: "BUSINESS_ABN"
    type: "numeric_id"
    evaluation_logic: "exact_numeric_match"
    group: "critical"
    description: "11-digit Australian Business Number (ATO mandatory)"
    instruction: "[11-digit Australian Business Number or NOT_FOUND]"
    ato_requirement: "mandatory"
    ato_note: "Required on all Australian tax invoices - seller's ABN"
    
  - name: "SUPPLIER_NAME"
    type: "text"
    evaluation_logic: "fuzzy_text_match"
    group: "business_entity"
    description: "Business/supplier name (seller's identity)"
    instruction: "[business/supplier name or NOT_FOUND]"
    ato_requirement: "mandatory"
    ato_note: "Seller's identity - required on all tax invoices"

  - name: "BUSINESS_ADDRESS"
    type: "text"
    evaluation_logic: "fuzzy_text_match"
    group: "business_entity"
    description: "Business address"
    instruction: "[business address or NOT_FOUND]"
    
  - name: "BUSINESS_PHONE"
    type: "text"
    evaluation_logic: "fuzzy_text_match"
    group: "business_entity"
    description: "Business phone number"
    instruction: "[business phone number or NOT_FOUND]"

  - name: "TOTAL_AMOUNT"
    type: "monetary"
    evaluation_logic: "monetary_with_tolerance"
    group: "critical"
    description: "Total amount in dollars"
    instruction: "[total amount in dollars with 2 decimals or NOT_FOUND]"

# ============================================================================
# DOCUMENT TYPE SCHEMAS
# ============================================================================
document_schemas:
  
  # ========================================
  # INVOICE SCHEMA (20 fields) - ATO TAX INVOICE COMPLIANT
  # ========================================
  invoice:
    metadata:
      document_type_values: ["invoice", "tax invoice", "bill", "sales invoice", "tax inv", "invoice/tax invoice"]
      total_fields: 20
      description: "Australian Tax Office compliant tax invoice"
      efficiency_gain: "20% fewer fields than unified (25→20)"
      compliance: "ATO Tax Invoice Requirements"
      ato_reference: "https://www.ato.gov.au/businesses-and-organisations/gst-excise-and-indirect-taxes/gst/tax-invoices"
      
    inherits_common: true
    
    specific_fields:
      - name: "INVOICE_NUMBER"
        type: "text"
        evaluation_logic: "exact_match"
        group: "metadata"
        description: "Invoice reference number (ATO required)"
        instruction: "[invoice number/reference or NOT_FOUND]"
        ato_requirement: "mandatory"
        ato_note: "Required for all tax invoices"
        
      - name: "PAYER_NAME"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer/payer name or identity"
        instruction: "[customer/payer name/identity or NOT_FOUND]"
        ato_requirement: "conditional"
        ato_note: "Required for sales of $1,000 or more (buyer's identity)"
        
      - name: "PAYER_ABN"
        type: "numeric_id"
        evaluation_logic: "exact_numeric_match"
        group: "payer_info"
        description: "11-digit customer/buyer Australian Business Number"
        instruction: "[11-digit customer/buyer ABN or NOT_FOUND]"
        ato_requirement: "conditional"
        ato_note: "Alternative to PAYER_NAME for sales of $1,000 or more (buyer's ABN)"
        
      - name: "PAYER_ADDRESS"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer address"
        instruction: "[customer address or NOT_FOUND]"
        
      - name: "PAYER_PHONE"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer phone number"
        instruction: "[customer phone number or NOT_FOUND]"
        
      - name: "PAYER_EMAIL"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer email address"
        instruction: "[customer email address or NOT_FOUND]"
        
      - name: "INVOICE_DATE"
        type: "date"
        evaluation_logic: "flexible_date_match"
        group: "dates"
        description: "Invoice issue date (ATO required)"
        instruction: "[invoice date or NOT_FOUND]"
        ato_requirement: "mandatory"
        ato_note: "Date when invoice is issued - required for all tax invoices"
        
      - name: "DUE_DATE"
        type: "date"
        evaluation_logic: "flexible_date_match"
        group: "dates"
        description: "Payment due date"
        instruction: "[payment due date or NOT_FOUND]"
        
      - name: "LINE_ITEM_DESCRIPTIONS"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Brief description of items sold (ATO required)"
        instruction: "[comma-separated list of items or NOT_FOUND]"
        ato_requirement: "mandatory"
        ato_note: "Brief description of items/services including quantity and price"
        
      - name: "LINE_ITEM_QUANTITIES"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Quantities ordered"
        instruction: "[comma-separated quantities or NOT_FOUND]"
        
      - name: "LINE_ITEM_PRICES"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Unit prices"
        instruction: "[comma-separated unit prices or NOT_FOUND]"
        
      - name: "SUBTOTAL_AMOUNT"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Subtotal before tax"
        instruction: "[subtotal amount in dollars with 2 decimals or NOT_FOUND]"
        
      - name: "GST_AMOUNT"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "GST amount (ATO required)"
        instruction: "[GST amount in dollars with 2 decimals, or 'Total price includes GST' statement, or NOT_FOUND]"
        ato_requirement: "mandatory"
        ato_note: "Must show GST separately or state 'Total price includes GST' if GST is exactly 1/11 of total. For sales of $1,000 or more must show GST per line item."
        
      - name: "SUPPLIER_WEBSITE"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "business_entity"
        description: "Supplier website"
        instruction: "[supplier website or NOT_FOUND]"
    
    excluded_fields:
      # Bank statement only
      - "BANK_NAME"
      - "BANK_BSB_NUMBER"
      - "BANK_ACCOUNT_NUMBER"
      - "BANK_ACCOUNT_HOLDER"
      - "ACCOUNT_OPENING_BALANCE"
      - "ACCOUNT_CLOSING_BALANCE"
      - "STATEMENT_DATE_RANGE"
      
    validation_rules:
      - name: "financial_consistency"
        description: "SUBTOTAL + GST should equal TOTAL"
        fields: ["SUBTOTAL_AMOUNT", "GST_AMOUNT", "TOTAL_AMOUNT"]
        rule_type: "mathematical"
        formula: "SUBTOTAL_AMOUNT + GST_AMOUNT = TOTAL_AMOUNT"
        tolerance: 0.02
        
      - name: "line_item_consistency"
        description: "Line item fields should have same count"
        fields: ["LINE_ITEM_DESCRIPTIONS", "LINE_ITEM_QUANTITIES", "LINE_ITEM_PRICES"]
        rule_type: "count_match"
        
      - name: "date_sequence"
        description: "Due date should be after invoice date"
        fields: ["INVOICE_DATE", "DUE_DATE"]
        rule_type: "temporal_sequence"
        
      - name: "ato_mandatory_fields"
        description: "ATO required fields must be present"
        fields: ["DOCUMENT_TYPE", "BUSINESS_NAME", "BUSINESS_ABN", "INVOICE_DATE", "LINE_ITEM_DESCRIPTIONS", "GST_AMOUNT"]
        rule_type: "mandatory_presence"
        ato_compliance: true
        
      - name: "ato_gst_calculation"
        description: "GST should be exactly 1/11 of total when stated as included"
        fields: ["GST_AMOUNT", "TOTAL_AMOUNT"]
        rule_type: "mathematical"
        formula: "GST_AMOUNT * 11 = TOTAL_AMOUNT"
        tolerance: 0.01
        ato_compliance: true
        condition: "when GST is stated as included in total"
        
      - name: "ato_buyer_info_threshold"
        description: "Buyer details required for sales of $1,000 or more"
        fields: ["TOTAL_AMOUNT", "PAYER_NAME", "PAYER_ABN"]
        rule_type: "conditional_presence"
        condition: "TOTAL_AMOUNT >= 1000"
        requirement: "Either PAYER_NAME or PAYER_ABN must be present (buyer's identity or ABN)"
        ato_compliance: true

  # ========================================
  # BANK STATEMENT SCHEMA (12 fields)
  # ========================================
  bank_statement:
    metadata:
      document_type_values: ["bank statement", "account statement", "statement of account", "statement"]
      total_fields: 12
      description: "Bank account statement showing transactions"
      efficiency_gain: "52% fewer fields than unified (25→12)"
      
    inherits_common: false
    
    specific_fields:
      - name: "DOCUMENT_TYPE"
        type: "text"
        evaluation_logic: "exact_match"
        group: "metadata"
        description: "Type of business document"
        instruction: "[document type (bank_statement) or NOT_FOUND]"
        
      - name: "LINE_ITEM_DESCRIPTIONS"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Transaction types and descriptions"
        instruction: "[pipe-separated transaction descriptions or NOT_FOUND]"
        
      - name: "BANK_NAME"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "banking"
        description: "Financial institution name"
        instruction: "[bank name or NOT_FOUND]"
        
      - name: "BANK_BSB_NUMBER"
        type: "numeric_id"
        evaluation_logic: "exact_numeric_match"
        group: "banking"
        description: "6-digit BSB"
        instruction: "[6-digit BSB number or NOT_FOUND]"
        
      - name: "BANK_ACCOUNT_NUMBER"
        type: "numeric_id"
        evaluation_logic: "exact_numeric_match"
        group: "banking"
        description: "Account number"
        instruction: "[account number or NOT_FOUND]"
        
      - name: "BANK_ACCOUNT_HOLDER"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "banking"
        description: "Account holder name"
        instruction: "[account holder name or NOT_FOUND]"
        
      - name: "STATEMENT_DATE_RANGE"
        type: "date"
        evaluation_logic: "flexible_date_match"
        group: "dates"
        description: "Statement period"
        instruction: "[statement period (e.g., May 2025) or NOT_FOUND]"
        
      - name: "ACCOUNT_OPENING_BALANCE"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Starting balance"
        instruction: "[opening balance with 2 decimals or NOT_FOUND]"
        
      - name: "ACCOUNT_CLOSING_BALANCE"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Ending balance"
        instruction: "[closing balance with 2 decimals or NOT_FOUND]"
        
      - name: "TOTAL_CREDITS"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Total deposits/credits"
        instruction: "[total credits in dollars or NOT_FOUND]"
        
      - name: "TOTAL_DEBITS"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Total withdrawals/debits"
        instruction: "[total debits in dollars or NOT_FOUND]"
    
    excluded_fields:
      # Invoice/receipt only
      - "BUSINESS_ABN"
      - "SUPPLIER_NAME" 
      - "BUSINESS_ADDRESS"
      - "BUSINESS_PHONE"
      - "TOTAL_AMOUNT"
      - "INVOICE_DATE"
      - "DUE_DATE"
      - "LINE_ITEM_QUANTITIES"
      - "LINE_ITEM_PRICES"
      - "SUBTOTAL_AMOUNT"
      - "GST_AMOUNT"
      - "PAYER_NAME"
      - "PAYER_ABN"
      - "PAYER_ADDRESS"
      - "PAYER_PHONE"
      - "PAYER_EMAIL"
      - "SUPPLIER_WEBSITE"
      - "INVOICE_NUMBER"
      - "RECEIPT_NUMBER"
      - "TRANSACTION_DATE"
      - "PAYMENT_METHOD"
      - "STORE_LOCATION"
      
    validation_rules:
      - name: "balance_calculation"
        description: "Opening + Credits - Debits should equal Closing"
        fields: ["ACCOUNT_OPENING_BALANCE", "TOTAL_CREDITS", "TOTAL_DEBITS", "ACCOUNT_CLOSING_BALANCE"]
        rule_type: "mathematical"
        formula: "ACCOUNT_OPENING_BALANCE + TOTAL_CREDITS - TOTAL_DEBITS = ACCOUNT_CLOSING_BALANCE"
        tolerance: 0.02

  # ========================================
  # RECEIPT SCHEMA (19 fields)
  # ========================================
  receipt:
    metadata:
      document_type_values: ["receipt", "purchase receipt", "payment receipt", "sales receipt"]
      total_fields: 19
      description: "Proof of purchase or payment"
      efficiency_gain: "24% fewer fields than unified (25→19)"
      
    inherits_common: true
    
    specific_fields:
      - name: "RECEIPT_NUMBER"
        type: "text"
        evaluation_logic: "exact_match"
        group: "metadata"
        description: "Receipt reference number"
        instruction: "[receipt number or NOT_FOUND]"
        
      - name: "TRANSACTION_DATE"
        type: "date"
        evaluation_logic: "flexible_date_match"
        group: "dates"
        description: "Date of purchase"
        instruction: "[transaction date or NOT_FOUND]"
        
      - name: "PAYMENT_METHOD"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payment"
        description: "Payment type (cash/card/etc)"
        instruction: "[payment method or NOT_FOUND]"
        
      - name: "LINE_ITEM_DESCRIPTIONS"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Items purchased"
        instruction: "[comma-separated items or NOT_FOUND]"
        
      - name: "LINE_ITEM_QUANTITIES"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Quantities"
        instruction: "[comma-separated quantities or NOT_FOUND]"
        
      - name: "LINE_ITEM_PRICES"
        type: "list"
        evaluation_logic: "list_overlap_match"
        group: "item_details"
        description: "Prices"
        instruction: "[comma-separated prices or NOT_FOUND]"
        
      - name: "SUBTOTAL_AMOUNT"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "Subtotal"
        instruction: "[subtotal in dollars with 2 decimals or NOT_FOUND]"
        
      - name: "GST_AMOUNT"
        type: "monetary"
        evaluation_logic: "monetary_with_tolerance"
        group: "monetary"
        description: "GST amount"
        instruction: "[GST in dollars with 2 decimals or NOT_FOUND]"
        
      - name: "PAYER_NAME"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer/payer name who made the purchase"
        instruction: "[customer/payer name or NOT_FOUND]"
        
      - name: "PAYER_ADDRESS"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer address"
        instruction: "[customer address or NOT_FOUND]"
        
      - name: "PAYER_PHONE"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer phone number"
        instruction: "[customer phone number or NOT_FOUND]"
        
      - name: "PAYER_EMAIL"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "payer_info"
        description: "Customer email address"
        instruction: "[customer email address or NOT_FOUND]"
        
      - name: "STORE_LOCATION"
        type: "text"
        evaluation_logic: "fuzzy_text_match"
        group: "business_entity"
        description: "Store/branch location"
        instruction: "[store location or NOT_FOUND]"
    
    excluded_fields:
      # Invoice only
      - "DUE_DATE"
      # Bank statement only
      - "BANK_NAME"
      - "BANK_BSB_NUMBER"
      - "BANK_ACCOUNT_NUMBER"
      - "BANK_ACCOUNT_HOLDER"
      - "ACCOUNT_OPENING_BALANCE"
      - "ACCOUNT_CLOSING_BALANCE"
      - "STATEMENT_DATE_RANGE"
      
    validation_rules:
      - name: "financial_consistency"
        description: "SUBTOTAL + GST should equal TOTAL"
        fields: ["SUBTOTAL_AMOUNT", "GST_AMOUNT", "TOTAL_AMOUNT"]
        rule_type: "mathematical"
        formula: "SUBTOTAL_AMOUNT + GST_AMOUNT = TOTAL_AMOUNT"
        tolerance: 0.02
        
      - name: "item_consistency"
        description: "Line item fields should have same count"
        fields: ["LINE_ITEM_DESCRIPTIONS", "LINE_ITEM_QUANTITIES", "LINE_ITEM_PRICES"]
        rule_type: "count_match"

# ============================================================================
# GROUP DEFINITIONS - Inherited from v1 but optimized per document type
# ============================================================================
groups:
  critical:
    name: "Critical Business Identifiers"
    max_tokens: 300
    temperature: 0.0
    description: "Most important fields for business validation"

  monetary:
    name: "Monetary Values"
    max_tokens: 400
    temperature: 0.0
    description: "Financial amounts and calculations"

  dates:
    name: "Date Information"
    max_tokens: 350
    temperature: 0.0
    description: "Temporal information and date fields"

  business_entity:
    name: "Business Entity Details"
    max_tokens: 450
    temperature: 0.0
    description: "Seller/provider information"

  payer_info:
    name: "Payer Information"
    max_tokens: 450
    temperature: 0.0
    description: "Buyer/customer information"

  banking:
    name: "Banking Details"
    max_tokens: 400
    temperature: 0.0
    description: "Financial institution information"

  item_details:
    name: "Item and Line Details"
    max_tokens: 500
    temperature: 0.0
    description: "Line item information requiring list processing"

  metadata:
    name: "Document Metadata"
    max_tokens: 250
    temperature: 0.0
    description: "Document classification and typing"
    
  payment:
    name: "Payment Information"
    max_tokens: 300
    temperature: 0.0
    description: "Payment method and transaction details"

# ============================================================================
# GROUPING STRATEGIES - Updated for document-specific extraction
# ============================================================================
grouping_strategies:
  document_type_specific:
    name: "Document Type Specific Extraction"
    description: "Optimized extraction based on detected document type"
    mode: "dynamic"  # Schema selected based on document classification
    
  unified_fallback:
    name: "Unified Schema Fallback"
    description: "Original 25-field extraction for unknown document types"
    mode: "static"
    schema_file: "field_schema.yaml"

# ============================================================================
# PROCESSING CONFIGURATION
# ============================================================================
processing_config:
  document_detection:
    enabled: true
    method: "lightweight_classification"
    confidence_threshold: 0.85
    fallback_to_unified: true
    
  extraction_optimization:
    enable_field_reduction: true
    enable_targeted_prompts: true
    enable_type_validation: true
    
  backward_compatibility:
    support_v1_schema: true
    unified_schema_file: "field_schema.yaml"
    migration_mode: "gradual"

# ============================================================================
# MODEL-SPECIFIC CONFIGURATIONS - Updated for document types
# ============================================================================
model_prompt_templates:
  llama:
    document_type_specific:
      invoice:
        opening: "Extract invoice information from this business document."
        focus: "Focus on invoice-specific fields: customer details, dates, line items, and financial amounts."
        field_emphasis: "Pay special attention to invoice number, due date, line items, and totals."
        
      bank_statement:
        opening: "Extract bank statement information from this financial document."
        focus: "Focus on account details, statement period, balances, and transaction summaries."
        field_emphasis: "Pay special attention to account numbers, balances, and transaction totals."
        
      receipt:
        opening: "Extract receipt information from this purchase document."
        focus: "Focus on transaction details, payment method, items purchased, and amounts."
        field_emphasis: "Pay special attention to payment method, items, and transaction totals."
        
  internvl3:
    document_type_specific:
      invoice:
        prompt_prefix: "Invoice extraction:"
        field_focus: "customer, dates, items, amounts"
        
      bank_statement:
        prompt_prefix: "Bank statement extraction:"
        field_focus: "account, period, balances, transactions"
        
      receipt:
        prompt_prefix: "Receipt extraction:"
        field_focus: "payment, items, amounts, store"

# ============================================================================
# MIGRATION AND COMPATIBILITY
# ============================================================================
migration:
  version_compatibility:
    v1_schema_support: true
    auto_upgrade_path: true
    feature_flags:
      enable_document_detection: true
      enable_type_specific_extraction: true
      enable_performance_optimization: true
      
  rollback_information:
    original_git_hash: "4b866e0f3dca8e298d47290b5bbce1d803dc3297"
    rollback_command: "git checkout 4b866e0f3dca8e298d47290b5bbce1d803dc3297"
    unified_schema_fallback: "field_schema.yaml"

# ============================================================================
# PERFORMANCE METRICS TRACKING
# ============================================================================
performance_tracking:
  enabled: true
  metrics:
    - field_reduction_percentage
    - processing_time_improvement
    - accuracy_by_document_type
    - token_usage_reduction
    - confidence_score_distribution
    
  targets:
    field_reduction: 
      invoice: 20
      bank_statement: 52
      receipt: 24
    processing_time_improvement: 30  # percent
    accuracy_target: 90  # percent
    token_reduction: 35  # percent