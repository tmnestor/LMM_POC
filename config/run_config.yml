# Document Extraction Configuration
# All options explicitly stated - YAML takes priority over defaults
# CLI flags override YAML when explicitly provided

# Bootstrap configuration — the minimal set the entrypoint and model loader need
# before any pipeline work begins (model identity, tiling, GPU count, log dir).
# conda_env: bootstrapped from LMM_CONDA_ENV + the entrypoint default; it CANNOT
# be a real key here (chicken-and-egg: this YAML is read by the conda python, so
# the env must already be chosen before this file is parsed).
bootstrap:
  # Model configuration — switch type + path together
  model:
    # type: internvl3
    type: internvl3-vllm
    path: /home/jovyan/nfs_share/models/InternVL3_5-8B
    # path: /efs/shared/PTM/InternVL3_5-8B
    max_tiles: 18          # Image tiles (H200: 18-36, V100: 14, L4: 18)
    # min_tiles: 6         # Set to enable adaptive quality-based tiling (range: min_tiles..max_tiles)
    flash_attn: true       # Use Flash Attention 2 (disable for V100)
    enforce_eager: true    # vLLM: true = skip CUDA graph compilation (faster startup,
                           #        lower throughput); false = compile graphs (slower
                           #        startup, higher throughput for long runs)
    dtype: bfloat16        # Torch dtype (bfloat16, float16, float32)
    # vLLM only: override the chat template used by engine.chat().
    #   none            -> use the model's own template (default)
    #   <path/to/*.jinja> -> serve with this template instead (must exist)
    # Use this to disable a serve-side R1/thinking template that emits <think>
    # blocks. InternVL3.5 thinking is controlled by the system prompt, not
    # enable_thinking; a custom non-thinking template is the override of last
    # resort when the model dir ships a thinking-by-default template.
    chat_template: none
    # Model loading options (merged from the old top-level model_loading:).
    device_map: auto
    default_paths:
      internvl3: /home/jovyan/nfs_share/models/InternVL3_5-8B
      internvl3-vllm: /home/jovyan/nfs_share/models/InternVL3_5-8B
      # internvl3: /efs/shared/PTM/InternVL3_5-8B
      # internvl3-vllm: /efs/shared/PTM/InternVL3_5-8B
  # GPU count (moved from the old top-level processing: section).
  gpus:
    num_gpus: 0                # 0 = auto-detect all GPUs, 1 = single GPU, N = use N GPUs
    data_parallel_size: null   # null = auto (num_gpus for vLLM, ignored for HF)
  # Logging
  logging:
    # log_dir: /efs/shared/PoC_data/logs   # Directory for entrypoint log files (EFS-backed)
    log_dir: ../evaluation_data/output/logs   # Directory for entrypoint log files (sandbox-backed)

# I/O configuration — where inputs are read from and outputs are written to.
io:
  # Data paths
  input:
    # dir: /efs/shared/annotations/annotation_images
    # ground_truth: /efs/shared/annotations/lmm_poc_gt_20260325.csv
    # dir: ../evaluation_data/bank
    # ground_truth: ../evaluation_data/bank/ground_truth_bank.csv
    # dir: ../evaluation_data/synthetic_original
    # ground_truth: ../evaluation_data/synthetic_original/ground_truth_synthetic.csv
    dir: ../evaluation_data/synthetic_transaction_linking
    # Extraction GT generated from the per-type YAMLs in
    # Synthetic_Doc_Generation/ground_truth via scripts/generate_extraction_gt.py.
    # (Separate from linking.ground_truth, which the transaction-linking task uses.)
    ground_truth: ../evaluation_data/synthetic_transaction_linking/ground_truth_extraction.csv
    max_images: null       # null = process all images
    document_types: null   # null = all types, or comma-separated: INVOICE,RECEIPT,BANK_STATEMENT,TRAVEL_EXPENSE,VEHICLE_LOGBOOK
  # Output settings
  output:
    dir: ../evaluation_data/output
    skip_visualizations: false  # Skip visualization generation
    skip_reports: false         # Skip report generation

# Inference configuration — generation budget, tiling, sampling, vLLM engine,
# and debug tracing. Everything that shapes how the model produces output.
inference:
  max_new_tokens: 3500   # Max tokens for generation (increased to avoid truncation on 30+ row statements)

  tiling:
    # vLLM app-side pre-tiling: crop each image into per-doc-type tiles ourselves
    # and hand vLLM the crops as separate images, so OUR tile count is
    # authoritative (the checkpoint's max_dynamic_patch=12 cap no longer bounds
    # dense bank statements). Tile counts come from budgets below
    # (bank=18, invoice=12, receipt=6). Enabling this REQUIRES raising
    # vllm.models.<model>.limit_mm_per_prompt to at least
    # max(budgets.*.max_tiles) + 1 (load fails fast otherwise).
    # See plans/2026-06-04-adaptive-pre-tiling.md. Leave off to run the 12-tile baseline.
    pre_tiling:
      enabled: true       # true -> pre-tile; false -> single-image (vLLM tiles internally at 12)
      image_size: 448      # InternVL3 tile size in pixels
      use_thumbnail: true  # append a whole-image thumbnail after the detail tiles

    # Per-doc-type image tile budgets for InternVL3 dynamic tiling.
    # min_tiles is the FLOOR forced into the pre-tiling crop (dynamic_preprocess
    # min_num); max_tiles is the ceiling. Because the InternVL tiling algorithm
    # picks the grid by closest aspect-ratio match, a clean A4-portrait bank
    # statement settles on a 2x3 (6-tile) grid and NEVER reaches max_tiles on its
    # own — so raising max alone does nothing. min_tiles=max_tiles=18 forces
    # exactly 18 detail tiles (+ thumbnail = 19 images, the engine's designed
    # ceiling via limit_mm_per_prompt) needed to read packed dense transaction
    # tables. Receipts/invoices keep min_tiles: 1 (aspect-matched).
    # Requires min_tiles <= max_tiles. See plans/2026-06-04-adaptive-tiling-dense-bank.md.
    budgets:
      default:
        min_tiles: 1
        max_tiles: 18
      bank_statement:
        min_tiles: 18
        max_tiles: 18
      invoice:
        min_tiles: 1
        max_tiles: 12
      receipt:
        min_tiles: 1
        max_tiles: 6

  # Generation parameters
  generation:
    defaults:
      max_new_tokens_base: 512
      max_new_tokens_per_field: 64
      temperature: 0.0
      do_sample: false
      top_p: 0.95
      use_cache: true
    models:
      internvl3:
        max_new_tokens_base: 2000
        max_new_tokens_per_field: 50
    token_limits:
      2b: null                    # use calculation
      8b: 800

  # vLLM engine parameters — per-model overrides for VllmSpec defaults
  vllm:
    defaults:
      gpu_memory_utilization: 0.90
      max_model_len: 8192
      max_num_seqs: 1
      limit_mm_per_prompt: 1
      enable_prefix_caching: true
    models:
      # NOTE: asking vLLM to tile above the checkpoint default (12) via
      # mm_processor_kwargs/hf_overrides is blocked on this build (see
      # plans/2026-06-04-adaptive-tiling-dense-bank.md). The supported route is
      # app-side pre_tiling (above): we crop tiles ourselves and send them as
      # separate images. To use it, set pre_tiling.enabled: true AND uncomment the
      # internvl3-vllm limit_mm_per_prompt below (>= max image_budget + 1 = 19).
      internvl3-vllm:
        max_model_len: 16384         # 18 tiles + thumbnail ~= 4.9k vision + prompt + 4096 output
        limit_mm_per_prompt: 19      # 18 detail tiles + 1 thumbnail (required when pre_tiling on)

  # Raw VLM prompt/response trace (debug observability; default off).
  # When enabled, every extraction VLM call (detection, bank turns, graph nodes,
  # linking fallback) appends one JSONL line {image_name, pipeline, label, prompt,
  # raw_response, tokens} via the shared VllmBackend seam.
  tracing:
    raw_prompts: false   # true -> persist every VLM prompt+response to JSONL
    path: none           # none -> <output_dir>/raw_prompt_trace.jsonl ; or an explicit path

# Pipeline configuration — per-task settings grouped together: classification,
# processing toggles, token budgets, trust + transaction linking, batch tuning,
# extraction ordering/skip labels, and the bank-header cache.
pipeline:
  # Classification settings
  classification:
    fallback_type: UNIVERSAL     # Default type when model response can't be parsed

  # Processing options
  processing:
    batch_size: null             # Images per batch (null = auto-detect from VRAM, 1 = sequential)
    bank_v2: true              # Use V2 bank statement extraction
    balance_correction: false  # Disable balance validation (reduces accuracy)
    verbose: false             # Tier B: init/config details (auto-batch, gen-config, processing X, field counts)
    debug: false               # Tier C: dev noise (PARSING DEBUG, CONFIG DEBUG, TENSOR_DTYPE, prompt/response dumps)

  # Named token budgets — single source of truth for all max_tokens values.
  # Workflow YAML nodes reference these by name via `token_budget: <name>`.
  token_budgets:
    classify: 150
    detection: 200
    detect_headers: 500
    detect_headers_short: 200
    extract_standard: 2048
    extract_travel: 1024
    extract_bank: 4096
    bank_header_detection: 500
    transaction_match: 2000
    receipt_extract: 500
    orchestrator_generate: 1024
    bank_statement_floor: 1500
    fallback_base: 512
    fallback_per_field: 64
    trust_classify: 300
    trust_field_extract: 500

  # Trust distribution linking — NRO Private Wealth compliance checking
  trust:
    data_dir: ../private_wealth_docs
    quads: ../private_wealth_docs/output/trust_quads.csv
    quads_incomplete: ../private_wealth_docs/output/trust_quads_incomplete.csv
    ground_truth: ../private_wealth_docs/ground_truth/trust_distribution_links.yml
    classification_ground_truth: ../private_wealth_docs/ground_truth/trust_classification_gt.yml
    classifications: ../private_wealth_docs/output/trust_classifications.jsonl
    raw_extractions: ../private_wealth_docs/output/raw_extractions.jsonl
    compliance_results: ../private_wealth_docs/output/trust_compliance_results.jsonl
    output_dir: ../private_wealth_docs/output
    evaluation_dir: ../private_wealth_docs/output/trust_evaluation
    log_dir: ../private_wealth_docs/output/logs
    subdirectories:
      # Production (flat directory, trust_classify generates quads):
      trust_return: .
      distribution_stmt: .
      income_schedule: .
      beneficiary_itr: .
      # Development (pre-sorted subdirectories):
      #   trust_return: trust_returns
      #   distribution_stmt: distribution_statements
      #   income_schedule: trust_income_schedules
      #   beneficiary_itr: beneficiary_itrs
    amount_tolerance: 0.01    # trust-eval amount match tolerance (relative)
    linking_fields:
      # ID fields compared as ABN/TFN (space-normalised exact match)
      id_fields:
        - trust_abn
        - beneficiary_tfn
      # Amount fields compared numerically within amount_tolerance
      amount_fields:
        - share_of_net_income
        - franking_credit
        - capital_gain_component

  # Transaction linking — receipt/invoice -> bank-statement debit matching.
  # Standalone task (KFP_TASK=run_transaction_link); does NOT touch the trust
  # pipeline. Matcher-first: the algorithmic matcher links against the rows the
  # extract stage already pulled; receipts it can't confidently match fall
  # through to a targeted single-image VLM lookup. Every key is required —
  # stages/transaction_link.py fails fast on a missing one.
  linking:
    case_key_pattern: "^(?P<case>[^_]+)_"   # group files by case (split on first "_")
    vlm_prompt: single_receipt_link          # prompt file in prompts/ (without .yaml)
    vlm_max_tokens: 4096                      # token budget for the fallback VLM lookup
    vlm_temperature: 0.0                      # MUST be 0.0 — the shared generate seam is deterministic
    hybrid_amount_tolerance: 0.01            # $ gate for an algorithmic amount match
    hybrid_date_window_days: 5               # business-day window for date scoring
    hybrid_description_threshold: 0.3        # min token-overlap fraction for description support
    hybrid_min_confidence: LOW               # min matcher confidence to accept without VLM (HIGH|MEDIUM|LOW)
    data_dir: ../evaluation_data/synthetic_transaction_linking
    output: ../evaluation_data/synthetic_transaction_linking/output/transaction_links.jsonl
    ground_truth: ../evaluation_data/synthetic_transaction_linking/transaction_links.yml   # optional eval; if set -> evaluate_linking runs
    evaluation_dir: ../evaluation_data/synthetic_transaction_linking/output/transaction_evaluation
    log_dir: ../evaluation_data/synthetic_transaction_linking/output/logs

  # Batch processing tuning
  batch:
    default_sizes: {internvl3: 4}
    max_sizes: {internvl3: 8}
    conservative_sizes: {internvl3: 1}
    min_size: 1
    strategy: balanced            # conservative | balanced | aggressive
    auto_detect: true

  # Extraction ordering — controls batch submission order for prefix-cache reuse
  extraction:
    order:
      - bank_statement
      - invoice
      - receipt
    secondary_sort: none              # none | image_area_asc | image_area_desc
    # Labels that skip extraction entirely (written as skipped records)
    skip_labels: []

  # Per-bank column-mapping cache (standalone bank workflow only)
  bank_header_cache:
    enabled: false
    key_pattern: "^(?P<institution>[A-Za-z]+)_"

# Resources — GPU memory thresholds and infrastructure timeouts.
resources:
  # GPU memory thresholds (GB) — drive auto-batch-size selection.
  gpu_memory:
    low: 8                      # GB — conservative batching
    medium: 16                  # GB — balanced batching
    high: 24                    # GB — aggressive batching
    very_high: 64               # GB — maximum batching

  # Infrastructure settings — timeouts, memory thresholds
  infrastructure:
    # No dp_timeout: data-parallel workers run until they finish or die (run_dp
    # polls worker liveness instead of imposing an arbitrary wall-clock cap).
    dp_join_timeout: 60           # seconds, process join timeout
    gpu_memory_threshold_gb: 1.0
    gpu_memory_fallback_gb: 24.0
