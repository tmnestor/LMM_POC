# Gemma 4 E4B — Mac M1 (16 GB unified memory, MPS backend)
# Run: python cli.py --config config/gemma4_mac_config.yml

model:
  type: gemma4-e4b-mps
  path: /Users/tod/PretrainedLLM/gemma-4-E4B-it
  flash_attn: false          # Flash Attention not available on MPS
  dtype: float16             # float16 stable on M1; use bfloat16 for M1 Pro/Max
  max_new_tokens: 1000       # Keep short to limit KV cache pressure on 16 GB

data:
  dir: ../evaluation_data/bank
  ground_truth: ../evaluation_data/bank/ground_truth_bank.csv
  max_images: 5              # Start small — increase once confirmed working

output:
  dir: ../evaluation_data/output_mac
  skip_visualizations: false
  skip_reports: false

logging:
  log_dir: ../evaluation_data/output_mac/logs

processing:
  batch_size: 1              # MPS: sequential only (no batch_chat API)
  num_gpus: 0                # No CUDA GPUs
  data_parallel_size: null
  bank_v2: true
  balance_correction: true
  verbose: true
  debug: false

model_loading:
  device_map: auto           # accelerate auto-detects MPS on Apple Silicon
  trust_remote_code: false   # Gemma4 does not require trust_remote_code
  low_cpu_mem_usage: true
