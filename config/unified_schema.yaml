# ==============================================================================
# 5. PROMPT TEMPLATES - Model-specific prompt generation
# ==============================================================================
# Templates used to generate extraction prompts:
# - Default templates: Used when no model-specific override exists
# - Model-specific overrides: Customizations for specific models
#   - llama: Optimized for Llama-3.2-Vision
#   - internvl3: Optimized for InternVL3 (currently identical to llama)
#
# Template variables available:
# - {field_count}: Number of fields to extract
# - {last_field}: Name of the last field in the list
# - {document_type}: Type of document being processed
prompt_templates:
  # --------------------------------------------------------------------------
  # LLAMA-3.2-VISION PROMPTS - Explicit and complete
  # --------------------------------------------------------------------------
  llama:
    expertise_frame: "You are an expert document analyzer. Extract structured data from this business document image using ESSENTIAL REDUCED FIELD SCHEMA."
    critical_instructions_header: "CRITICAL INSTRUCTIONS FOR LLAMA - ESSENTIAL FIELD REDUCTION:"
    critical_instructions:
      - "Output ONLY the structured data below"
      - "Do NOT include any conversation text or explanations"
      - "Do NOT repeat the user's request"
      - "Do NOT include <image> tokens"
      - "Be extremely precise with monetary values and ABN formatting"
      - "Start immediately with DOCUMENT_TYPE"
      - "Stop immediately after {last_field}"
    output_format: "REQUIRED OUTPUT FORMAT - ESSENTIAL REDUCED SCHEMA ({field_count} ESSENTIAL FIELDS):"
    format_rules_header: "OUTPUT RULES - ESSENTIAL REDUCED SCHEMA:"
    format_rules:
      - "NEVER use: **KEY:** or **KEY** or *KEY* or any formatting"
      - "Plain text only - NO markdown, NO bold, NO italic"
      - "Include ALL {field_count} ESSENTIAL keys even if value is NOT_FOUND"
      - "Output ONLY these {field_count} lines, nothing else"
      - "Use exact text from document (e.g., \"TAX INVOICE\" not \"Invoice\")"
      - "Use pipe separators for lists (e.g., \"item1 | item2 | item3\")"
      - "Be conservative: use NOT_FOUND if field is truly missing"
      - "For boolean fields: use \"true\" or \"false\" (not \"yes\"/\"no\")"
      - "ESSENTIAL PERFORMANCE: Focus on essential fields only for maximum extraction speed"
      - "For calculated fields: show computed values with proper formatting"
      - "For transaction lists: use pipe separators between transactions"
      - "For amounts: extract exactly as shown, do NOT add negative signs or modify values"
    stop_instruction: "STOP AFTER the {last_field}. Do not add explanations or comments."
  
  # --------------------------------------------------------------------------
  # INTERNVL3 PROMPTS - Enhanced with digit extraction precision
  # --------------------------------------------------------------------------
  internvl3:
    expertise_frame: "CRITICAL: Pay extreme attention to EXACT digits and numbers.\nSTEP 1: Carefully examine the entire document image.\nSTEP 2: Identify the document type and key sections.\nSTEP 3: Extract EXACTLY {field_count} fields with PRECISE digit accuracy."
    critical_instructions_header: "DIGIT PRECISION & VISUAL EXTRACTION INSTRUCTIONS:"
    critical_instructions:
      - "⚠️ CRITICAL: Extract EVERY digit EXACTLY as shown - do not skip or modify digits"
      - "⚠️ CRITICAL: For multi-digit numbers, carefully copy ALL digits in the correct sequence"
      - "FIRST: Scan the document header/top section for business name and ABN"
      - "SECOND: Look for customer/payer information (usually in the middle section)"
      - "THIRD: Find the itemized list or transaction table - count ALL rows"
      - "FOURTH: Locate the totals section (usually at the bottom)"
      - "Output each field EXACTLY as shown below"
      - "Start your response with DOCUMENT_TYPE: [value]"
      - "End your response with {last_field}: [value]"
    output_format: "EXTRACT THESE {field_count} FIELDS IN THIS EXACT ORDER:"
    format_rules_header: "CRITICAL EXTRACTION RULES - FOCUS ON DIGIT ACCURACY:"
    format_rules:
      - "Each line must be: FIELDNAME: value"
      - "🔢 NUMBERS: Copy digits EXACTLY - do not round, truncate, or skip any digits"
      - "🔢 ABN: Must be EXACTLY 11 digits - count them! (e.g., '12 345 678 901' format)"
      - "🔢 ADDRESSES: Copy house/building numbers EXACTLY (e.g., '123' not '1123')"
      - "🔢 PRICES: Include ALL items even if prices repeat (e.g., if two items cost $15.00, list both)"
      - "🔢 LISTS: Count the rows in tables - your list must match the actual number of rows found"
      - "IMPORTANT: For SUPPLIER_NAME, look at the business/company name at the TOP of the document"
      - "IMPORTANT: For LINE_ITEM_DESCRIPTIONS, list ALL items shown in the itemized section"
      - "For prices, distinguish between unit price (per item) and total price (quantity × unit)"
      - "Use 'NOT_FOUND' ONLY when the field truly doesn't exist in the document"
      - "For lists, separate items with ' | ' (space-pipe-space)"
      - "Example format: 'Item1 | Item2 | Item3' (list ALL items found)"
      - "Include duplicates: if same price appears multiple times, list it each time"
      - "For boolean IS_GST_INCLUDED: answer 'true' if GST amount is shown, 'false' if not"
      - "Extract monetary values with 2 decimal places (e.g., '$12.50' or '12.50')"
      - "NO formatting, NO markdown, just plain text"
      - "Include ALL {field_count} fields even if some are NOT_FOUND"
      - "FINAL CHECK: Verify all multi-digit numbers are complete and accurate"
    stop_instruction: "OUTPUT EXACTLY {field_count} LINES. Stop after {last_field}."

# ==============================================================================
# 6. FIELD CATEGORIES - Grouping for evaluation and reporting
# ==============================================================================
# Fields grouped by business function for analysis and reporting
# Used by evaluation metrics to calculate category-level accuracy
field_categories:
  identification:
    - DOCUMENT_TYPE
    - BUSINESS_ABN
  business_details:
    - SUPPLIER_NAME
    - BUSINESS_ADDRESS
  customer_details:
    - PAYER_NAME
    - PAYER_ADDRESS
  temporal:
    - INVOICE_DATE
    - STATEMENT_DATE_RANGE
  line_items:
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
  financial:
    - IS_GST_INCLUDED
    - GST_AMOUNT
    - TOTAL_AMOUNT
  transactions:
    - TRANSACTION_DATES
    - TRANSACTION_AMOUNTS_PAID

# ==============================================================================
# 7. EVALUATION CONFIGURATION
# ==============================================================================
# Settings for field extraction evaluation and validation
# - field_accuracy_threshold: Minimum accuracy per field
# - detection_config: Document type detection settings
# - fuzzy_matching: String similarity matching for text fields
# - field_type_handling: Special handling for different field types
evaluation:
  field_accuracy_threshold: 0.8
  detection_config:
    confidence_threshold: 0.85
    fallback_type: "unknown"
  
  fuzzy_matching:
    enabled: true
    ratio_threshold: 0.85
    
  field_type_handling:
    monetary_fields:
      normalize_currency: true
      ignore_decimal_differences: false
      tolerance: 0.01
    date_fields:
      flexible_parsing: true
      formats:
        - "%d/%m/%Y"
        - "%Y-%m-%d"
        - "%d-%m-%Y"
        - "%d %b %Y"
    list_fields:
      separator: "|"
      normalize_whitespace: true
      order_sensitive: false

# ==============================================================================
# 8. CRITICAL FIELDS - Fields requiring special validation
# ==============================================================================
# These fields are essential for business compliance and accuracy
# Extra validation and accuracy checks are performed on these fields
critical_fields:
  - BUSINESS_ABN    # Essential business identifier (11-digit ABN)
  - SUPPLIER_NAME   # Essential supplier information
  - GST_AMOUNT      # Essential tax information
  - TOTAL_AMOUNT    # Essential financial total

# ==============================================================================
# 9. SUPPORTED DOCUMENT TYPES - List for validation
# ==============================================================================
supported_document_types:
  - "invoice"
  - "receipt" 
  - "bank_statement"

# ==============================================================================
# 10. DOCUMENT TYPE DETECTION - Automatic document classification
# ==============================================================================
# Configuration for detecting document type from image
# Consolidated from prompts/document_type_detection.yaml
document_type_detection:
  # Detection prompt configurations by model
  prompts:
    llama:
      system_message: "You are a document classifier. Analyze this business document image."
      user_prompt: |
        What type of business document is this?
        
        Look for document types like:
        - invoice, tax invoice, bill, estimate, quote, quotation
        - bank_statement, account statement, credit card statement  
        - receipt, purchase receipt
        
        Answer with the exact document type you see (e.g., 'invoice', 'estimate', 'receipt', 'bank_statement', etc.).
      max_tokens: 50
      temperature: 0.0
      
    internvl3:
      user_prompt: |
        What document type is this?
        
        Types: invoice, estimate, quote, receipt, bank_statement, credit card statement
        
        Answer with the exact type:
      max_tokens: 20
      temperature: 0.0

  # Type mapping for variations
  type_mappings:
    # Invoice variations
    "tax invoice": "invoice"
    "commercial invoice": "invoice"
    "proforma invoice": "invoice"
    "bill": "invoice"
    "estimate": "invoice"
    "quote": "invoice"
    "quotation": "invoice"
    
    # Receipt variations
    "purchase receipt": "receipt"
    "sales receipt": "receipt"
    "transaction receipt": "receipt"
    
    # Statement variations
    "account statement": "bank_statement"
    "credit card statement": "bank_statement"
    "bank statement": "bank_statement"
    "financial statement": "bank_statement"
    "statement": "bank_statement"

  # Detection configuration
  config:
    confidence_threshold: 0.85
    fallback_type: "invoice"
    enable_debug_output: true

# ==============================================================================
# 10. UNIVERSAL SINGLE-PASS EXTRACTION - Eliminates double tiling
# ==============================================================================
# Universal extraction template that processes all 15 fields in a single pass
# eliminating the need for document type detection and subsequent field extraction.
# Critical success factor: Strong "NOT_FOUND" reinforcement to prevent hallucination.

universal_extraction:
  # --------------------------------------------------------------------------
  # INTERNVL3 UNIVERSAL TEMPLATE - Single-pass all fields
  # --------------------------------------------------------------------------
  internvl3:
    system_prompt: |
      You are a document analysis expert. Extract information from this business document.
      
      🚨 CRITICAL RULE: If you cannot clearly see a field in the document, return "NOT_FOUND"
      🚨 DO NOT GUESS or INFER missing information
      🚨 Only extract what is explicitly visible in the image
      
      FORMATTING REQUIREMENTS:
      1. Fields not visible/applicable: Return "NOT_FOUND"
      2. Monetary values: Include currency symbols ($8.62, not 8.62)
      3. Addresses: Extract complete multi-line addresses  
      4. Dates: Use DD/MM/YYYY format
      5. Lists: Use pipe separation (Item1 | Item2 | Item3)
      6. Boolean values: true/false (lowercase)

    field_instructions: |
      Extract the following 17 fields from this document:
      
      DOCUMENT_TYPE: NOT_FOUND (will be auto-determined from your extraction results)
      INVOICE_DATE: Date of invoice/receipt (DD/MM/YYYY format) - return "NOT_FOUND" if not visible
      SUPPLIER_NAME: Company/business name providing goods/services - return "NOT_FOUND" if not visible
      BUSINESS_ABN: 11-digit Australian Business Number - return "NOT_FOUND" if not visible
      BUSINESS_ADDRESS: Complete supplier business address - return "NOT_FOUND" if not visible
      PAYER_NAME: Customer/payer name - return "NOT_FOUND" if not visible
      PAYER_ADDRESS: Customer/payer address - return "NOT_FOUND" if not visible
      LINE_ITEM_DESCRIPTIONS: Item names/descriptions (pipe-separated) - return "NOT_FOUND" if not visible
      LINE_ITEM_QUANTITIES: Item quantities (pipe-separated) - return "NOT_FOUND" if not visible
      LINE_ITEM_PRICES: Individual item unit prices (pipe-separated with $) - return "NOT_FOUND" if not visible
      LINE_ITEM_TOTAL_PRICES: Item total prices (pipe-separated with $) - return "NOT_FOUND" if not visible
      GST_AMOUNT: GST/tax amount (with $ symbol) - return "NOT_FOUND" if not visible
      IS_GST_INCLUDED: true/false - whether GST is included in total - return "NOT_FOUND" if not visible
      TOTAL_AMOUNT: Final total amount (with $ symbol) - return "NOT_FOUND" if not visible
      STATEMENT_DATE_RANGE: Date range for statements (DD/MM/YYYY - DD/MM/YYYY) - return "NOT_FOUND" if not visible
      TRANSACTION_DATES: Transaction dates (pipe-separated, DD/MM/YYYY) - return "NOT_FOUND" if not visible
      TRANSACTION_AMOUNTS_PAID: Transaction amounts (pipe-separated with $) - return "NOT_FOUND" if not visible

    output_format: |
      DOCUMENT_TYPE: NOT_FOUND
      INVOICE_DATE: NOT_FOUND
      SUPPLIER_NAME: NOT_FOUND
      BUSINESS_ABN: NOT_FOUND
      BUSINESS_ADDRESS: NOT_FOUND
      PAYER_NAME: NOT_FOUND
      PAYER_ADDRESS: NOT_FOUND
      LINE_ITEM_DESCRIPTIONS: NOT_FOUND
      LINE_ITEM_QUANTITIES: NOT_FOUND
      LINE_ITEM_PRICES: NOT_FOUND
      LINE_ITEM_TOTAL_PRICES: NOT_FOUND
      GST_AMOUNT: NOT_FOUND
      IS_GST_INCLUDED: NOT_FOUND
      TOTAL_AMOUNT: NOT_FOUND
      STATEMENT_DATE_RANGE: NOT_FOUND
      TRANSACTION_DATES: NOT_FOUND
      TRANSACTION_AMOUNTS_PAID: NOT_FOUND

  # --------------------------------------------------------------------------
  # LLAMA UNIVERSAL TEMPLATE - Single-pass all fields (future use)
  # --------------------------------------------------------------------------
  llama:
    system_prompt: |
      You are an expert document analyzer. Extract structured data from this business document image.
      
      🚨 CRITICAL RULE: If you cannot clearly see a field in the document, return "NOT_FOUND"
      🚨 DO NOT GUESS or INFER missing information
      🚨 Only extract what is explicitly visible in the image
      
      FORMATTING REQUIREMENTS:
      1. Fields not visible/applicable: Return "NOT_FOUND"
      2. Monetary values: Include currency symbols ($8.62, not 8.62)
      3. Addresses: Extract complete multi-line addresses
      4. Dates: Use DD/MM/YYYY format
      5. Lists: Use pipe separation (Item1 | Item2 | Item3)
      6. Boolean values: true/false (lowercase)

    field_instructions: |
      Extract the following 15 fields from this document:
      
      DOCUMENT_TYPE: NOT_FOUND (will be auto-determined from your extraction results)
      INVOICE_DATE: Date of invoice/receipt (DD/MM/YYYY format) - return "NOT_FOUND" if not visible
      SUPPLIER_NAME: Company/business name providing goods/services - return "NOT_FOUND" if not visible
      BUSINESS_ABN: 11-digit Australian Business Number - return "NOT_FOUND" if not visible
      BUSINESS_ADDRESS: Complete supplier business address - return "NOT_FOUND" if not visible
      PAYER_NAME: Customer/payer name - return "NOT_FOUND" if not visible
      PAYER_ADDRESS: Customer/payer address - return "NOT_FOUND" if not visible
      LINE_ITEM_DESCRIPTIONS: Item names/descriptions (pipe-separated) - return "NOT_FOUND" if not visible
      LINE_ITEM_TOTAL_PRICES: Item prices (pipe-separated with $) - return "NOT_FOUND" if not visible
      GST_AMOUNT: GST/tax amount (with $ symbol) - return "NOT_FOUND" if not visible
      IS_GST_INCLUDED: true/false - whether GST is included in total - return "NOT_FOUND" if not visible
      TOTAL_AMOUNT: Final total amount (with $ symbol) - return "NOT_FOUND" if not visible
      STATEMENT_DATE_RANGE: Date range for statements (DD/MM/YYYY - DD/MM/YYYY) - return "NOT_FOUND" if not visible
      TRANSACTION_DATES: Transaction dates (pipe-separated, DD/MM/YYYY) - return "NOT_FOUND" if not visible
      TRANSACTION_AMOUNTS_PAID: Transaction amounts (pipe-separated with $) - return "NOT_FOUND" if not visible

