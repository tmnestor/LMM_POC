################################################################################
# UNIFIED SCHEMA CONFIGURATION - TRUE YAML-FIRST ARCHITECTURE
################################################################################
# Single source of truth for all field definitions, document types, and prompt generation
# BOSS FIELD REDUCTION: 17 fields (15 original + 2 new line item fields)
#
# FILE STRUCTURE:
# 1. METADATA           - Schema version and description
# 2. FIELD ORDER        - Semantic ordering of all fields
# 3. FIELD DEFINITIONS  - Complete field specifications
# 4. DOCUMENT TYPES     - Document-specific configurations
# 5. PROMPT TEMPLATES   - Model-specific prompt generation
# 6. FIELD CATEGORIES   - Grouping for evaluation reporting
# 7. EVALUATION CONFIG  - Evaluation and validation settings
# 8. CRITICAL FIELDS    - Fields requiring special attention
# 9. VERSION HISTORY    - Schema evolution tracking
################################################################################

# ==============================================================================
# 1. METADATA
# ==============================================================================
schema_version: "5.0-unified"
description: "Unified schema eliminating cascade failures and Python dynamic overrides"

# ==============================================================================
# 2. FIELD ORDER - Semantic flow through document
# ==============================================================================
# Document identifiers → Business → Payer → Temporal → Line Items → Transactions → Financial
semantic_field_order:
  # --------------------------------------------------------------------------
  # LLAMA FIELD ORDER - Explicit semantic ordering for field extraction
  # --------------------------------------------------------------------------
  llama:
    - DOCUMENT_TYPE
    - BUSINESS_ABN
    - SUPPLIER_NAME
    - BUSINESS_ADDRESS
    - PAYER_NAME
    - PAYER_ADDRESS
    - INVOICE_DATE
    - STATEMENT_DATE_RANGE
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
    - IS_GST_INCLUDED
    - GST_AMOUNT
    - TOTAL_AMOUNT
    - TRANSACTION_DATES
    - TRANSACTION_AMOUNTS_PAID
  
  # --------------------------------------------------------------------------
  # INTERNVL3 FIELD ORDER - Explicit semantic ordering for field extraction
  # --------------------------------------------------------------------------
  internvl3:
    - DOCUMENT_TYPE
    - BUSINESS_ABN
    - SUPPLIER_NAME
    - BUSINESS_ADDRESS
    - PAYER_NAME
    - PAYER_ADDRESS
    - INVOICE_DATE
    - STATEMENT_DATE_RANGE
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
    - IS_GST_INCLUDED
    - GST_AMOUNT
    - TOTAL_AMOUNT
    - TRANSACTION_DATES
    - TRANSACTION_AMOUNTS_PAID

# ==============================================================================
# 3. FIELD DEFINITIONS - Complete specifications for all 17 fields
# ==============================================================================
# Each field includes:
# - order: Position in extraction sequence
# - instruction: How to extract the field
# - description: What the field represents
# - applicable_documents: Which document types use this field
# - required: Whether field is mandatory
# - category: Field grouping for reporting
# - critical: (optional) Whether field needs special validation
field_definitions:
  # --------------------------------------------------------------------------
  # LLAMA FIELD DEFINITIONS - Explicit and complete
  # --------------------------------------------------------------------------
  llama:
    DOCUMENT_TYPE:
      order: 1
      instruction: "[document type (INVOICE/RECEIPT/STATEMENT) or NOT_FOUND]"
      description: "Essential document identifier"
      applicable_documents: [invoice, receipt, bank_statement]
      required: true
      category: "identification"
      
    BUSINESS_ABN:
      order: 2
      instruction: "[11-digit Australian Business Number (e.g. XX XXX XXX XXX or XXXXXXXXXXX) or NOT_FOUND]"
      description: "Essential business identifier"
      applicable_documents: [invoice, receipt]
      required: true
      category: "identification"
      critical: true
      
    SUPPLIER_NAME:
      order: 3
      instruction: "[business name from document header or NOT_FOUND]"
      description: "Essential supplier information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "business_details"
      critical: true
      
    BUSINESS_ADDRESS:
      order: 4
      instruction: "[business address or NOT_FOUND]"
      description: "Essential supplier location"
      applicable_documents: [invoice, receipt]
      required: true
      category: "business_details"
      
    PAYER_NAME:
      order: 5
      instruction: "[payer name or NOT_FOUND]"
      description: "Essential payer information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "customer_details"
      
    PAYER_ADDRESS:
      order: 6
      instruction: "[payer address or NOT_FOUND]"
      description: "Essential payer location"
      applicable_documents: [invoice, receipt]
      required: true
      category: "customer_details"
      
    INVOICE_DATE:
      order: 7
      instruction: "[invoice date or NOT_FOUND]"
      description: "Essential temporal information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "temporal"
      
    STATEMENT_DATE_RANGE:
      order: 8
      instruction: "[statement period or date range or NOT_FOUND]"
      description: "Essential bank statement temporal"
      applicable_documents: [bank_statement]
      required: true
      category: "temporal"
      
    LINE_ITEM_DESCRIPTIONS:
      order: 9
      instruction: "[pipe-separated list of ALL items or transaction descriptions or NOT_FOUND]"
      description: "Essential line items / transaction descriptions"
      applicable_documents: [invoice, receipt, bank_statement]
      required: true
      category: "line_items"
      
    LINE_ITEM_QUANTITIES:
      order: 10
      instruction: "[pipe-separated quantities or NOT_FOUND]"
      description: "Quantities ordered"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    LINE_ITEM_PRICES:
      order: 11
      instruction: "[pipe-separated unit prices (per item, not totals) or NOT_FOUND]"
      description: "Unit prices (price per individual item, NOT total prices)"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    LINE_ITEM_TOTAL_PRICES:
      order: 12
      instruction: "[pipe-separated line totals from 'Amount' column or NOT_FOUND]"
      description: "Total price per line item (quantity × unit price), often labeled 'Amount' in documents"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    IS_GST_INCLUDED:
      order: 13
      instruction: "[is the GST amount shown? Answer with (true/false only)]"
      description: "Essential tax classification"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      
    GST_AMOUNT:
      order: 14
      instruction: "[how much GST is charged in dollars with 2 decimals or NOT_FOUND]"
      description: "Essential tax information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      critical: true
      
    TOTAL_AMOUNT:
      order: 15
      instruction: "[total amount in dollars with 2 decimals or NOT_FOUND]"
      description: "Essential financial total"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      critical: true
      
    TRANSACTION_DATES:
      order: 16
      instruction: "[pipe-separated dates from transaction list in chronological order or NOT_FOUND]"
      description: "Essential bank statement dates"
      applicable_documents: [bank_statement]
      required: true
      category: "transactions"
      
    TRANSACTION_AMOUNTS_PAID:
      order: 17
      instruction: "[pipe-separated transaction amounts as shown on document (extract exact amounts displayed, do not add negative signs) or NOT_FOUND]"
      description: "Essential bank statement amounts"
      applicable_documents: [bank_statement]
      required: true
      category: "transactions"
  
  # --------------------------------------------------------------------------
  # INTERNVL3 FIELD DEFINITIONS - Enhanced with visual location hints
  # --------------------------------------------------------------------------
  internvl3:
    DOCUMENT_TYPE:
      order: 1
      instruction: "[Look for words like INVOICE, RECEIPT, TAX INVOICE, STATEMENT at the top - answer with INVOICE/RECEIPT/STATEMENT or NOT_FOUND]"
      description: "Essential document identifier"
      applicable_documents: [invoice, receipt, bank_statement]
      required: true
      category: "identification"
      
    BUSINESS_ABN:
      order: 2
      instruction: "[Find 'ABN' label followed by 11 digits (e.g. XX XXX XXX XXX) - usually near business name at top or NOT_FOUND]"
      description: "Essential business identifier"
      applicable_documents: [invoice, receipt]
      required: true
      category: "identification"
      critical: true
      
    SUPPLIER_NAME:
      order: 3
      instruction: "[Look at the TOP/HEADER of document for the LARGEST business/company name text - this is the supplier name or NOT_FOUND]"
      description: "Essential supplier information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "business_details"
      critical: true
      
    BUSINESS_ADDRESS:
      order: 4
      instruction: "[Find the street address directly under or near the business name at the TOP of document or NOT_FOUND]"
      description: "Essential supplier location"
      applicable_documents: [invoice, receipt]
      required: true
      category: "business_details"
      
    PAYER_NAME:
      order: 5
      instruction: "[Look for 'Bill To:', 'Customer:', 'Sold To:', or 'Payer:' section - extract the person/company name there or NOT_FOUND]"
      description: "Essential payer information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "customer_details"
      
    PAYER_ADDRESS:
      order: 6
      instruction: "[Find the address in the 'Bill To:', 'Customer:', or 'Payer:' section (usually middle of document) or NOT_FOUND]"
      description: "Essential payer location"
      applicable_documents: [invoice, receipt]
      required: true
      category: "customer_details"
      
    INVOICE_DATE:
      order: 7
      instruction: "[Look for 'Date:', 'Invoice Date:', 'Transaction Date:' label - extract the date value next to it or NOT_FOUND]"
      description: "Essential temporal information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "temporal"
      
    STATEMENT_DATE_RANGE:
      order: 8
      instruction: "[Find 'Statement Period:', 'Period:', or date range at top of statement (e.g. '1 Jan - 31 Jan') or NOT_FOUND]"
      description: "Essential bank statement temporal"
      applicable_documents: [bank_statement]
      required: true
      category: "temporal"
      
    LINE_ITEM_DESCRIPTIONS:
      order: 9
      instruction: "[Find the MAIN TABLE/LIST in middle of document - extract ALL product/service names from the description column, separate with ' | ' or NOT_FOUND]"
      description: "Essential line items / transaction descriptions"
      applicable_documents: [invoice, receipt, bank_statement]
      required: true
      category: "line_items"
      
    LINE_ITEM_QUANTITIES:
      order: 10
      instruction: "[In the main table, find 'QTY' or 'Quantity' column - list ALL quantity values separated by ' | ' in same order as items or NOT_FOUND]"
      description: "Quantities ordered"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    LINE_ITEM_PRICES:
      order: 11
      instruction: "[Find 'Unit Price', 'Price Each', or 'Rate' column (NOT the total) - list each price per unit separated by ' | ' or NOT_FOUND]"
      description: "Unit prices (price per individual item, NOT total prices)"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    LINE_ITEM_TOTAL_PRICES:
      order: 12
      instruction: "[Find 'Amount', 'Total', or 'Line Total' column (rightmost in table) - list the calculated totals separated by ' | ' or NOT_FOUND]"
      description: "Total price per line item (quantity × unit price), often labeled 'Amount' in documents"
      applicable_documents: [invoice, receipt]
      required: true
      category: "line_items"
      
    IS_GST_INCLUDED:
      order: 13
      instruction: "[Check if document shows 'GST' with a dollar amount anywhere - answer 'true' if GST amount exists, 'false' if not]"
      description: "Essential tax classification"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      
    GST_AMOUNT:
      order: 14
      instruction: "[Look at BOTTOM section for 'GST:', 'Tax:', or 'GST 10%' - extract the dollar amount next to it (e.g. 8.62 or $8.62) or NOT_FOUND]"
      description: "Essential tax information"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      critical: true
      
    TOTAL_AMOUNT:
      order: 15
      instruction: "[Find the LARGEST dollar amount at BOTTOM - look for 'TOTAL:', 'Total Due:', 'Amount Due:' - extract value with 2 decimals or NOT_FOUND]"
      description: "Essential financial total"
      applicable_documents: [invoice, receipt]
      required: true
      category: "financial"
      critical: true
      
    TRANSACTION_DATES:
      order: 16
      instruction: "[In transaction table, find date column - list ALL dates in order separated by ' | ' or NOT_FOUND]"
      description: "Essential bank statement dates"
      applicable_documents: [bank_statement]
      required: true
      category: "transactions"
      
    TRANSACTION_AMOUNTS_PAID:
      order: 17
      instruction: "[In transaction table, find amount/debit/credit columns - list ALL amounts as shown separated by ' | ' or NOT_FOUND]"
      description: "Essential bank statement amounts"
      applicable_documents: [bank_statement]
      required: true
      category: "transactions"

# ==============================================================================
# 4. DOCUMENT TYPE CONFIGURATIONS
# ==============================================================================
# Configuration for each supported document type:
# - accuracy_threshold: Minimum accuracy for deployment
# - field_count: Number of fields for this document type
# - required_fields: Fields that must be extracted
# - critical_fields: Fields requiring highest accuracy
# - ato_compliance_fields: Australian Tax Office compliance requirements
# - aliases: Alternative names for document type detection
document_types:
  # --------------------------------------------------------------------------
  # LLAMA DOCUMENT TYPE CONFIGURATIONS - Explicit and complete
  # --------------------------------------------------------------------------
  llama:
    invoice:
      document_type: "invoice"
      accuracy_threshold: 0.95
      field_count: 14
      required_fields:
        - DOCUMENT_TYPE
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - BUSINESS_ADDRESS
        - PAYER_NAME
        - PAYER_ADDRESS
        - INVOICE_DATE
        - LINE_ITEM_DESCRIPTIONS
        - LINE_ITEM_QUANTITIES
        - LINE_ITEM_PRICES
        - LINE_ITEM_TOTAL_PRICES
        - IS_GST_INCLUDED
        - GST_AMOUNT
        - TOTAL_AMOUNT
      critical_fields:
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - GST_AMOUNT
        - TOTAL_AMOUNT
      ato_compliance_fields:
        - BUSINESS_ABN
        - GST_AMOUNT
        - INVOICE_DATE
        - SUPPLIER_NAME
      aliases:
        - "invoice"
        - "tax invoice"
        - "tax_invoice"
        - "bill"
        - "estimate"
        - "quote"
        - "quotation"
        - "proforma invoice"
        - "proforma_invoice"
        
    receipt:
      document_type: "receipt"
      accuracy_threshold: 0.85
      field_count: 14
      required_fields:
        - DOCUMENT_TYPE
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - BUSINESS_ADDRESS
        - PAYER_NAME
        - PAYER_ADDRESS
        - INVOICE_DATE  # For receipts, this is the transaction date
        - LINE_ITEM_DESCRIPTIONS
        - LINE_ITEM_QUANTITIES
        - LINE_ITEM_PRICES
        - LINE_ITEM_TOTAL_PRICES
        - IS_GST_INCLUDED
        - GST_AMOUNT
        - TOTAL_AMOUNT
      critical_fields:
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - GST_AMOUNT
        - TOTAL_AMOUNT
      ato_compliance_fields:
        - BUSINESS_ABN
        - GST_AMOUNT
      aliases:
        - "receipt"
        - "purchase receipt"
        - "purchase_receipt"
        - "payment receipt"
        - "payment_receipt"
        - "sales receipt"
        - "sales_receipt"
        - "store receipt"
        
    bank_statement:
      document_type: "bank_statement"
      accuracy_threshold: 0.90
      field_count: 5
      required_fields:
        - DOCUMENT_TYPE
        - STATEMENT_DATE_RANGE
        - LINE_ITEM_DESCRIPTIONS
        - TRANSACTION_DATES
        - TRANSACTION_AMOUNTS_PAID
      critical_fields:
        - STATEMENT_DATE_RANGE
        - TRANSACTION_AMOUNTS_PAID
      ato_compliance_fields: []
      aliases:
        - "bank statement"
        - "bank_statement"
        - "bankstatement"
        - "account statement"
        - "account_statement"
        - "credit card statement"
        - "credit_card_statement"
        - "creditcard statement"
        - "statement"
        - "bank account statement"
        - "monthly statement"
  
  # --------------------------------------------------------------------------
  # INTERNVL3 DOCUMENT TYPE CONFIGURATIONS - Explicit and complete
  # --------------------------------------------------------------------------
  internvl3:
    invoice:
      document_type: "invoice"
      accuracy_threshold: 0.95
      field_count: 14
      required_fields:
        - DOCUMENT_TYPE
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - BUSINESS_ADDRESS
        - PAYER_NAME
        - PAYER_ADDRESS
        - INVOICE_DATE
        - LINE_ITEM_DESCRIPTIONS
        - LINE_ITEM_QUANTITIES
        - LINE_ITEM_PRICES
        - LINE_ITEM_TOTAL_PRICES
        - IS_GST_INCLUDED
        - GST_AMOUNT
        - TOTAL_AMOUNT
      critical_fields:
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - GST_AMOUNT
        - TOTAL_AMOUNT
      ato_compliance_fields:
        - BUSINESS_ABN
        - GST_AMOUNT
        - INVOICE_DATE
        - SUPPLIER_NAME
      aliases:
        - "invoice"
        - "tax invoice"
        - "tax_invoice"
        - "bill"
        - "estimate"
        - "quote"
        - "quotation"
        - "proforma invoice"
        - "proforma_invoice"
        
    receipt:
      document_type: "receipt"
      accuracy_threshold: 0.85
      field_count: 14
      required_fields:
        - DOCUMENT_TYPE
        - BUSINESS_ABN
        - SUPPLIER_NAME
        - BUSINESS_ADDRESS
        - PAYER_NAME
        - PAYER_ADDRESS
        - INVOICE_DATE  # For receipts, this is the transaction date
        - LINE_ITEM_DESCRIPTIONS
        - LINE_ITEM_QUANTITIES
        - LINE_ITEM_PRICES
        - LINE_ITEM_TOTAL_PRICES
        - IS_GST_INCLUDED
