################################################################################
# UNIFIED SCHEMA CONFIGURATION - TRUE YAML-FIRST ARCHITECTURE
################################################################################
# Single source of truth for all field definitions, document types, and prompt generation
# BOSS FIELD REDUCTION: 17 fields (15 original + 2 new line item fields)
#
# FILE STRUCTURE:
# 1. METADATA           - Schema version and description
# 2. FIELD ORDER        - Semantic ordering of all fields
# 3. FIELD DEFINITIONS  - Complete field specifications
# 4. DOCUMENT TYPES     - Document-specific configurations
# 5. PROMPT TEMPLATES   - Model-specific prompt generation
# 6. FIELD CATEGORIES   - Grouping for evaluation reporting
# 7. EVALUATION CONFIG  - Evaluation and validation settings
# 8. CRITICAL FIELDS    - Fields requiring special attention
# 9. VERSION HISTORY    - Schema evolution tracking
################################################################################

# ==============================================================================
# 1. METADATA
# ==============================================================================
schema_version: "5.0-unified"
description: "Unified schema eliminating cascade failures and Python dynamic overrides"

# ==============================================================================
# 2. FIELD ORDER - Semantic flow through document
# ==============================================================================
# Document identifiers → Business → Payer → Temporal → Line Items → Transactions → Financial
semantic_field_order:
  - DOCUMENT_TYPE
  - BUSINESS_ABN
  - SUPPLIER_NAME
  - BUSINESS_ADDRESS
  - PAYER_NAME
  - PAYER_ADDRESS
  - INVOICE_DATE
  - STATEMENT_DATE_RANGE
  - LINE_ITEM_DESCRIPTIONS
  - LINE_ITEM_QUANTITIES
  - LINE_ITEM_PRICES
  - LINE_ITEM_TOTAL_PRICES
  - IS_GST_INCLUDED
  - GST_AMOUNT
  - TOTAL_AMOUNT
  - TRANSACTION_DATES
  - TRANSACTION_AMOUNTS_PAID

# ==============================================================================
# 3. FIELD DEFINITIONS - Complete specifications for all 17 fields
# ==============================================================================
# Each field includes:
# - order: Position in extraction sequence
# - instruction: How to extract the field
# - description: What the field represents
# - applicable_documents: Which document types use this field
# - required: Whether field is mandatory
# - category: Field grouping for reporting
# - critical: (optional) Whether field needs special validation
field_definitions:
  DOCUMENT_TYPE:
    order: 1
    instruction: "[document type (INVOICE/RECEIPT/STATEMENT) or NOT_FOUND]"
    description: "Essential document identifier"
    applicable_documents: [invoice, receipt, bank_statement]
    required: true
    category: "identification"
    
  BUSINESS_ABN:
    order: 2
    instruction: "[11-digit Australian Business Number (e.g. XX XXX XXX XXX or XXXXXXXXXXX) or NOT_FOUND]"
    description: "Essential business identifier"
    applicable_documents: [invoice, receipt]
    required: true
    category: "identification"
    critical: true
    
  SUPPLIER_NAME:
    order: 3
    instruction: "[business name from document header or NOT_FOUND]"
    description: "Essential supplier information"
    applicable_documents: [invoice, receipt]
    required: true
    category: "business_details"
    critical: true
    
  BUSINESS_ADDRESS:
    order: 4
    instruction: "[business address or NOT_FOUND]"
    description: "Essential supplier location"
    applicable_documents: [invoice, receipt]
    required: true
    category: "business_details"
    
  PAYER_NAME:
    order: 5
    instruction: "[payer name or NOT_FOUND]"
    description: "Essential payer information"
    applicable_documents: [invoice, receipt]
    required: true
    category: "customer_details"
    
  PAYER_ADDRESS:
    order: 6
    instruction: "[payer address or NOT_FOUND]"
    description: "Essential payer location"
    applicable_documents: [invoice, receipt]
    required: true
    category: "customer_details"
    
  INVOICE_DATE:
    order: 7
    instruction: "[invoice date or NOT_FOUND]"
    description: "Essential temporal information"
    applicable_documents: [invoice, receipt]
    required: true
    category: "temporal"
    
  STATEMENT_DATE_RANGE:
    order: 8
    instruction: "[statement period or date range or NOT_FOUND]"
    description: "Essential bank statement temporal"
    applicable_documents: [bank_statement]
    required: true
    category: "temporal"
    
  LINE_ITEM_DESCRIPTIONS:
    order: 9
    instruction: "[pipe-separated list of ALL items or transaction descriptions or NOT_FOUND]"
    description: "Essential line items / transaction descriptions"
    applicable_documents: [invoice, receipt, bank_statement]
    required: true
    category: "line_items"
    
  LINE_ITEM_QUANTITIES:
    order: 10
    instruction: "[pipe-separated quantities or NOT_FOUND]"
    description: "Quantities ordered"
    applicable_documents: [invoice, receipt]
    required: true
    category: "line_items"
    
  LINE_ITEM_PRICES:
    order: 11
    instruction: "[pipe-separated unit prices (per item, not totals) or NOT_FOUND]"
    description: "Unit prices (price per individual item, NOT total prices)"
    applicable_documents: [invoice, receipt]
    required: true
    category: "line_items"
    
  LINE_ITEM_TOTAL_PRICES:
    order: 12
    instruction: "[pipe-separated line totals from 'Amount' column or NOT_FOUND]"
    description: "Total price per line item (quantity × unit price), often labeled 'Amount' in documents"
    applicable_documents: [invoice, receipt]
    required: true
    category: "line_items"
    
  IS_GST_INCLUDED:
    order: 13
    instruction: "[is the GST amount shown? Answer with (true/false only)]"
    description: "Essential tax classification"
    applicable_documents: [invoice, receipt]
    required: true
    category: "financial"
    
  GST_AMOUNT:
    order: 14
    instruction: "[how much GST is charged in dollars with 2 decimals or NOT_FOUND]"
    description: "Essential tax information"
    applicable_documents: [invoice, receipt]
    required: true
    category: "financial"
    critical: true
    
  TOTAL_AMOUNT:
    order: 15
    instruction: "[total amount in dollars with 2 decimals or NOT_FOUND]"
    description: "Essential financial total"
    applicable_documents: [invoice, receipt]
    required: true
    category: "financial"
    critical: true
    
  TRANSACTION_DATES:
    order: 16
    instruction: "[pipe-separated dates from transaction list in chronological order or NOT_FOUND]"
    description: "Essential bank statement dates"
    applicable_documents: [bank_statement]
    required: true
    category: "transactions"
    
  TRANSACTION_AMOUNTS_PAID:
    order: 17
    instruction: "[pipe-separated transaction amounts as shown on document (extract exact amounts displayed, do not add negative signs) or NOT_FOUND]"
    description: "Essential bank statement amounts"
    applicable_documents: [bank_statement]
    required: true
    category: "transactions"

# ==============================================================================
# 4. DOCUMENT TYPE CONFIGURATIONS
# ==============================================================================
# Configuration for each supported document type:
# - accuracy_threshold: Minimum accuracy for deployment
# - field_count: Number of fields for this document type
# - required_fields: Fields that must be extracted
# - critical_fields: Fields requiring highest accuracy
# - ato_compliance_fields: Australian Tax Office compliance requirements
# - aliases: Alternative names for document type detection
document_types:
  invoice:
    document_type: "invoice"
    accuracy_threshold: 0.95
    field_count: 14
    required_fields:
      - DOCUMENT_TYPE
      - BUSINESS_ABN
      - SUPPLIER_NAME
      - BUSINESS_ADDRESS
      - PAYER_NAME
      - PAYER_ADDRESS
      - INVOICE_DATE
      - LINE_ITEM_DESCRIPTIONS
      - LINE_ITEM_QUANTITIES
      - LINE_ITEM_PRICES
      - LINE_ITEM_TOTAL_PRICES
      - IS_GST_INCLUDED
      - GST_AMOUNT
      - TOTAL_AMOUNT
    critical_fields:
      - BUSINESS_ABN
      - SUPPLIER_NAME
      - GST_AMOUNT
      - TOTAL_AMOUNT
    ato_compliance_fields:
      - BUSINESS_ABN
      - GST_AMOUNT
      - INVOICE_DATE
      - SUPPLIER_NAME
    aliases:
      - "invoice"
      - "tax invoice"
      - "tax_invoice"
      - "bill"
      - "estimate"
      - "quote"
      - "quotation"
      - "proforma invoice"
      - "proforma_invoice"
      
  receipt:
    document_type: "receipt"
    accuracy_threshold: 0.85
    field_count: 14
    required_fields:
      - DOCUMENT_TYPE
      - BUSINESS_ABN
      - SUPPLIER_NAME
      - BUSINESS_ADDRESS
      - PAYER_NAME
      - PAYER_ADDRESS
      - INVOICE_DATE  # For receipts, this is the transaction date
      - LINE_ITEM_DESCRIPTIONS
      - LINE_ITEM_QUANTITIES
      - LINE_ITEM_PRICES
      - LINE_ITEM_TOTAL_PRICES
      - IS_GST_INCLUDED
      - GST_AMOUNT
      - TOTAL_AMOUNT
    critical_fields:
      - BUSINESS_ABN
      - SUPPLIER_NAME
      - GST_AMOUNT
      - TOTAL_AMOUNT
    ato_compliance_fields:
      - BUSINESS_ABN
      - GST_AMOUNT
    aliases:
      - "receipt"
      - "purchase receipt"
      - "purchase_receipt"
      - "payment receipt"
      - "payment_receipt"
      - "sales receipt"
      - "sales_receipt"
      - "store receipt"
      
  bank_statement:
    document_type: "bank_statement"
    accuracy_threshold: 0.90
    field_count: 5
    required_fields:
      - DOCUMENT_TYPE
      - STATEMENT_DATE_RANGE
      - LINE_ITEM_DESCRIPTIONS
      - TRANSACTION_DATES
      - TRANSACTION_AMOUNTS_PAID
    critical_fields:
      - STATEMENT_DATE_RANGE
      - TRANSACTION_AMOUNTS_PAID
    ato_compliance_fields: []
    aliases:
      - "bank statement"
      - "bank_statement"
      - "bankstatement"
      - "account statement"
      - "account_statement"
      - "credit card statement"
      - "credit_card_statement"
      - "creditcard statement"
      - "statement"
      - "bank account statement"
      - "monthly statement"

# ==============================================================================
# 5. PROMPT TEMPLATES - Model-specific prompt generation
# ==============================================================================
# Templates used to generate extraction prompts:
# - Default templates: Used when no model-specific override exists
# - Model-specific overrides: Customizations for specific models
#   - llama: Optimized for Llama-3.2-Vision
#   - internvl3: Optimized for InternVL3 (currently identical to llama)
#
# Template variables available:
# - {field_count}: Number of fields to extract
# - {last_field}: Name of the last field in the list
# - {document_type}: Type of document being processed
prompt_templates:
  # ----------------------------------------------------------------------------
  # DEFAULT TEMPLATES - Used when no model-specific override exists
  # ----------------------------------------------------------------------------
  expertise_frame: "Extract structured data from this business document image using ESSENTIAL REDUCED FIELD SCHEMA."
  
  critical_instructions_header: "CRITICAL INSTRUCTIONS - ESSENTIAL FIELD REDUCTION:"
  critical_instructions:
    - "Output ONLY the structured data below"
    - "Do NOT include any conversation text"
    - "Do NOT repeat the user's request"
    - "Do NOT include <image> tokens"
    - "Start immediately with DOCUMENT_TYPE"
    - "Stop immediately after {last_field}"
  
  # ----------------------------------------------------------------------------
  # MODEL-SPECIFIC OVERRIDES - Merged with defaults for each model
  # ----------------------------------------------------------------------------
  # NOTE: Currently both models use identical prompts for consistency
  # Customizations can be added here when needed without changing code
  model_specific:
    # --------------------------------------------------------------------------
    # LLAMA-3.2-VISION PROMPTS
    # --------------------------------------------------------------------------
    llama:
      expertise_frame: "You are an expert document analyzer. Extract structured data from this business document image using ESSENTIAL REDUCED FIELD SCHEMA."
      critical_instructions_header: "CRITICAL INSTRUCTIONS FOR LLAMA - ESSENTIAL FIELD REDUCTION:"
      critical_instructions:
        - "Output ONLY the structured data below"
        - "Do NOT include any conversation text or explanations"
        - "Do NOT repeat the user's request"
        - "Do NOT include <image> tokens"
        - "Be extremely precise with monetary values and ABN formatting"
        - "Start immediately with DOCUMENT_TYPE"
        - "Stop immediately after {last_field}"
    
    # --------------------------------------------------------------------------
    # INTERNVL3 PROMPTS
    # --------------------------------------------------------------------------
    # Balanced approach: Direct style but with complete instructions
    internvl3:
      expertise_frame: "Extract structured data from this business document image. Read the entire document carefully and extract all requested fields."
      
      critical_instructions_header: "CRITICAL EXTRACTION INSTRUCTIONS:"
      critical_instructions:
        - "Output ONLY the structured data below"
        - "Do NOT include any conversation text or explanations"
        - "Do NOT repeat the user's request"
        - "Do NOT include <image> tokens"
        - "Be extremely precise with monetary values and ABN formatting"
        - "Look for GST/tax amounts in the document"
        - "Extract complete addresses including postcode"
        - "For LINE_ITEM_DESCRIPTIONS: Find the items/products section and list ALL items separated by pipes (|)"
        - "Include every product, service, or item listed in the document"
        - "Start immediately with DOCUMENT_TYPE"
        - "Stop immediately after {last_field}"
      
      output_format: "REQUIRED OUTPUT - EXTRACT ALL {field_count} FIELDS BELOW:"
      
      stop_instruction: "Extract every field. Output exactly {field_count} lines. Stop after {last_field}."
    
  output_format: "REQUIRED OUTPUT FORMAT - ESSENTIAL REDUCED SCHEMA ({field_count} ESSENTIAL FIELDS):"
  
  format_rules_header: "OUTPUT RULES - ESSENTIAL REDUCED SCHEMA:"
  format_rules:
    - "NEVER use: **KEY:** or **KEY** or *KEY* or any formatting"
    - "Plain text only - NO markdown, NO bold, NO italic"
    - "Include ALL {field_count} ESSENTIAL keys even if value is NOT_FOUND"
    - "Output ONLY these {field_count} lines, nothing else"
    - "Use exact text from document (e.g., \"TAX INVOICE\" not \"Invoice\")"
    - "Use pipe separators for lists (e.g., \"item1 | item2 | item3\")"
    - "Be conservative: use NOT_FOUND if field is truly missing"
    - "For boolean fields: use \"true\" or \"false\" (not \"yes\"/\"no\")"
    - "ESSENTIAL PERFORMANCE: Focus on essential fields only for maximum extraction speed"
    - "For calculated fields: show computed values with proper formatting"
    - "For transaction lists: use pipe separators between transactions"
    - "For amounts: extract exactly as shown, do NOT add negative signs or modify values"
    
  stop_instruction: "STOP AFTER the {last_field}. Do not add explanations or comments."

# ==============================================================================
# 6. FIELD CATEGORIES - Grouping for evaluation and reporting
# ==============================================================================
# Fields grouped by business function for analysis and reporting
# Used by evaluation metrics to calculate category-level accuracy
field_categories:
  identification:
    - DOCUMENT_TYPE
    - BUSINESS_ABN
  business_details:
    - SUPPLIER_NAME
    - BUSINESS_ADDRESS
  customer_details:
    - PAYER_NAME
    - PAYER_ADDRESS
  temporal:
    - INVOICE_DATE
    - STATEMENT_DATE_RANGE
  line_items:
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
  financial:
    - IS_GST_INCLUDED
    - GST_AMOUNT
    - TOTAL_AMOUNT
  transactions:
    - TRANSACTION_DATES
    - TRANSACTION_AMOUNTS_PAID

# ==============================================================================
# 7. EVALUATION CONFIGURATION
# ==============================================================================
# Settings for field extraction evaluation and validation
# - field_accuracy_threshold: Minimum accuracy per field
# - detection_config: Document type detection settings
# - fuzzy_matching: String similarity matching for text fields
# - field_type_handling: Special handling for different field types
evaluation:
  field_accuracy_threshold: 0.8
  detection_config:
    confidence_threshold: 0.85
    fallback_type: "unknown"
  
  fuzzy_matching:
    enabled: true
    ratio_threshold: 0.85
    
  field_type_handling:
    monetary_fields:
      normalize_currency: true
      ignore_decimal_differences: false
      tolerance: 0.01
    date_fields:
      flexible_parsing: true
      formats:
        - "%d/%m/%Y"
        - "%Y-%m-%d"
        - "%d-%m-%Y"
        - "%d %b %Y"
    list_fields:
      separator: "|"
      normalize_whitespace: true
      order_sensitive: false

# ==============================================================================
# 8. CRITICAL FIELDS - Fields requiring special validation
# ==============================================================================
# These fields are essential for business compliance and accuracy
# Extra validation and accuracy checks are performed on these fields
critical_fields:
  - BUSINESS_ABN    # Essential business identifier (11-digit ABN)
  - SUPPLIER_NAME   # Essential supplier information
  - GST_AMOUNT      # Essential tax information
  - TOTAL_AMOUNT    # Essential financial total

# ==============================================================================
# 9. SUPPORTED DOCUMENT TYPES - List for validation
# ==============================================================================
supported_document_types:
  - "invoice"
  - "receipt" 
  - "bank_statement"

# ==============================================================================
# 10. DOCUMENT TYPE DETECTION - Automatic document classification
# ==============================================================================
# Configuration for detecting document type from image
# Consolidated from prompts/document_type_detection.yaml
document_type_detection:
  # Detection prompt configurations by model
  prompts:
    llama:
      system_message: "You are a document classifier. Analyze this business document image."
      user_prompt: |
        What type of business document is this?
        
        Look for document types like:
        - invoice, tax invoice, bill, estimate, quote, quotation
        - bank_statement, account statement, credit card statement  
        - receipt, purchase receipt
        
        Answer with the exact document type you see (e.g., 'invoice', 'estimate', 'receipt', 'bank_statement', etc.).
      max_tokens: 50
      temperature: 0.0
      
    internvl3:
      user_prompt: |
        What document type is this?
        
        Types: invoice, estimate, quote, receipt, bank_statement, credit card statement
        
        Answer with the exact type:
      max_tokens: 20
      temperature: 0.0

  # Type mapping for variations
  type_mappings:
    # Invoice variations
    "tax invoice": "invoice"
    "commercial invoice": "invoice"
    "proforma invoice": "invoice"
    "bill": "invoice"
    "estimate": "invoice"
    "quote": "invoice"
    "quotation": "invoice"
    
    # Receipt variations
    "purchase receipt": "receipt"
    "sales receipt": "receipt"
    "transaction receipt": "receipt"
    
    # Statement variations
    "account statement": "bank_statement"
    "credit card statement": "bank_statement"
    "bank statement": "bank_statement"
    "financial statement": "bank_statement"
    "statement": "bank_statement"

  # Detection configuration
  config:
    confidence_threshold: 0.85
    fallback_type: "invoice"
    enable_debug_output: true

# ==============================================================================
# 11. VERSION HISTORY - Schema evolution tracking
# ==============================================================================
version_history:
  "5.0-unified": "Unified schema eliminating cascade failures - True YAML-first architecture"
  "4.0-reduced": "Boss field reduction - 15 essential fields"
  "3.0": "Document-aware architecture with field subsets"
  "2.0": "YAML-first architecture implementation"
  "1.0": "Initial field schema"