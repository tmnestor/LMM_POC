model:
  type: internvl3
  max_tiles: 6
  flash_attn: false
  dtype: bfloat16
  max_new_tokens: 500

data:
  dir: experiments/data

# --- Staged transaction linking overrides ---
staged_multi_receipt:
  model:
    max_tiles: 18
    max_new_tokens: 1500
  prompts:
    file: staged_transaction_linking.yaml
    stage1_key: extract_receipts
    column_extraction_key: extract_columns
    stage2_key: match_to_statement
  # Ground truth: evaluation_data/transaction_link_ground_truth.csv
