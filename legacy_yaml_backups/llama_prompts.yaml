# Llama field_grouped prompts - STANDARDIZED FIELD NAMES
# Updated for Priority 5: Field Naming Consistency
# Based on version that achieved 87.6% accuracy

regulatory_financial:
  expertise_frame: "Extract critical business identifiers and ALL financial amounts with precision."
  cognitive_context: "The Australian Business Number (BUSINESS_ABN) is an 11 digit number structured as a 9 digit identifier with two leading check digits (may be formatted with spaces like XX XXX XXX XXX). TOTAL_AMOUNT is the final amount due. GST_AMOUNT is the tax amount (usually smaller, around 10% of subtotal). SUBTOTAL_AMOUNT is the amount before tax. Be EXACT with decimal places - copy them precisely from the document."
  focus_instruction: "Extract the BUSINESS_ABN (11 digits total) and all monetary amounts. Double-check decimal places and digits (watch for 0 vs 6 confusion in OCR). Verify the BUSINESS_ABN has exactly 11 digits."

entity_contacts:
  expertise_frame: "Extract ALL contact information for both supplier and payer with EXACT digit counts."
  cognitive_context: "CRITICAL DIGIT RULES: Australian postcodes are EXACTLY 4 digits (5000 NOT 55000 or 50000). Phone numbers are EXACTLY 10 digits including area code. Area codes: (02)=Sydney, (03)=Melbourne, (04)=Mobile, (06)=Canberra, (07)=Brisbane, (08)=Adelaide/Perth. DO NOT add extra digits. If you see 'Adelaide SA 5000', the postcode is 5000 (4 digits only). If you see '(06) 4744 4248', preserve the 06 area code - do NOT change to 66."
  focus_instruction: "Extract contact details with EXACT digit counts. Postcodes: EXACTLY 4 digits. Phone numbers: EXACTLY 10 digits total. Count the digits carefully. Do NOT add or change digits."

line_item_transactions:
  expertise_frame: "Extract line item details: descriptions, quantities, and UNIT prices as COMMA-SEPARATED LISTS."
  cognitive_context: "CRITICAL: Output each field as a SINGLE LINE with COMMA-SEPARATED values. LINE_ITEM_DESCRIPTIONS: ALL product names in one line (e.g., Rice 1kg, Cheese Block 500g, Frozen Peas 1kg). LINE_ITEM_QUANTITIES: ALL quantities in one line (e.g., 3, 3, 3, 1). LINE_ITEM_PRICES: ALL UNIT prices in one line (e.g., $3.80, $8.50, $4.20). If you see '3 × $3.80 = $11.40', the PRICE is $3.80, not $11.40. DO NOT output multiple blocks or multiple LINE_ITEM_DESCRIPTIONS lines."
  focus_instruction: "Extract ALL items in COMMA-SEPARATED format. One line for ALL descriptions, one line for ALL quantities, one line for ALL prices. THREE LINES TOTAL OUTPUT."

temporal_data:
  expertise_frame: "Extract ALL date information from the document."
  cognitive_context: "CRITICAL: Look for INVOICE_DATE (document issue date), DUE_DATE (payment due date), and STATEMENT_DATE_RANGE (statement period for bank statements). Dates may be in formats like DD/MM/YYYY, DD-MM-YYYY, or written out. Statement periods may be like 'May 2025' or '01/05/2025 to 31/05/2025'."
  focus_instruction: "Extract all date fields. Look carefully for invoice dates, due dates, and statement periods. Convert to consistent format."

banking_payment:
  expertise_frame: "Extract banking and payment processing information."
  cognitive_context: "CRITICAL: Look for BANK_NAME (financial institution), BANK_BSB_NUMBER (6-digit Bank State Branch code), BANK_ACCOUNT_NUMBER (account number), and BANK_ACCOUNT_HOLDER (account holder name). BSB is NOT the same as ABN. BSB is 6 digits, ABN is 11 digits. Banking details are typically found on bank statements, not invoices."
  focus_instruction: "Extract banking details if present. BSB: EXACTLY 6 digits. Account numbers vary in length. Bank name is the financial institution, NOT the business name."

document_balances:
  expertise_frame: "Extract document classification and account balance information."
  cognitive_context: "DOCUMENT_TYPE: invoice, receipt, or statement. ACCOUNT_OPENING_BALANCE and ACCOUNT_CLOSING_BALANCE are ONLY for bank statements - NOT invoices or receipts. Opening balance is the starting amount, closing balance is the ending amount. These are different from TOTAL_AMOUNT on invoices."
  focus_instruction: "Identify document type. Extract account balances ONLY if this is a bank statement. Do NOT confuse invoice totals with account balances."

# Notes:
# - STANDARDIZED FIELD NAMES with consistent prefixing
# - BUSINESS_ prefix for business entity fields
# - PAYER_ prefix for customer information
# - BANK_ prefix for banking information  
# - LINE_ITEM_ prefix for transaction details
# - ACCOUNT_ prefix for balance information
# - _AMOUNT suffix for all monetary values
# - Maintains cognitive load optimization and performance characteristics