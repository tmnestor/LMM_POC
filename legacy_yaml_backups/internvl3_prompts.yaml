# InternVL3 Prompts Configuration - STANDARDIZED FIELD NAMES
# Updated for Priority 5: Field Naming Consistency
# Used by models/internvl3_processor.py for all extraction modes

# Single-pass prompt configuration (for default get_extraction_prompt method)
single_pass:
  # Opening prompt text
  opening_text: "Extract data from this business document."
  
  # Instruction about output format
  output_instruction: "Output ALL fields below with their exact keys."
  
  # Missing value instruction
  missing_value_instruction: "Use \"NOT_FOUND\" if field is not visible or not present."
  
  # Output format header (dynamic field count will be inserted)
  output_format_header: "OUTPUT FORMAT ({field_count} required fields):"
  
  # Field instructions for all 25 extraction fields - SEMANTIC ORDER
  field_instructions:
    # Document identifiers - start with most universal fields
    DOCUMENT_TYPE: "[document type (invoice/receipt/statement) or NOT_FOUND]"
    BUSINESS_ABN: "[11-digit Australian Business Number or NOT_FOUND]"
    SUPPLIER_NAME: "[supplier name or NOT_FOUND]"
    
    # Business entity details
    BUSINESS_ADDRESS: "[business address or NOT_FOUND]"
    BUSINESS_PHONE: "[business phone number or NOT_FOUND]"
    SUPPLIER_WEBSITE: "[supplier website or NOT_FOUND]"
    
    # Payer information
    PAYER_NAME: "[payer name or NOT_FOUND]"
    PAYER_ADDRESS: "[payer address or NOT_FOUND]"
    PAYER_PHONE: "[payer phone number or NOT_FOUND]"
    PAYER_EMAIL: "[payer email address or NOT_FOUND]"
    
    # Temporal data
    INVOICE_DATE: "[invoice date or NOT_FOUND]"
    DUE_DATE: "[payment due date or NOT_FOUND]"
    STATEMENT_DATE_RANGE: "[statement period or date range or NOT_FOUND]"
    
    # Line item details
    LINE_ITEM_DESCRIPTIONS: "[list of transaction descriptions or NOT_FOUND]"
    LINE_ITEM_QUANTITIES: "[list of quantities or NOT_FOUND]"
    LINE_ITEM_PRICES: "[individual prices in dollars or NOT_FOUND]"
    
    # Banking information
    BANK_NAME: "[bank name (NOT supplier name) or NOT_FOUND]"
    BANK_BSB_NUMBER: "[6-digit BSB (NOT ABN) or NOT_FOUND]"
    BANK_ACCOUNT_NUMBER: "[account number or NOT_FOUND]"
    BANK_ACCOUNT_HOLDER: "[account holder name or NOT_FOUND]"
    ACCOUNT_OPENING_BALANCE: "[opening balance with 2 decimals from bank statements or NOT_FOUND]"
    ACCOUNT_CLOSING_BALANCE: "[closing balance with 2 decimals (NOT total) from bank statements or NOT_FOUND]"
    
    # Financial totals - end with most important field
    SUBTOTAL_AMOUNT: "[subtotal amount in dollars with 2 decimals (e.g. $53.29) or NOT_FOUND]"
    GST_AMOUNT: "[GST amount in dollars with 2 decimals (e.g. $5.33) or NOT_FOUND]"
    TOTAL_AMOUNT: "[total amount in dollars with 2 decimals (e.g. $58.62) or NOT_FOUND]"
  
  # Closing instruction
  closing_instruction: "Provide ONLY the key-value pairs above. Be precise with numerical values."

# Grouped extraction configuration for field_grouped strategy  
regulatory_financial:
  expertise_frame: "Extract business numbers and financial amounts."
  cognitive_context: "Focus on BUSINESS_ABN (11 digits), TOTAL_AMOUNT (final amount), GST_AMOUNT (tax), and SUBTOTAL_AMOUNT (pre-tax amount)."
  focus_instruction: "Extract business ABN and all monetary amounts with exact decimal places."

entity_contacts:
  expertise_frame: "Extract all contact information."
  cognitive_context: "Get SUPPLIER_NAME, BUSINESS_ADDRESS, BUSINESS_PHONE, SUPPLIER_WEBSITE, PAYER_NAME, PAYER_ADDRESS, PAYER_PHONE, PAYER_EMAIL."
  focus_instruction: "Extract all contact details for both supplier and payer."

line_item_transactions:
  expertise_frame: "Extract line item details."
  cognitive_context: "Get LINE_ITEM_DESCRIPTIONS (product names), LINE_ITEM_QUANTITIES (amounts), and LINE_ITEM_PRICES (unit prices)."
  focus_instruction: "Extract all line item information as comma-separated lists."

temporal_data:
  expertise_frame: "Extract date information."
  cognitive_context: "Find INVOICE_DATE (when issued), DUE_DATE (payment deadline), and STATEMENT_DATE_RANGE (statement period)."
  focus_instruction: "Extract all dates and time periods from the document."

banking_payment:
  expertise_frame: "Extract banking information."
  cognitive_context: "Look for BANK_NAME, BANK_BSB_NUMBER (6 digits), BANK_ACCOUNT_NUMBER, and BANK_ACCOUNT_HOLDER."
  focus_instruction: "Extract banking details if present. BSB is 6 digits, different from 11-digit ABN."

document_balances:
  expertise_frame: "Extract document type and account balances."
  cognitive_context: "Identify DOCUMENT_TYPE (invoice/receipt/statement). Get ACCOUNT_OPENING_BALANCE and ACCOUNT_CLOSING_BALANCE only for bank statements."
  focus_instruction: "Classify document type. Extract account balances only from bank statements, not invoices."

# Notes:
# - STANDARDIZED FIELD NAMES with consistent prefixing and clear semantics
# - Simplified prompts optimized for InternVL3's concise response style
# - Maintains compatibility with existing processor architecture
# - Clear field distinctions (TOTAL_AMOUNT vs ACCOUNT_CLOSING_BALANCE)