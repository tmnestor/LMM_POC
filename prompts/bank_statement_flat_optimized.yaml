# Optimized Flat Bank Statement Extraction Prompts
# Designed for simple, flat table bank statements like commbank_flat_simple.png
# Fixes Debit/Credit confusion and optimizes for single-table structure

prompts:
  flat_optimized:
    name: "Optimized Flat Bank Statement Extraction"
    description: "Optimized for simple flat bank statements with single transaction table"
    prompt: |
      Extract bank account details and all transactions from this flat bank statement.
      
      ## PART 1: BANK ACCOUNT DETAILS
      Extract the following information from the statement header:
      
      BANK_NAME: [bank name (Commonwealth Bank, ANZ, etc.) or NOT_FOUND]
      BANK_BSB_NUMBER: [6-digit BSB number or NOT_FOUND]
      BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [first balance shown in transaction table or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [final balance at end of statement or NOT_FOUND]
      STATEMENT_DATE_RANGE: [statement period (e.g., "03/05/2025 to 10/05/2025") or NOT_FOUND]
      
      ## PART 2: CORE EXTRACTION FIELDS
      These are the primary fields for evaluation:
      
      DOCUMENT_TYPE: STATEMENT
      
      LINE_ITEM_DESCRIPTIONS: [pipe-separated transaction descriptions - format: desc1 | desc2 | desc3]
      
      TRANSACTION_DATES: [pipe-separated dates in same order as descriptions - format: date1 | date2 | date3]
      
      TRANSACTION_AMOUNTS_PAID: [pipe-separated amounts - READ CAREFULLY:
      - If transaction has amount in WITHDRAWAL column: use that amount
      - If transaction has amount in DEPOSIT column: use that amount  
      - If transaction has amount in DEBIT column: use that amount
      - If transaction has amount in CREDIT column: use that amount
      - Format: amount1 | amount2 | amount3]
      
      ## CRITICAL INSTRUCTIONS FOR FLAT STATEMENTS:
      
      1. **Column Recognition**: Look at the actual column headers in the image:
         - Some statements use "Withdrawal" and "Deposit" 
         - Others use "Debit" and "Credit"
         - Use the EXACT column names you see
      
      2. **Amount Extraction**: 
         - Extract amounts exactly as they appear in their columns
         - Include amounts from BOTH withdrawal/debit AND deposit/credit columns
         - Maintain the same order as transaction descriptions
      
      3. **Row Order**: Process transactions in the order they appear in the table
      
      4. **Date Format**: Use dates exactly as shown in the Date column
      
      Example Output:
      BANK_NAME: Commonwealth Bank
      BANK_BSB_NUMBER: 063 140
      BANK_ACCOUNT_NUMBER: 4577691
      BANK_ACCOUNT_HOLDER: Sophie Martin
      ACCOUNT_OPENING_BALANCE: $13387.44
      ACCOUNT_CLOSING_BALANCE: $16288.08
      STATEMENT_DATE_RANGE: 03/05/2025 to 10/05/2025
      DOCUMENT_TYPE: STATEMENT
      LINE_ITEM_DESCRIPTIONS: ONLINE PURCHASE AMAZON AU | EFTPOS PURCHASE COLES EXP | DIRECT CREDIT SALARY
      TRANSACTION_DATES: 03/05/2025 | 04/05/2025 | 06/05/2025
      TRANSACTION_AMOUNTS_PAID: $288.03 | $22.50 | $3497.47

  legacy_compatible:
    name: "Legacy Compatible Flat Extraction"
    description: "Maintains compatibility with existing field names"
    prompt: |
      Extract all bank statement data including legacy fields for compatibility.
      
      [Extract all the bank fields as above, maintaining backward compatibility]
      
      Use this format if the system requires legacy field names.

# Configuration settings
settings:
  default_prompt: "flat_optimized"
  max_new_tokens: 3000
  temperature: 0.1
  
# Model-specific configurations
models:
  llama:
    recommended_prompt: "flat_optimized"
    notes: "Optimized for Llama-3.2-Vision with clear column recognition"
  internvl3:
    recommended_prompt: "flat_optimized" 
    notes: "Should work well with clear table structure instructions"