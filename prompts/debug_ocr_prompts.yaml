# Debug OCR Prompts - Raw Markdown Output
# YAML-first debug prompts for diagnosing OCR vs document understanding issues
# Activated when --debug flag is used

# Debug OCR prompts by model
debug_ocr_prompts:
  llama:
    system_message: "You are an OCR assistant. Convert this document image to raw markdown text."
    user_prompt: |
      Please perform OCR (Optical Character Recognition) on this document image and output the raw text in clean markdown format.
      
      INSTRUCTIONS:
      - Extract ALL visible text exactly as it appears
      - Preserve layout structure using markdown formatting
      - Use headers (# ## ###) for titles and headings
      - Use tables for tabular data
      - Use lists for itemized content
      - Include ALL numbers, dates, amounts, and text
      - Do NOT interpret or structure the data
      - Do NOT extract specific fields
      - Do NOT add explanations or commentary
      
      OUTPUT REQUIREMENTS:
      - Raw markdown text only
      - No field extraction
      - No JSON or structured output
      - Complete OCR transcription
      
      Begin OCR transcription:
    max_tokens: 2000
    temperature: 0.0
    
  internvl3:
    user_prompt: |
      Convert this document image to raw markdown text using OCR.
      
      Requirements:
      - Extract ALL visible text exactly
      - Use markdown formatting (headers, tables, lists)
      - Include all numbers, dates, amounts
      - Do NOT interpret or structure data
      - Output raw markdown only
      
      Begin OCR:
    max_tokens: 1500
    temperature: 0.0

# Debug mode configuration
debug_config:
  enable_ocr_mode: true
  save_ocr_output: true
  ocr_output_suffix: "_debug_ocr.md"
  compare_with_extraction: true
  
# OCR quality indicators to look for
ocr_quality_checks:
  - "garbled_text_patterns": ["###", "|||", "???", "XXX"]
  - "missing_currency": ["$", "€", "£", "¥"]
  - "date_formats": ["dd/mm/yyyy", "mm/dd/yyyy", "yyyy-mm-dd"]
  - "table_structure": ["|", "---", "+-+"]

# Debug output format
debug_output:
  markdown_headers: true
  preserve_whitespace: true
  include_layout_hints: true
  show_confidence_notes: false

# Metadata
version: "v1.0"
last_updated: "2025-08-29"
description: "Debug OCR prompts for diagnosing extraction vs OCR issues"
usage: "Activated with --debug flag to output raw markdown OCR instead of structured extraction"