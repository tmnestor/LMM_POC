prompts:
  # Generic bank statement prompt (fallback)
  bank_statement:
    name: "Generated Llama Bank Statement Extraction"
    description: "Generated prompt from unified schema for bank statement documents"
    prompt: |
      You are an expert document analyzer. Extract structured data from this business document image.

      CRITICAL INSTRUCTIONS:
      - Output ONLY the structured data below
      - Start immediately with DOCUMENT_TYPE
      - Stop immediately after ACCOUNT_BALANCE

      OUTPUT FORMAT (7 FIELDS):

      DOCUMENT_TYPE: [document type (INVOICE/RECEIPT/STATEMENT) or NOT_FOUND]
      STATEMENT_DATE_RANGE: [statement period or date range or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [pipe-separated list using | character ONLY - format: item1 | item2 | item3 - do NOT use commas or NOT_FOUND]
      TRANSACTION_DATES: [Extract transaction dates separated by " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [Extract transaction amounts separated by " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [Extract transaction amounts received separated by " | " or NOT_FOUND]
      ACCOUNT_BALANCE: [Extract account balance amounts separated by " | " or NOT_FOUND]

      RULES:
      - Use exact text from document
      - CRITICAL: Use ONLY pipe separators (|) for lists - NEVER use commas for LINE_ITEM fields
      - Be conservative: use NOT_FOUND if field is truly missing

      STOP AFTER the ACCOUNT_BALANCE. Do not add explanations or comments.

  # Flat Table Bank Statements (continuous table format)
  bank_statement_flat:
    name: "Flat Table Bank Statement Extraction"
    description: "Optimized for flat table bank statements with continuous rows"
    prompt: |
      You are an expert document analyzer specializing in bank statement extraction.
      Extract structured data from this flat table bank statement. Process each transaction row individually.

      Critical: Process ROW-BY-ROW, not by scanning columns. Each transaction row contains:
      - Date | Description | Debit/Withdrawal | Credit/Deposit | Balance

      For each row, extract data in the same position across all fields.

      Output format (replace NOT_FOUND with actual values):

      DOCUMENT_TYPE: STATEMENT
      STATEMENT_DATE_RANGE: NOT_FOUND
      LINE_ITEM_DESCRIPTIONS: NOT_FOUND
      TRANSACTION_DATES: NOT_FOUND
      TRANSACTION_AMOUNTS_PAID: NOT_FOUND
      TRANSACTION_AMOUNTS_RECEIVED: NOT_FOUND
      ACCOUNT_BALANCE: NOT_FOUND

      Instructions:
      - Statement period: Find date range like "01/01/2025 to 31/01/2025"
      - Transaction descriptions: All descriptions separated by " | "
      - Transaction dates: All dates separated by " | "
      - Amounts paid: Debit/withdrawal amounts with $ and " | " (money OUT)
      - Amounts received: Credit/deposit amounts with $ and " | " (money IN)
      - Account balance: Running balances with $ and " | " (balance after each transaction)
      - Use NOT_FOUND for empty cells

  # Date-Grouped Bank Statements (transactions grouped under date headers)
  bank_statement_date_grouped:
    name: "Date-Grouped Bank Statement Extraction"
    description: "Optimized for bank statements with date section headers"
    prompt: |
      You are an expert document analyzer specializing in bank statement extraction.
      Extract the transaction data from this Australian bank statement.
      CRITICAL: OUTPUT EXACTLY IN THIS FORMAT - DO NOT USE NATURAL LANGUAGE HEADINGS

      Extract bank account details and all transactions from this date-grouped bank statement.

      ## MANDATORY OUTPUT FORMAT:
      Use these EXACT field names with colons. Do not add explanations or comments.

      DOCUMENT_TYPE: STATEMENT
      STATEMENT_DATE_RANGE: [statement period or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [transaction1 | transaction2 | transaction3]
      TRANSACTION_DATES: [DD/MM/YYYY | DD/MM/YYYY | DD/MM/YYYY]
      TRANSACTION_AMOUNTS_PAID: [debit1 | NOT_FOUND | debit3]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | credit2 | NOT_FOUND]
      ACCOUNT_BALANCE: [balance1 | balance2 | balance3]

      STOP AFTER ACCOUNT_BALANCE. Do not add explanations or comments.

      ## DATE-GROUPED STRUCTURE:
      This statement has transactions grouped under date headers like "Thu 04 Sep 2025".

      ## SIMPLIFIED PARSING STEPS:

      1. Find date headers like "Thu 04 Sep 2025", "Mon 01 Sep 2025"
      2. Extract ALL transactions from under each date header
      3. Combine with pipe separators in chronological order
      4. Use balance direction to validate transaction types:
         - Balance UP = Money IN (CREDIT) → TRANSACTION_AMOUNTS_RECEIVED
         - Balance DOWN = Money OUT (DEBIT) → TRANSACTION_AMOUNTS_PAID

      ## FIELD EXTRACTION RULES:

      LINE_ITEM_DESCRIPTIONS: All transaction descriptions combined with " | "
      TRANSACTION_DATES: Convert date headers to DD/MM/YYYY format
      TRANSACTION_AMOUNTS_PAID: DEBIT/WITHDRAWAL amounts (money OUT)
      TRANSACTION_AMOUNTS_RECEIVED: CREDIT/DEPOSIT amounts (money IN)
      ACCOUNT_BALANCE: Running balance after each transaction

      Use NOT_FOUND for any missing values. Maintain same count across all lists.

      ## BALANCE VALIDATION (CRITICAL):
      The BALANCE column is nearly 100% accurate. Use it to validate transactions:
      - Balance INCREASES → Money IN (CREDIT) → TRANSACTION_AMOUNTS_RECEIVED
      - Balance DECREASES → Money OUT (DEBIT) → TRANSACTION_AMOUNTS_PAID

      ## REMEMBER: OUTPUT EXACTLY IN THIS FORMAT:
      DOCUMENT_TYPE: STATEMENT
      STATEMENT_DATE_RANGE: [statement period]
      LINE_ITEM_DESCRIPTIONS: [transaction1 | transaction2 | transaction3]
      TRANSACTION_DATES: [DD/MM/YYYY | DD/MM/YYYY | DD/MM/YYYY]
      TRANSACTION_AMOUNTS_PAID: [debit1 | NOT_FOUND | debit3]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | credit2 | NOT_FOUND]
      ACCOUNT_BALANCE: [balance1 | balance2 | balance3]

      STOP AFTER ACCOUNT_BALANCE. Do not add explanations or comments.
