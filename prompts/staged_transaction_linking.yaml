# Staged transaction linking prompts:
#   Stage 1  — extract_receipts:    receipt image → store/date/total per receipt
#   Stage 2a — extract_columns:     bank statement image → transaction table column headers
#   Stage 2b — match_to_statement:  bank statement image → match purchases to transactions
#              (dynamic prompt with Stage 1 results via {purchases_text}
#               and mapped column names via {date_column}, {description_column}, {debit_column})
prompts:
  extract_receipts:
    name: "Stage 1: Extract Receipt/Invoice Details"
    description: >
      Given a scanned page containing one or more receipts, invoices, or
      bills, enumerate every distinct document and extract vendor name,
      date, and total for each. No bank statement is involved in this stage.
    prompt: |
      You are given a single image of a scanned page that may contain
      one or more receipts, invoices, or bills (possibly stapled or
      placed together on one page).

      Your task: enumerate every DISTINCT purchase or charge on the page.
      Each must have a different vendor, date, or total to count as
      separate. Do NOT list the same purchase twice — a single document
      with subtotals, tax lines, and a grand total is ONE entry, not
      multiple.

      How to identify separate purchases:
      - Different vendor/merchant/company names
      - Different dates
      - Different final totals
      A single document that shows both a subtotal and a total is still
      ONE purchase — use the final total only.

      For each distinct purchase found, respond in the following format:

      --- RECEIPT 1 ---
      STORE: the vendor, merchant, or company name
      DATE: the date (DD/MM/YYYY) — use purchase date, invoice date,
            or due date (whichever is most prominent)
      TOTAL: the final total amount including currency symbol (e.g. $83.48)

      --- RECEIPT 2 ---
      (same fields)

      Only use RECEIPT 2, 3, etc. if there are genuinely different
      purchases on the page.

  extract_columns:
    name: "Stage 2a: Extract Column Headers"
    description: >
      Given a bank statement image, identify the transaction table and list
      its column headers. Output is mapped to semantic roles for Stage 2b.
    prompt: |
      You are given one image: a bank statement.

      Find the transaction table and list its column headers exactly as they
      appear, in order from left to right.

      Respond as a numbered list, one header per line:
      1. First Column Name
      2. Second Column Name
      3. ...

      Only list column headers — do not include any transaction data.

  match_to_statement:
    name: "Stage 2b: Match Purchases to Bank Statement"
    description: >
      Given a bank statement image and a text summary of purchases extracted
      in Stage 1, find the matching debit transaction for each purchase.
      The {purchases_text} placeholder is replaced with Stage 1 results.
      The {date_column}, {description_column}, {debit_column} placeholders
      are replaced with column names mapped from Stage 2a headers.
    prompt: |
      You are given one image: a bank statement with a transaction table.

      The following purchases were extracted from receipts in a prior step:

      {purchases_text}

      Your task: for EACH purchase listed above, determine whether a
      matching debit transaction exists on this bank statement. Some
      purchases may NOT appear on this statement.

      STRICT AMOUNT MATCHING (apply first, before any other checks):
        Compare the receipt total (ignoring currency symbol) to each
        candidate row's "{debit_column}" value. Australian bank statements
        show debit amounts as plain numbers without a currency symbol.
        The amounts MUST be numerically equal. If no row has an exact
        amount match, the result is NOT_FOUND — do not proceed further.

        You MUST record this comparison in the AMOUNT_CHECK field BEFORE
        setting MATCHED_TRANSACTION. Write both numbers and the verdict:
          AMOUNT_CHECK: <receipt total> vs <bank debit> → MATCH or NO_MATCH
        If AMOUNT_CHECK is NO_MATCH, MATCHED_TRANSACTION must be NOT_FOUND.

      Only AFTER a candidate row passes the amount check, verify:
      1. DESCRIPTION — containment check, NOT exact match:
         The receipt store's core business name should be recognisable
         WITHIN the bank's "{description_column}" value. Bank descriptions
         often include payment prefixes, location suffixes, and acquirer
         codes around the merchant name.
         Examples of valid matches:
           "Thai Palace"       → "SQ *THAI PALACE SYDNEY"   (acquirer prefix + location)
           "Dan Murphy's"      → "Contactless Payment DAN MURPHYS" (payment prefix)
           "Harvey Norman"     → "HARVEY NORMAN AU AUS"     (location suffix)
           "Fish & Chips Co"   → "FISH AND CHIPS CO"        (& → AND)
         Record this check in the NAME_CHECK field.
      2. DATE: the "{date_column}" column vs the purchase date. The bank
         date should be the same day or up to 5 business days later (bank
         processing delay). The bank statement may use a different date
         format — convert before comparing.

      Use these match outcomes:
      - FOUND: amounts are exactly equal AND description and date match.
      - NOT_FOUND: no candidate row has an exactly equal debit amount, OR
        the amounts match but description and date do not support a match.
        Do not guess or force a match — NOT_FOUND is a valid and expected
        result. A description match alone is NEVER sufficient.

      Row integrity: all extracted fields must come from the SAME row in the
      transaction table. Do not mix values from different rows.

      For each purchase, respond in the following format:

      --- RECEIPT 1 ---
      RECEIPT_STORE: the store/merchant name from the purchase
      RECEIPT_TOTAL: the total amount from the purchase (numeric, no currency symbol)
      AMOUNT_CHECK: <receipt total> vs <bank debit> → MATCH or NO_MATCH
      NAME_CHECK: "<core name>" found in "<transaction description>" → MATCH or NO_MATCH
      MATCHED_TRANSACTION: FOUND or NOT_FOUND (must be NOT_FOUND when AMOUNT_CHECK is NO_MATCH)
      TRANSACTION_DATE: the date from the matched row (DD/MM/YYYY), or NOT_FOUND
      TRANSACTION_AMOUNT: the debit amount from the matched row (numeric only, no currency symbol), or NOT_FOUND
      TRANSACTION_DESCRIPTION: the description from the matched row, or NOT_FOUND
      CONFIDENCE: HIGH, MEDIUM, or LOW
      MISMATCH_TYPE: NONE or NAME_MISMATCH or DATE_DELAY
      REASONING: brief explanation of match or why no match was found

      --- RECEIPT 2 ---
      (same fields)

      Continue for all purchases listed above.

settings:
  max_new_tokens_stage1: 500
  max_new_tokens_stage2a: 200
  max_new_tokens_stage2: 2000
  temperature: 0.0
