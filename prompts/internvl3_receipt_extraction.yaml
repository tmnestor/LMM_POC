# InternVL3 Receipt Extraction Prompts Configuration
# This file contains InternVL3-specific prompts for extracting data from receipts and payment confirmations
# Based on Llama baseline prompts but with explicit output format enforcement to prevent JSON generation

prompts:
  standard:
    name: "InternVL3 Receipt Extraction"
    description: "Extract all relevant fields from receipts with enforced key-value format"
    prompt: |
      Extract structured data from this receipt/payment confirmation document.

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - Receipts often have less detail than invoices - that's normal

      ## RECEIPT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [RECEIPT or NOT_FOUND]
      BUSINESS_ABN: [11-digit Australian Business Number if shown or NOT_FOUND]
      SUPPLIER_NAME: [Store/merchant name at top of receipt or NOT_FOUND]
      BUSINESS_ADDRESS: [Store/merchant address if shown or NOT_FOUND]
      PAYER_NAME: [Customer name if shown (often not on receipts) or NOT_FOUND]
      PAYER_ADDRESS: [Customer address if shown (rarely on receipts) or NOT_FOUND]
      INVOICE_DATE: [Transaction date in DD/MM/YYYY format or NOT_FOUND]

      ## PURCHASED ITEMS:
      Extract all items from the receipt:

      LINE_ITEM_DESCRIPTIONS: [List all item names separated by " | " or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List quantities separated by " | " (default to 1 if not shown) or NOT_FOUND]
      LINE_ITEM_PRICES: [List prices separated by " | " with $ symbol or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List total prices per item separated by " | " with $ symbol or NOT_FOUND]

      ## PAYMENT TOTALS:

      IS_GST_INCLUDED: [true if GST/tax is shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ symbol if shown or NOT_FOUND]
      TOTAL_AMOUNT: [Final total/amount paid with $ symbol or NOT_FOUND]

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document or NOT_FOUND]
      SUPPLIER_NAME: [store name from document]
      BUSINESS_ADDRESS: [store address from document or NOT_FOUND]
      PAYER_NAME: [customer name from document or NOT_FOUND]
      PAYER_ADDRESS: [customer address from document or NOT_FOUND]
      INVOICE_DATE: [transaction date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document or NOT_FOUND]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "RECEIPT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** RECEIPT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = RECEIPT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: RECEIPT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 14 lines in the format shown above.

  detailed:
    name: "Detailed InternVL3 Receipt Extraction"
    description: "Extract fields with receipt-specific instructions and enforced format"
    prompt: |
      You are analyzing a receipt or payment confirmation. Extract the following information.

      ## UNDERSTANDING RECEIPTS:
      Receipts are simpler than invoices and may not have all fields:
      - Customer details are often missing
      - ABN may not be shown
      - Items may not show individual quantities
      - Address might only be partial

      ## EXTRACTION STEPS:

      ### STEP 1: Document Type
      DOCUMENT_TYPE: [Should be RECEIPT for payment confirmations or NOT_FOUND]

      ### STEP 2: Merchant Information (Top of receipt)
      BUSINESS_ABN: [Look for ABN - exactly 11 digits (often not on receipts) or NOT_FOUND]
      SUPPLIER_NAME: [Store/restaurant/merchant name or NOT_FOUND]
      BUSINESS_ADDRESS: [Store address if shown (may be partial) or NOT_FOUND]

      ### STEP 3: Customer Information (Usually minimal or absent)
      PAYER_NAME: [Customer name if shown or NOT_FOUND]
      PAYER_ADDRESS: [Customer address if shown or NOT_FOUND]

      ### STEP 4: Transaction Date
      INVOICE_DATE: [Date of purchase/transaction in DD/MM/YYYY format or NOT_FOUND]

      ### STEP 5: Items Purchased
      Look at the itemized list:

      LINE_ITEM_DESCRIPTIONS: [Item 1 | Item 2 | etc. or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [Qty 1 | Qty 2 | etc. (use "1" if not shown) or NOT_FOUND]
      LINE_ITEM_PRICES: [$Price 1 | $Price 2 | etc. or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [$Total 1 | $Total 2 | etc. or NOT_FOUND]

      ### STEP 6: Payment Summary
      IS_GST_INCLUDED: [Look for GST/tax line - "true" if shown, "false" if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ or NOT_FOUND]
      TOTAL_AMOUNT: [Total paid/amount with $ or NOT_FOUND]

      ## RECEIPT-SPECIFIC NOTES:
      - If quantity not shown, assume "1" for each item
      - Unit price and total price may be the same for single items
      - GST might be included in total without separate line
      - Payment method details can be ignored

      ## CRITICAL OUTPUT FORMAT:

      You MUST respond in exactly this key-value format (one field per line):

      DOCUMENT_TYPE: value
      BUSINESS_ABN: value
      SUPPLIER_NAME: value
      BUSINESS_ADDRESS: value
      PAYER_NAME: value
      PAYER_ADDRESS: value
      INVOICE_DATE: value
      LINE_ITEM_DESCRIPTIONS: value
      LINE_ITEM_QUANTITIES: value
      LINE_ITEM_PRICES: value
      LINE_ITEM_TOTAL_PRICES: value
      IS_GST_INCLUDED: value
      GST_AMOUNT: value
      TOTAL_AMOUNT: value

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting like **FIELD:**
      DO NOT add extra explanations or commentary

      Provide EXACTLY 14 lines in the format shown above.

  simple:
    name: "Simple InternVL3 Receipt Extraction"
    description: "Minimal prompt for basic receipt extraction with format enforcement"
    prompt: |
      Extract receipt details from this document.

      You MUST respond in exactly this format (one field per line):

      DOCUMENT_TYPE: [RECEIPT or NOT_FOUND]
      BUSINESS_ABN: [value or NOT_FOUND]
      SUPPLIER_NAME: [merchant name or NOT_FOUND]
      BUSINESS_ADDRESS: [value or NOT_FOUND]
      PAYER_NAME: [value or NOT_FOUND]
      PAYER_ADDRESS: [value or NOT_FOUND]
      INVOICE_DATE: [transaction date or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | etc. or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | etc. or NOT_FOUND]
      LINE_ITEM_PRICES: [$price1 | $price2 | etc. or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | etc. or NOT_FOUND]
      IS_GST_INCLUDED: [true/false or NOT_FOUND]
      GST_AMOUNT: [$amount or NOT_FOUND]
      TOTAL_AMOUNT: [$total paid or NOT_FOUND]

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting
      DO NOT add explanations

      Provide EXACTLY 14 lines as shown above.

# Configuration settings
settings:
  default_prompt: "standard"
  max_new_tokens: 2500
  temperature: 0.1

# Model-specific configurations
models:
  internvl3:
    recommended_prompt: "standard"
    notes: "InternVL3 with enforced key-value output format to prevent JSON generation"

# Receipt-specific notes
receipt_characteristics:
  commonly_missing_fields:
    - PAYER_NAME
    - PAYER_ADDRESS
    - BUSINESS_ABN
    - LINE_ITEM_QUANTITIES
  typically_present_fields:
    - SUPPLIER_NAME
    - INVOICE_DATE
    - LINE_ITEM_DESCRIPTIONS
    - TOTAL_AMOUNT

# Field validation rules
validation:
  BUSINESS_ABN:
    pattern: "^\\d{2}\\s?\\d{3}\\s?\\d{3}\\s?\\d{3}$"
    length: 11
    description: "Must be 11 digits (often not on receipts)"
  INVOICE_DATE:
    format: "DD/MM/YYYY"
    type: "date"
    note: "For receipts, this is the transaction date"
  monetary_fields:
    - GST_AMOUNT
    - TOTAL_AMOUNT
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
  list_fields:
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES