# prompts/single_receipt_link.yaml
# Single-receipt transaction linking prompt (text-details variant).
#
# Sent with ONE image: the BANK STATEMENT. The receipt has already been read
# by the extract stage, so its details (store, date, total) are supplied below
# as TEXT rather than as a second image. This focuses the model on the one task
# the algorithmic matcher cannot do reliably: scanning the long, attention-
# decayed tail of the transaction table for the matching debit row.
#
# Placeholders substituted by common.vlm_linker.build_link_prompt:
#   {receipt_store}        -- supplier/merchant name (or NOT_FOUND)
#   {receipt_date}         -- receipt date DD/MM/YYYY (or NOT_FOUND)
#   {receipt_total}        -- receipt grand total, 2dp decimal (or NOT_FOUND)
#   {bank_column_context}  -- description of the statement's columns

name: single_receipt_link
description: >
  Targeted single-image linking fallback. The receipt is described in text
  (store, date, total from the extract stage); the model only has to find the
  matching debit row in the supplied bank-statement image. Used when the
  algorithmic matcher cannot confidently link a receipt.

template: |
  You are given ONE document image: a BANK STATEMENT with a table of transactions.

  A receipt has already been read for you. Its details are:
  - STORE / SUPPLIER: {receipt_store}
  - DATE: {receipt_date}
  - GRAND TOTAL: {receipt_total}

  YOUR TASK: Find the single debit transaction in the bank statement table that
  matches this receipt's grand total.

  SCAN THE BANK STATEMENT
  {bank_column_context}

  Search strategy — work through EVERY row in the table:

  1. AMOUNT MATCH (decisive — this alone is sufficient):
     Scan each row in the transaction table. Find any debit/withdrawal
     whose absolute value equals the receipt GRAND TOTAL above.
     - Debits may appear as positive numbers in a "Debit" column
     - Or as negative numbers in an "Amount" column (e.g. -$567.30)
     - IGNORE minus signs — compare absolute values only
     - Look through ALL rows, including rows near the BOTTOM of the page
       (these are the rows most often missed)

     If EXACTLY ONE row matches the receipt total, report FOUND.
     An amount match is SUFFICIENT — you do not need the description
     or date to also match. Bank descriptions are heavily abbreviated
     and may bear no resemblance to the store name on the receipt.

  2. TIEBREAKER (only when MULTIPLE rows share the same amount):
     If two or more rows have the same debit amount, use the receipt
     STORE and DATE above to pick the best row:
     - Bank descriptions are abbreviated to ~18-20 characters, uppercased
     - "Bunnings Warehouse" -> "BUNNINGS W/HOUSE" or "BUNNINGS WHSE"
     - BPAY entries show the payee name and a CRN reference number
     - The bank date should be within 5 business days of the receipt date

  IMPORTANT: All matched fields (date, description, amount) must come
  from the SAME row. Do not combine values from different rows.

  If no row matches on amount, report NOT_FOUND. Do not force a match.
  Do NOT reject a match just because the description looks different —
  amount is the primary matching signal.

  Return ONLY the structured block below, no other commentary.

  --- RECEIPT 1 ---
  RECEIPT_STORE: {receipt_store}
  RECEIPT_DATE: {receipt_date}
  RECEIPT_TOTAL: {receipt_total}
  MATCHED_TRANSACTION: FOUND or NOT_FOUND
  TRANSACTION_DATE: date from matched bank row (DD/MM/YYYY), or NOT_FOUND
  TRANSACTION_AMOUNT: amount from matched bank row (decimal, 2dp, no currency symbol)
  TRANSACTION_DESCRIPTION: full description from matched bank row, or NOT_FOUND
  CONFIDENCE: HIGH (amount + description match), MEDIUM (amount match only), or LOW (uncertain)
  REASONING: brief explanation of match or why no match was found
