# InternVL3 Invoice Extraction Prompts Configuration
# This file contains InternVL3-specific prompts for extracting data from invoices, bills, quotes, and estimates
# Based on Llama baseline prompts but with explicit output format enforcement to prevent JSON generation

prompts:
  standard:
    name: "InternVL3 Invoice Extraction"
    description: "Extract all relevant fields from invoices with enforced key-value format"
    prompt: |
      Extract structured data from this invoice/bill document.

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information

      ## INVOICE FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [Type of document - INVOICE/BILL/QUOTE/ESTIMATE or NOT_FOUND]
      BUSINESS_ABN: [11-digit Australian Business Number (XX XXX XXX XXX format) or NOT_FOUND]
      SUPPLIER_NAME: [Business/company name at top of invoice or NOT_FOUND]
      BUSINESS_ADDRESS: [Complete supplier address or NOT_FOUND]
      PAYER_NAME: [Customer/Bill To name or NOT_FOUND]
      PAYER_ADDRESS: [Customer/Bill To address or NOT_FOUND]
      INVOICE_DATE: [Invoice date in DD/MM/YYYY format or NOT_FOUND]

      ## LINE ITEMS:
      Extract all items/services from the itemized section:

      LINE_ITEM_DESCRIPTIONS: [List all item/service descriptions separated by " | " or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List quantities for each item separated by " | " or NOT_FOUND]
      LINE_ITEM_PRICES: [List unit prices separated by " | " with $ symbol or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List total prices per item separated by " | " with $ symbol or NOT_FOUND]

      ## FINANCIAL TOTALS:

      IS_GST_INCLUDED: [true if GST/tax amount is shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ symbol (e.g., $12.50) or NOT_FOUND]
      TOTAL_AMOUNT: [Final total amount with $ symbol (e.g., $137.50) or NOT_FOUND]

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document]
      SUPPLIER_NAME: [business name from document]
      BUSINESS_ADDRESS: [business address from document]
      PAYER_NAME: [customer name from document]
      PAYER_ADDRESS: [customer address from document]
      INVOICE_DATE: [invoice date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "INVOICE"} - NO JSON
      ❌ **DOCUMENT_TYPE:** INVOICE - NO MARKDOWN
      ❌ DOCUMENT_TYPE = INVOICE - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: INVOICE - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 14 lines in the format shown above.

  detailed:
    name: "Detailed InternVL3 Invoice Extraction"
    description: "Extract fields with additional validation instructions and enforced format"
    prompt: |
      You are an expert document analyzer. Extract structured data from this invoice document.

      ## STEP-BY-STEP EXTRACTION:

      ### STEP 1: Document Identification
      DOCUMENT_TYPE: [Look at the header - is it an INVOICE, BILL, QUOTE, or ESTIMATE? or NOT_FOUND]

      ### STEP 2: Business Information (Usually at the top)
      BUSINESS_ABN: [Find the ABN number - must be exactly 11 digits (e.g., 12 345 678 901) or NOT_FOUND]
      SUPPLIER_NAME: [Company name providing the goods/services (from document header) or NOT_FOUND]
      BUSINESS_ADDRESS: [Complete business address (can be multi-line) or NOT_FOUND]

      ### STEP 3: Customer Information (Look for "Bill To" or "Customer" section)
      PAYER_NAME: [Customer/client name or NOT_FOUND]
      PAYER_ADDRESS: [Customer/client address or NOT_FOUND]

      ### STEP 4: Date Information
      INVOICE_DATE: [Date of invoice/bill in DD/MM/YYYY format or NOT_FOUND]

      ### STEP 5: Line Items (From the itemized table/list)
      Count the number of line items and extract each one:

      LINE_ITEM_DESCRIPTIONS: [Item 1 description | Item 2 description | etc. or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [Qty 1 | Qty 2 | etc. (match description order) or NOT_FOUND]
      LINE_ITEM_PRICES: [$Unit price 1 | $Unit price 2 | etc. or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [$Total 1 | $Total 2 | etc. or NOT_FOUND]

      ### STEP 6: Tax and Totals (Usually at the bottom)
      IS_GST_INCLUDED: [Look for GST/tax line - answer "true" if present, "false" if not shown, or NOT_FOUND]
      GST_AMOUNT: [Extract the GST/tax amount with $ symbol or NOT_FOUND]
      TOTAL_AMOUNT: [Extract the final total/amount due with $ symbol or NOT_FOUND]

      ## IMPORTANT NOTES:
      - For quotes/estimates, treat them like invoices
      - Preserve original formatting and capitalization
      - Include currency symbols ($) for all monetary values
      - Use pipe separator (|) for multiple items
      - Be conservative - use NOT_FOUND if unsure

      ## CRITICAL OUTPUT FORMAT:

      You MUST respond in exactly this key-value format (one field per line):

      DOCUMENT_TYPE: value
      BUSINESS_ABN: value
      SUPPLIER_NAME: value
      BUSINESS_ADDRESS: value
      PAYER_NAME: value
      PAYER_ADDRESS: value
      INVOICE_DATE: value
      LINE_ITEM_DESCRIPTIONS: value
      LINE_ITEM_QUANTITIES: value
      LINE_ITEM_PRICES: value
      LINE_ITEM_TOTAL_PRICES: value
      IS_GST_INCLUDED: value
      GST_AMOUNT: value
      TOTAL_AMOUNT: value

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting like **FIELD:**
      DO NOT add extra explanations or commentary

      Provide EXACTLY 14 lines in the format shown above.

  simple:
    name: "Simple InternVL3 Invoice Extraction"
    description: "Minimal prompt for basic invoice extraction with format enforcement"
    prompt: |
      Extract invoice details from this document.

      You MUST respond in exactly this format (one field per line):

      DOCUMENT_TYPE: [value or NOT_FOUND]
      BUSINESS_ABN: [value or NOT_FOUND]
      SUPPLIER_NAME: [value or NOT_FOUND]
      BUSINESS_ADDRESS: [value or NOT_FOUND]
      PAYER_NAME: [value or NOT_FOUND]
      PAYER_ADDRESS: [value or NOT_FOUND]
      INVOICE_DATE: [value or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | etc. or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | etc. or NOT_FOUND]
      LINE_ITEM_PRICES: [$price1 | $price2 | etc. or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | etc. or NOT_FOUND]
      IS_GST_INCLUDED: [true/false or NOT_FOUND]
      GST_AMOUNT: [$amount or NOT_FOUND]
      TOTAL_AMOUNT: [$amount or NOT_FOUND]

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting
      DO NOT add explanations

      Provide EXACTLY 14 lines as shown above.

# Configuration settings
settings:
  default_prompt: "standard"
  max_new_tokens: 3000
  temperature: 0.1

# Model-specific configurations
models:
  internvl3:
    recommended_prompt: "standard"
    notes: "InternVL3 with enforced key-value output format to prevent JSON generation"

# Field validation rules
validation:
  BUSINESS_ABN:
    pattern: "^\\d{2}\\s?\\d{3}\\s?\\d{3}\\s?\\d{3}$"
    length: 11
    description: "Must be 11 digits"
  INVOICE_DATE:
    format: "DD/MM/YYYY"
    type: "date"
  monetary_fields:
    - GST_AMOUNT
    - TOTAL_AMOUNT
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES
  list_fields:
    - LINE_ITEM_DESCRIPTIONS
    - LINE_ITEM_QUANTITIES
    - LINE_ITEM_PRICES
    - LINE_ITEM_TOTAL_PRICES