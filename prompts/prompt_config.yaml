# Prompt Configuration - Master Configuration File
# Single source of truth for all prompt file paths and settings
# Part of Integrated V4 + YAML-First Implementation Plan

# Prompt file mappings (LEGACY - moved to legacy/prompts/)
# These are no longer used by document_aware scripts which use unified_schema.yaml
prompts:
  llama:
    single_pass: "../legacy/prompts/llama_single_pass_v4.yaml"
    grouped: "../legacy/prompts/llama_grouped_v4.yaml"
  internvl3:
    single_pass: "../legacy/prompts/internvl3_single_pass_v4.yaml" 
    grouped: "../legacy/prompts/internvl3_grouped_v4.yaml"

# Document type detection prompts (YAML-first architecture)
detection_prompts: "document_type_detection.yaml"

# Debug OCR prompts for diagnosing extraction issues
debug_ocr_prompts: "debug_ocr_prompts.yaml"

# Base directory for all prompt files (relative to project root)
base_path: "prompts/"

# Schema compatibility and versioning
schema_version: "v4"
field_count: 49

# Prompt metadata
version: "v4.1"
last_updated: "2025-08-28"
description: "V4 schema-compatible prompts with 49-field support and document-type awareness"

# Optional: Experimental prompt variants for A/B testing
experimental:
  llama_cot: "experimental/llama_cot_enhanced.yaml"
  internvl3_precision: "experimental/internvl3_precision_v2.yaml"

# Configuration validation
validation:
  require_all_files: true
  validate_schema_compatibility: true
  check_field_count: true