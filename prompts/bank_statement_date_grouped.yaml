# Date-Grouped Bank Statement Extraction Prompts
# Designed for complex bank statements with date-grouped transaction sections
# Like commbank_statement_001.png with "Thu 04 Sep 2025" date headers

prompts:
  date_grouped:
    name: "Date-Grouped Bank Statement Extraction"
    description: "Handles complex bank statements with transactions grouped by date sections"
    prompt: |
      Extract bank account details and all transactions from this date-grouped bank statement.
      
      This statement has a COMPLEX STRUCTURE with transactions grouped under date headers.
      
      ## PART 1: BANK ACCOUNT DETAILS
      Extract from the statement header/summary:
      
      BANK_NAME: [bank name (Commonwealth Bank, etc.) or NOT_FOUND]
      BANK_BSB_NUMBER: [6-digit BSB number or NOT_FOUND]  
      BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [opening balance amount or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [closing balance amount or NOT_FOUND]
      STATEMENT_DATE_RANGE: [statement period or NOT_FOUND]
      
      ## PART 2: CORE EXTRACTION FIELDS
      
      DOCUMENT_TYPE: STATEMENT
      
      ## CRITICAL: DATE-GROUPED PARSING INSTRUCTIONS
      
      This statement has DATE HEADERS that group transactions, like:
      - "Thu 04 Sep 2025"
      - "Mon 01 Sep 2025" 
      - "Wed 27 Aug 2025"
      
      Under each date header are one or more transaction rows.
      
      ### PARSING STRATEGY:
      
      1. **Find all date headers** (e.g., "Thu 04 Sep 2025")
      2. **For each date section**, extract all transactions listed under that date
      3. **Combine all transactions** from all date sections into the output fields
      
      LINE_ITEM_DESCRIPTIONS: [Extract transaction descriptions from ALL date sections, combine with pipes]
      Format: desc1 | desc2 | desc3 | desc4
      
      TRANSACTION_DATES: [Use the date header for each transaction in that section]  
      Format: 04/09/2025 | 04/09/2025 | 01/09/2025 | 27/08/2025
      (Convert date headers to DD/MM/YYYY format)
      
      TRANSACTION_AMOUNTS_PAID: [Extract amounts from ALL transactions across ALL date sections]
      Format: amount1 | amount2 | amount3 | amount4
      
      ## DETAILED EXTRACTION STEPS:
      
      **Step 1**: Scan for date headers (look for patterns like "Day DD Mon YYYY")
      
      **Step 2**: For each date section:
      - Extract ALL transaction descriptions under that date
      - Note the amounts for each transaction
      - Use the date header as the transaction date
      
      **Step 3**: Combine ALL transactions chronologically into pipe-separated lists
      
      **Step 4**: Ensure all three lists (descriptions, dates, amounts) have the same number of elements
      
      ## AMOUNT HANDLING:
      - Look for debit amounts (money out)
      - Look for credit amounts (money in) 
      - Include amounts from both debit and credit transactions
      - Maintain consistent ordering across all fields
      
      ## EXAMPLE OUTPUT FORMAT:
      BANK_NAME: Commonwealth Bank of Australia
      BANK_ACCOUNT_HOLDER: DAVID ROBERT BROWN
      STATEMENT_DATE_RANGE: 07 Aug 2025 to 06 Sep 2025
      DOCUMENT_TYPE: STATEMENT
      LINE_ITEM_DESCRIPTIONS: Direct Debit DOMINO'S PTY LTD | Monthly Service Fee | Home Loan Payment LN REPAY
      TRANSACTION_DATES: 04/09/2025 | 01/09/2025 | 23/08/2025
      TRANSACTION_AMOUNTS_PAID: $117.57 | $17.60 | $1918.75

  simplified_grouped:
    name: "Simplified Date-Grouped Extraction"  
    description: "Simplified approach for date-grouped statements"
    prompt: |
      Extract data from this date-grouped bank statement.
      
      Look for date headers like "Thu 04 Sep 2025" that group transactions.
      Extract ALL transactions from ALL date sections.
      
      Focus on the core fields required for evaluation:
      - DOCUMENT_TYPE: STATEMENT
      - STATEMENT_DATE_RANGE: [statement period]
      - LINE_ITEM_DESCRIPTIONS: [all transaction descriptions with | separators]
      - TRANSACTION_DATES: [all transaction dates with | separators] 
      - TRANSACTION_AMOUNTS_PAID: [all amounts with | separators]

# Configuration settings
settings:
  default_prompt: "date_grouped"
  max_new_tokens: 4000
  temperature: 0.1
  
# Model-specific configurations  
models:
  llama:
    recommended_prompt: "date_grouped"
    notes: "Detailed instructions help Llama parse complex structure"
  internvl3:
    recommended_prompt: "simplified_grouped"
    notes: "InternVL3 may work better with simplified instructions"