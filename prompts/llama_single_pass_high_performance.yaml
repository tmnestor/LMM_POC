# Llama Single-Pass High Performance Prompt - YAML-First Version (V4 Complete Schema)
# Based on 91.8% accuracy performance from H200 validation
# All 49 V4 fields with archaeological high-performance structure preserved

single_pass:
  expertise_frame: "Extract structured data from this business document image."
  
  critical_instructions_header: "CRITICAL INSTRUCTIONS:"
  critical_instructions:
    - "Output ONLY the structured data below"
    - "Do NOT include any conversation text"
    - "Do NOT repeat the user's request"
    - "Do NOT include <image> tokens"
    - "Start immediately with DOCUMENT_TYPE"
    - "Stop immediately after TOTAL_AMOUNT_PAYABLE"
  
  output_format: "REQUIRED OUTPUT FORMAT - V4 SCHEMA (49 FIELDS):"
  
  # HIGH-PERFORMANCE SEMANTIC FIELD ORDERING - V4 COMPLETE (49 fields)
  # Document identifiers → Business → Payer → References → Dates → Line Items → Banking → Transactions → Financial
  field_instructions:
    # Document identifiers - start with most universal fields
    DOCUMENT_TYPE: "[document type (INVOICE/RECEIPT/STATEMENT) or NOT_FOUND]"
    BUSINESS_ABN: "[11-digit Australian Business Number (e.g. XX XXX XXX XXX or XXXXXXXXXXX) or NOT_FOUND]"
    SUPPLIER_NAME: "[business name from document header or NOT_FOUND]"
    
    # Business entity details
    BUSINESS_ADDRESS: "[business address or NOT_FOUND]"
    BUSINESS_PHONE: "[business phone number (not customer phone) (e.g. (XX) XXXX XXXX) or NOT_FOUND]"
    SUPPLIER_EMAIL: "[supplier email address or NOT_FOUND]"
    SUPPLIER_WEBSITE: "[supplier website or NOT_FOUND]"
    
    # Payer/customer information
    PAYER_NAME: "[payer name or NOT_FOUND]"
    PAYER_ABN: "[11-digit customer ABN or NOT_FOUND]"
    PAYER_ADDRESS: "[payer address or NOT_FOUND]"
    PAYER_PHONE: "[payer phone number or NOT_FOUND]"
    PAYER_EMAIL: "[payer email address or NOT_FOUND]"
    
    # Document-specific identifiers
    INVOICE_NUMBER: "[invoice number/reference or NOT_FOUND]"
    RECEIPT_NUMBER: "[receipt/reference number or NOT_FOUND]"
    
    # Temporal data
    INVOICE_DATE: "[invoice date or NOT_FOUND]"
    DUE_DATE: "[payment due date or NOT_FOUND]"
    TRANSACTION_DATE: "[transaction date for receipts or NOT_FOUND]"
    STATEMENT_DATE_RANGE: "[statement period or date range or NOT_FOUND]"
    
    # Line item details (V4 enhanced)
    LINE_ITEM_DESCRIPTIONS: "[pipe-separated list of ALL items or NOT_FOUND]"
    LINE_ITEM_QUANTITIES: "[pipe-separated quantities matching each item or NOT_FOUND]"
    LINE_ITEM_PRICES: "[pipe-separated unit prices (per item, not totals) or NOT_FOUND]"
    LINE_ITEM_TOTAL_PRICES: "[pipe-separated line totals from 'Amount' column or NOT_FOUND]"
    LINE_ITEM_GST_AMOUNTS: "[pipe-separated GST amounts per line or NOT_FOUND]"
    LINE_ITEM_DISCOUNT_AMOUNTS: "[pipe-separated discount amounts per line or NOT_FOUND]"
    
    # Banking information
    BANK_NAME: "[bank name (NOT supplier name) or NOT_FOUND]"
    BANK_BSB_NUMBER: "[6-digit BSB (NOT ABN) or NOT_FOUND]"
    BANK_ACCOUNT_NUMBER: "[account number or NOT_FOUND]"
    BANK_ACCOUNT_HOLDER: "[account holder name or NOT_FOUND]"
    ACCOUNT_OPENING_BALANCE: "[first value in the Balance column of transaction table (rightmost monetary column) or NOT_FOUND]"
    ACCOUNT_CLOSING_BALANCE: "[ending balance at end of statement period (look for 'Closing Balance' or final balance) or NOT_FOUND]"
    
    # Transaction details (V4 new - for bank statements)
    TRANSACTION_DATES: "[pipe-separated dates from transaction list in chronological order or NOT_FOUND]"
    TRANSACTION_AMOUNTS_PAID: "[pipe-separated debit/payment amounts from transaction list (negative values or withdrawals) or NOT_FOUND]"
    TRANSACTION_AMOUNTS_RECEIVED: "[pipe-separated credit/deposit amounts from transaction list (positive values or deposits) or NOT_FOUND]"
    TRANSACTION_BALANCES: "[pipe-separated balance after each transaction from rightmost column or NOT_FOUND]"
    TOTAL_CREDITS: "[sum of all credits/deposits shown in statement summary (look for 'Total Credits' or 'Deposits') or NOT_FOUND]"
    TOTAL_DEBITS: "[sum of all debits/withdrawals shown in statement summary (look for 'Total Debits' or 'Withdrawals') or NOT_FOUND]"
    CREDIT_CARD_DUE_DATE: "[credit card payment due date or NOT_FOUND]"
    
    # Store/location and payment information
    STORE_LOCATION: "[store location or NOT_FOUND]"
    PAYMENT_METHOD: "[payment method (cash/card/transfer) or NOT_FOUND]"
    
    # Financial totals and calculations (most important fields)
    SUBTOTAL_AMOUNT: "[subtotal amount in dollars with 2 decimals or NOT_FOUND]"
    TOTAL_DISCOUNT_AMOUNT: "[total discount amount in dollars or NOT_FOUND]"
    GST_AMOUNT: "[GST amount in dollars with 2 decimals or NOT_FOUND]"
    IS_GST_INCLUDED: "[true if GST included, false if not, or NOT_FOUND]"
    TOTAL_AMOUNT: "[total amount in dollars with 2 decimals or NOT_FOUND]"
    
    # Payment status tracking (V4 new - final fields)
    TOTAL_AMOUNT_PAID: "[amount paid in dollars or NOT_FOUND]"
    BALANCE_OF_PAYMENT: "[balance remaining in dollars or NOT_FOUND]"
    TOTAL_AMOUNT_PAYABLE: "[total payable amount in dollars or NOT_FOUND]"

  format_rules_header: "OUTPUT RULES:"
  format_rules:
    - "NEVER use: **KEY:** or **KEY** or *KEY* or any formatting"
    - "Plain text only - NO markdown, NO bold, NO italic"
    - "Include ALL 29 keys even if value is NOT_FOUND"
    - "Output ONLY these 29 lines, nothing else"
    - "Use exact text from document (e.g., \"TAX INVOICE\" not \"Invoice\")"
    - "Use pipe separators for lists (e.g., \"item1 | item2 | item3\")"
    - "Be conservative: use NOT_FOUND if field is truly missing"
    - "For boolean fields: use \"true\" or \"false\" (not \"yes\"/\"no\")"
    - "For calculated fields: show computed values with proper formatting"
    - "For transaction lists: use pipe separators between transactions"

  stop_instruction: "STOP after TOTAL_AMOUNT_PAYABLE line. Do not add explanations or comments."

# V4 Complete Schema Performance Notes:
# - EXPANDED: All 49 V4 fields with comprehensive document coverage
# - SEMANTIC ORDERING: Document ID → Business → Payer → References → Dates → Line Items → Banking → Transactions → Financial
# - H200 VALIDATED: 91.8% accuracy on invoice extraction (archaeological structure preserved)
# - DOCUMENT-AWARE: Dynamic filtering to document-specific subsets (29 invoice, 20 receipt, 16 bank statement)
# - YAML-FIRST: Maintainable configuration with high-performance structure
# - V4 ENHANCEMENTS: Transaction lists, payment tracking, enhanced line item details
# - PLAIN TEXT: No markdown formatting to prevent parsing conflicts