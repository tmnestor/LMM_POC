prompts:
  detection:
    name: "Enriched Document Type Detection"
    description: "Classify document type with evidence-based disambiguation and header detection"
    prompt: |
      Look at this document image and answer each question:

      1. COLUMNS: If there is a transaction table with rows of dates,
         descriptions, and amounts, list the exact column headers
         separated by " | ".
         If there is no transaction table, write NONE.

      2. PAID: Is there evidence that payment was completed?
         Look for: payment method, "PAID" stamp, amount tendered,
         change given, receipt number, EFTPOS/card details.
         Answer YES or NO.

      3. ROWS: How many line items or transaction rows are visible?
         Answer with a number.

  detection_complex:
    name: "Enhanced Document Type Detection"
    description: "Identify business document type using visual layout cues and content indicators"
    prompt: |
      Analyze this business document image and identify its type using visual and content cues.

      VISUAL LAYOUT ANALYSIS:

      INVOICE/ESTIMATE/QUOTE INDICATORS:
      - Header: "INVOICE", "TAX INVOICE", "ESTIMATE", "QUOTE", "QUOTATION", "PROFORMA"
      - Layout: Business header → Customer "Bill To" section → Itemized table → Total section
      - Key fields: Invoice/Quote number, Due date, Line items with quantities/prices
      - Table structure: Description | Qty | Unit Price | Total columns
      - Bottom section: Subtotal, GST, TOTAL amounts
      - Visual: Professional business letterhead, structured pricing table

      RECEIPT INDICATORS:
      - Header: "RECEIPT", "PURCHASE RECEIPT", "SALES RECEIPT", "TAX INVOICE"
      - Layout: Store/merchant header → Transaction details → Payment confirmation
      - Key fields: Receipt number, Transaction date/time, Payment method
      - Content: Completed purchase, "Amount tendered", "Change given"
      - Visual: Store branding, compact format, payment confirmation details
      - Transaction-focused rather than billing-focused

      BANK STATEMENT INDICATORS:
      - Header: "BANK STATEMENT", "ACCOUNT STATEMENT", "CREDIT CARD STATEMENT"
      - Layout: Bank header → Account details → Transaction table → Summary
      - Key fields: Account number, Statement period, Opening/Closing balance
      - Table structure: Date | Description | Debit | Credit | Balance (or similar)
      - Visual: Bank logo/branding, tabular transaction list, running balance
      - Multiple transactions over time period, not single purchase

      DECISION CRITERIA:

      PRIMARY INDICATORS:
      1. Document title/header text (strongest indicator)
      2. Table structure and column headers
      3. Presence of account numbers vs invoice numbers
      4. Single transaction vs multiple transactions over time
      5. Future-oriented (estimates/quotes) vs past transactions

      DISTINGUISHING FEATURES:
      - INVOICE/ESTIMATE: Future billing, "Amount Due", line item pricing structure
      - RECEIPT: Completed transaction, "Amount Paid", payment method details
      - BANK STATEMENT: Multiple transactions, running balance, bank account details

      AMBIGUOUS CASES:
      - If document has both invoice-like and receipt-like features, prioritize header text
      - Tax invoices that also serve as receipts: Look for payment confirmation details
      - Estimates vs Invoices: Check for "ESTIMATE", "QUOTE" in header or "Amount Due" vs "Estimated Total"

      Respond with ONLY the document type:
      - INVOICE (for invoices, bills, estimates, quotes, proforma invoices)
      - RECEIPT (for receipts, payment confirmations, completed transactions)
      - BANK_STATEMENT (for bank statements, account statements, credit card statements)

      If unclear after visual analysis, default to: RECEIPT

  detection_simple:
    name: "Simple Document Type Detection"
    description: "Minimal prompt for document type detection"
    prompt: |
      What type of business document is this image? Respond with only the document type: INVOICE or RECEIPT or BANK_STATEMENT

# Type mappings for response normalization
type_mappings:
  # Bank statement variations (checked first — bank statements contain
  # receipt/payment words like "EFTPOS", "Card xx", "payment" that would
  # false-match RECEIPT if checked later)
  "bank statement": "BANK_STATEMENT"
  "bank_statement": "BANK_STATEMENT"
  "bankstatement": "BANK_STATEMENT"
  "account statement": "BANK_STATEMENT"
  "credit card statement": "BANK_STATEMENT"
  "creditcard statement": "BANK_STATEMENT"
  "statement": "BANK_STATEMENT"
  "monthly statement": "BANK_STATEMENT"

  # Invoice variations
  "invoice": "INVOICE"
  "tax invoice": "INVOICE"
  "commercial invoice": "INVOICE"
  "proforma invoice": "INVOICE"
  "bill": "INVOICE"
  "estimate": "INVOICE"
  "quote": "INVOICE"
  "quotation": "INVOICE"

  # Receipt variations
  "receipt": "RECEIPT"
  "purchase receipt": "RECEIPT"
  "payment receipt": "RECEIPT"
  "sales receipt": "RECEIPT"
  "transaction receipt": "RECEIPT"
  "store receipt": "RECEIPT"

  # Travel expense variations
  "travel expense": "TRAVEL"
  "travel_expense": "TRAVEL"
  "travelexpense": "TRAVEL"
  "boarding pass": "TRAVEL"
  "boardingpass": "TRAVEL"
  "boarding_pass": "TRAVEL"
  "airline ticket": "TRAVEL"
  "e-ticket": "TRAVEL"
  "eticket": "TRAVEL"
  "itinerary": "TRAVEL"
  "flight itinerary": "TRAVEL"
  "train ticket": "TRAVEL"
  "bus ticket": "TRAVEL"
  "taxi receipt": "TRAVEL"
  "rideshare receipt": "TRAVEL"
  "uber receipt": "TRAVEL"
  "plane ticket": "TRAVEL"

  # Vehicle logbook variations
  "vehicle logbook": "LOGBOOK"
  "vehicle_logbook": "LOGBOOK"
  "vehiclelogbook": "LOGBOOK"
  "logbook": "LOGBOOK"
  "motor vehicle logbook": "LOGBOOK"
  "car logbook": "LOGBOOK"
  "mileage log": "LOGBOOK"
  "trip log": "LOGBOOK"
  "ato logbook": "LOGBOOK"
  "travel log": "LOGBOOK"

# Fallback keyword matching (used when type_mappings don't match)
# Maps canonical document types to keywords that indicate that type.
# Checked in order — first match wins. Put more specific types before general ones.
fallback_keywords:
  BANK_STATEMENT:
    - bank
    - statement
    - account
  RECEIPT:
    - receipt
    - purchase
    - payment
  TRAVEL:
    - travel
    - ticket
    - boarding
    - airline
    - flight
    - itinerary
    - passenger
  LOGBOOK:
    - logbook
    - vehicle logbook
    - motor vehicle
    - mileage
    - odometer
    - business use
    - trip log
  INVOICE:
    - invoice
    - bill
    - tax

# ============================================================================
# EVIDENCE-BASED CLASSIFICATION (primary path: ClassificationParser._parse_enriched)
# ============================================================================
# These two blocks drive the evidence-based classifier. The model is asked for
# observable facts (COLUMNS / PAID / ROWS); the Python layer derives the type
# from those facts using the declarative rules below — no hardcoded heuristics.

# Semantic column roles: role -> header keywords that map to it.
# Source of truth for HeaderListParser._match_columns (replaces the former
# hardcoded COLUMN_PATTERNS literal). Keywords are matched case-insensitively.
column_roles:
  date:
    - date
    - trans date
    - transaction date
    - value date
    - posting date
  description:
    - description
    - details
    - transaction
    - particulars
    - narrative
    - transaction details
    - reference
  debit:
    - debit
    - withdrawal
    - withdrawals
    - dr
    - money out
  credit:
    - credit
    - deposit
    - deposits
    - cr
    - money in
  balance:
    - balance
    - running balance
    - closing balance
  amount:
    - amount
    - transaction amount
  # Vehicle-logbook columns
  distance:
    - distance
    - distance travelled
    - km
    - kilometres
  odometer:
    - odometer
    - odometer reading
    - start odometer
    - end odometer
  purpose:
    - purpose
    - purpose of trip
    - reason
  # Travel-itinerary columns (flight/boarding-pass/ticket leg tables). These have
  # no financial-ledger columns, so without these roles a travel itinerary matches
  # no evidence rule and falls through to the INVOICE default. See the TRAVEL rule
  # in classification_evidence below.
  flight:
    - flight
    - flight no
    - flight number
  gate:
    - gate
    - gate no
    - boarding gate
  seat:
    - seat
    - seat no
    - seat number
  # Itemised invoice/billing-table columns
  quantity:
    - quantity
    - qty
    - units
  unit_price:
    - unit price
    - price
    - rate
  gst:
    - gst
    - tax
    - vat

# Evidence-based classification rules, evaluated TOP-DOWN, first match wins.
# This list IS the precedence the if/elif chain in _parse_enriched used to
# hardcode. A rule fires when every condition in its `when:` clause holds,
# given the parsed evidence (which column roles are present + the PAID flag).
#   when: vocabulary -> any_roles: [...], all_roles: [...], paid: true|false
#   (multiple keys in one `when:` are AND-ed)
# default: type assigned when NO rule matches.
#   none   -> return None -> defer to the legacy keyword path (_parse_legacy)
#   <TYPE> -> a hard default
classification_evidence:
  rules:
    # Bank statements: financial-ledger columns.
    - type: BANK_STATEMENT
      when: { any_roles: [debit, credit, balance] }
    # Vehicle logbooks: trip/odometer columns.
    - type: LOGBOOK
      when: { any_roles: [distance, odometer, purpose] }
    # Travel itineraries: flight/boarding-pass leg-table columns. Checked before
    # RECEIPT so a paid e-ticket stays TRAVEL rather than downgrading to RECEIPT.
    - type: TRAVEL
      when: { any_roles: [flight, gate, seat] }
    # Payment evidence wins over an itemised table (a paid, itemised receipt
    # stays a RECEIPT) — so RECEIPT is checked before INVOICE.
    - type: RECEIPT
      when: { paid: true }
    # Unpaid itemised billing table -> invoice.
    - type: INVOICE
      when: { any_roles: [gst, unit_price, quantity] }
  # No rule matched -> hard-default to INVOICE (the dominant non-bank/non-receipt
  # type). Set via remote smoke (2026-06-20): `default: none` deferred unmatched
  # docs to the keyword path and sent ~21% of the dev set to UNIVERSAL (extracted
  # with the generic 33-field prompt), dropping F1 mean 0.650 -> 0.626. INVOICE
  # restores parity (F1 mean 0.650, median 0.846) and routes them to the focused
  # invoice prompt.
  # NOTE: TRAVEL is detected via the flight/gate/seat leg-table columns (see the
  # TRAVEL rule above). An itinerary whose leg table is reported with none of those
  # columns (e.g. the model emits COLUMNS: NONE) still falls through to this INVOICE
  # default — broaden the travel column_roles above if that surfaces in practice.
  default: INVOICE

