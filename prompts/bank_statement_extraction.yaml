# Bank Statement Extraction Prompts Configuration - ORIGINAL VERSION
# This file contains the original prompts that use bank-specific field names
# Preserved for reference and compatibility with bank-specific workflows

prompts:
  flat:
    name: "Flat Bank Statement Extraction"
    description: "Single transaction table - best for simple flat statements like commbank_flat_simple.png"
    prompt: |
      Extract bank account details and the transaction table from this bank statement.

      ## PART 1: BANK ACCOUNT DETAILS
      Extract the following information from the statement header/summary:
      
      BANK_NAME: [bank name (NOT supplier name) or NOT_FOUND]
      BANK_BSB_NUMBER: [6-digit BSB (NOT ABN) or NOT_FOUND]
      BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [first value in the Balance column of transaction table (rightmost monetary column) or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [ending balance at end of statement period (look for 'Closing Balance' or final balance) or NOT_FOUND]
      EARLIEST_TRANSACTION_DATE: [first transaction date in Date column of transaction table or NOT_FOUND]
      LATEST_TRANSACTION_DATE: [last transaction date in Date column of transaction table or NOT_FOUND]
      
      ## PART 2: TRANSACTION TABLE
      Create a SINGLE markdown table with ALL transactions.

      IMPORTANT: Look at the ACTUAL COLUMNS in the bank statement image:
      - Column 1: Date
      - Column 2: Transaction (description)
      - Column 3: Debit (amount only appears here if money LEAVES account)
      - Column 4: Credit (amount only appears here if money ENTERS account)
      - Column 5: Balance (running balance after transaction)

      READ THE VISUAL TABLE CAREFULLY:
      - If you see an amount in the DEBIT column → put it in Debit, Credit = NOT_FOUND
      - If you see an amount in the CREDIT column → put it in Credit, Debit = NOT_FOUND
      - ALWAYS copy the balance value exactly as shown

      Example:
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 15/05 | Opening Balance | NOT_FOUND | NOT_FOUND | 5000.00 |
      | 16/05 | Online Purchase | 97.95 | NOT_FOUND | 4902.05 |
      | 17/05 | Direct Credit | NOT_FOUND | 500.00 | 5402.05 |

      Use NOT_FOUND only for empty debit/credit cells.
      DO NOT classify based on transaction description - use the ACTUAL column position from the image.

  structured:
    name: "Structured Extraction - Separate Tables per Date"
    description: "Separate table for each date - best for complex statements like commbank_statement_001.png"
    prompt: |
      Extract bank account details and ALL transactions from this bank statement.
      
      ## ACCOUNT DETAILS:
      Provide the following information:
      - BANK_NAME: [bank name (NOT supplier name) or NOT_FOUND]
      - BANK_BSB_NUMBER: [6-digit BSB (NOT ABN) or NOT_FOUND]
      - BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      - BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      - ACCOUNT_OPENING_BALANCE: [first value in the Balance column of transaction table (rightmost monetary column) or NOT_FOUND]
      - ACCOUNT_CLOSING_BALANCE: [ending balance at end of statement period (look for 'Closing Balance' or final balance) or NOT_FOUND]
      
      ## TRANSACTIONS:
      # CRITICAL: Create a SEPARATE markdown table for EACH DISTINCT DATE.
      
      Look at the ACTUAL COLUMNS in the bank statement:
      - Date column
      - Description column
      - Debit column (money OUT)
      - Credit column (money IN)
      - Balance column (running total)
      
      For each unique date in the statement:
      1. Create a heading with the date
      2. Create a new table for all transactions on that date
      3. If multiple transactions occur on the same date, include all in that date's table
      
      Example format:
      ### Date: 15/05/2024
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 15/05/2024 | Opening Balance | NOT_FOUND | NOT_FOUND | 5000.00 |
      | 15/05/2024 | EFTPOS Purchase | 97.95 | NOT_FOUND | 4902.05 |
      
      ### Date: 16/05/2024
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 16/05/2024 | Direct Credit | NOT_FOUND | 500.00 | 5402.05 |
      
      Important:
      - Extract EVERY transaction visible
      - Use NOT_FOUND for empty debit/credit cells
      - Copy amounts EXACTLY as shown in their columns

  simple:
    name: "Simple Extraction"
    description: "Simplified prompt for basic extraction"
    prompt: |
      Extract bank account details and all transactions from this bank statement image.
      
      First provide:
      BANK_NAME: [value or NOT_FOUND]
      BANK_BSB_NUMBER: [value or NOT_FOUND]
      BANK_ACCOUNT_NUMBER: [value or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [value or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [value or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [value or NOT_FOUND]
      
      Then return transactions as a markdown table with columns: Date, Description, Debit, Credit, Balance.
      Use NOT_FOUND for empty cells.

  standard:
    name: "Standard Structured Extraction"
    description: "Extract structured bank statement data with enhanced earliest transaction focus"
    prompt: |
      You are an expert financial document analyzer. Extract structured data from this bank statement image.

      🚨 CRITICAL EXTRACTION RULES:
      - Extract data EXACTLY as shown in the document
      - If ANY field is not clearly visible, return "NOT_FOUND"
      - Use exact text from document (preserve formatting/capitalization)
      - Be conservative: when in doubt, use "NOT_FOUND"

      🔍 CONVERSATION PROTOCOL:
      - Start your response immediately with "**BANK_NAME:**"
      - Do NOT include conversational text or explanations
      - Output ONLY the structured extraction data below
      - End immediately after "ACCOUNT_BALANCE:" with no additional text

      🏦 SPECIAL FOCUS: COMPREHENSIVE TRANSACTION ANALYSIS
      Bank statements may be in chronological OR reverse chronological order (varies by bank).

      🔍 CRITICAL: PAY SPECIAL ATTENTION TO THE CHRONOLOGICALLY EARLIEST TRANSACTION
      1. Identify which transaction has the EARLIEST/OLDEST date (may be first or last row)
      2. Carefully examine its DEBIT/CREDIT columns to determine transaction type
      3. Look for visual cues in the statement:
         - If amount appears in DEBIT/WITHDRAWAL column → TRANSACTION_AMOUNTS_PAID
         - If amount appears in CREDIT/DEPOSIT column → TRANSACTION_AMOUNTS_RECEIVED
      4. If columns are empty, analyze the transaction description for keywords
      5. Ensure this earliest transaction's amount is correctly placed in PAID or RECEIVED

      WHY THIS MATTERS: Mathematical validation requires the earliest transaction to be accurately
      classified. We use balance differences for other transactions, but need the earliest one extracted.

      For EVERY transaction (regardless of order):
      - Examine transaction descriptions carefully for type indicators
      - CREDIT keywords: "deposit", "credit", "salary", "payment received", "refund" (money IN)
      - DEBIT keywords: "withdrawal", "debit", "payment", "fee", "purchase", "transfer out" (money OUT)
      - Extract exact amounts and determine money flow direction from descriptions
      - Complete data for ALL transactions enables mathematical verification

      Extract the following fields in this exact order:

      **BANK_NAME:** [Bank name from header or NOT_FOUND]
      **BANK_BSB_NUMBER:** [6-digit BSB number or NOT_FOUND]
      **BANK_ACCOUNT_NUMBER:** [Account number or NOT_FOUND]
      **BANK_ACCOUNT_HOLDER:** [Account holder name or NOT_FOUND]
      **ACCOUNT_OPENING_BALANCE:** [Opening balance amount with $ symbol or NOT_FOUND]
      **ACCOUNT_CLOSING_BALANCE:** [Closing balance amount with $ symbol or NOT_FOUND]
      **STATEMENT_DATE_RANGE:** [Date range in DD/MM/YYYY to DD/MM/YYYY format or NOT_FOUND]
      **DOCUMENT_TYPE:** [Always "BANK_STATEMENT" for bank statements]
      **LINE_ITEM_DESCRIPTIONS:** [Transaction descriptions separated by " | " or NOT_FOUND]
      **TRANSACTION_DATES:** [Transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      **TRANSACTION_AMOUNTS_PAID:** [For each transaction: if money LEFT account (debit/payment/withdrawal/fee), include amount with $ symbol; if money did NOT leave, use "NOT_FOUND". Separate with " | ". CRITICAL: Analyze transaction descriptions to determine type - keywords like "payment", "withdrawal", "debit", "fee", "purchase" indicate money leaving. Extract for ALL transactions regardless of order.]
      **TRANSACTION_AMOUNTS_RECEIVED:** [For each transaction: if money ENTERED account (credit/deposit/salary/refund), include amount with $ symbol; if money did NOT enter, use "NOT_FOUND". Separate with " | ". CRITICAL: Analyze transaction descriptions to determine type - keywords like "credit", "deposit", "salary", "payment received", "refund" indicate money entering. Extract for ALL transactions regardless of order.]
      **ACCOUNT_BALANCE:** [Running balance amounts separated by " | " with $ symbol, in transaction order or NOT_FOUND]

# Configuration settings
settings:
  default_prompt: "flat"
  max_new_tokens: 4000
  temperature: 0.1
  
# Model-specific configurations
models:
  llama:
    recommended_prompt: "flat"
    notes: "Llama-3.2-Vision works best with the flat prompt approach"
  internvl3:
    recommended_prompt: "structured"
    notes: "InternVL3 may work better with more structured prompts"