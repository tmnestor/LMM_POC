# Bank Statement Extraction Prompts Configuration
# This file contains prompts for extracting transaction data from bank statements

prompts:
  minimal:
    name: "Minimal Bank Statement Extraction"
    description: "Separate tables per date approach - best working version"
    prompt: |
      Extract the transaction table from this bank statement.

      # CRITICAL: Create a SEPARATE markdown table for EACH DISTINCT DATE.

      IMPORTANT: Look at the ACTUAL COLUMNS in the bank statement image:
      - Column 1: Date
      - Column 2: Transaction (description)
      - Column 3: Debit (amount only appears here if money LEAVES account)
      - Column 4: Credit (amount only appears here if money ENTERS account)
      - Column 5: Balance (running balance after transaction)

      READ THE VISUAL TABLE CAREFULLY:
      - If you see an amount in the DEBIT column → put it in Debit, Credit = NOT_FOUND
      - If you see an amount in the CREDIT column → put it in Credit, Debit = NOT_FOUND
      - ALWAYS copy the balance value exactly as shown

      # For each date:
      # 1. Create a new markdown table
      # 2. If multiple transactions occur on that date, each gets its own row
      # 3. Copy the amounts EXACTLY as they appear in the original columns

      Example:
      ### Date: [date]
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | [date] | [description] | [if amount in debit column] | [if amount in credit column] | [balance] |

      Use NOT_FOUND only for empty debit/credit cells.
      DO NOT classify based on transaction description - use the ACTUAL column position from the image.

  structured:
    name: "Structured Extraction"
    description: "Alternative prompt with more structure"
    prompt: |
      Extract ALL transactions from this bank statement.
      
      Format each transaction as a markdown table row with these columns:
      - Date: Transaction date
      - Description: Transaction description
      - Debit: Amount if debit transaction (or NOT_FOUND)
      - Credit: Amount if credit transaction (or NOT_FOUND)  
      - Balance: Account balance after transaction
      
      Important:
      - Extract EVERY transaction visible
      - Use NOT_FOUND for empty fields
      - Preserve exact amounts and descriptions

  simple:
    name: "Simple Extraction"
    description: "Simplified prompt for basic extraction"
    prompt: |
      Extract all transactions from this bank statement image.
      Return as a markdown table with columns: Date, Description, Debit, Credit, Balance.
      Use NOT_FOUND for empty cells.

# Configuration settings
settings:
  default_prompt: "minimal"
  max_new_tokens: 4000
  temperature: 0.1
  
# Model-specific configurations
models:
  llama:
    recommended_prompt: "minimal"
    notes: "Llama-3.2-Vision works best with the minimal prompt approach"
  internvl3:
    recommended_prompt: "structured"
    notes: "InternVL3 may work better with more structured prompts"