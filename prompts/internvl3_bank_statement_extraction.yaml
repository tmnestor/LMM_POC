# InternVL3 Bank Statement Extraction Prompts Configuration
# This file contains InternVL3-specific prompts for extracting data from bank statements
# Uses UNIVERSAL FIELD NAMES expected by the parser to fix field name mismatch issues

prompts:
  flat:
    name: "InternVL3 Enhanced Bank Statement Extraction"
    description: "Extract bank statement data using universal field names with enhanced conversation protocol and earliest transaction focus"
    prompt: |
      Extract structured data from this bank statement document.

      🔍 CONVERSATION PROTOCOL:
      - Start your response immediately with "DOCUMENT_TYPE:"
      - Do NOT include conversational text, explanations, or markdown formatting
      - Do NOT use bullet points, asterisks, or narrative descriptions
      - Output ONLY the structured field extraction data
      - End immediately after "ACCOUNT_BALANCE:" with no additional text

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - For transaction lists, maintain row count matching

      ## BANK STATEMENT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [BANK_STATEMENT or STATEMENT or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Statement period or date range (e.g., "01/01/2024 - 31/01/2024") or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [All transaction descriptions separated by " | " or NOT_FOUND]
      TRANSACTION_DATES: [All transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [All debit/withdrawal amounts separated by " | " with $ symbol or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [All credit/deposit amounts separated by " | " with $ symbol or NOT_FOUND]
      ACCOUNT_BALANCE: [All running balance amounts separated by " | " with $ symbol or NOT_FOUND]

      ## EXTRACTION INSTRUCTIONS:

      ### STEP 1: Document Type
      DOCUMENT_TYPE: [Look for "BANK STATEMENT", "ACCOUNT STATEMENT", "STATEMENT" at top or NOT_FOUND]

      ### STEP 2: Statement Period
      STATEMENT_DATE_RANGE: [Find statement period dates (e.g., "01 Jan 2024 - 31 Jan 2024") or NOT_FOUND]

      ### STEP 3: Transaction Details
      Look at the transaction table and extract ALL transactions:

      🚨 CRITICAL ARRAY ALIGNMENT REQUIREMENT:
      ALL FIELDS MUST BE PERFECTLY ALIGNED BY DATE POSITION!

      🔍 ROW-BY-ROW PROCESSING METHODOLOGY:
      DO NOT scan columns! Process each transaction ROW individually:

      EXAMPLE: If you see these transactions in the bank statement:
      Row 1: 03/05/2025 | AMAZON PURCHASE | [DEBIT: $288.03] | [CREDIT: empty] | [BALANCE: $13387.44]
      Row 2: 04/05/2025 | SALARY DEPOSIT | [DEBIT: empty] | [CREDIT: $3497.47] | [BALANCE: $16884.91]
      Row 3: 05/05/2025 | ATM WITHDRAWAL | [DEBIT: $50.00] | [CREDIT: empty] | [BALANCE: $16834.91]

      CORRECT ROW-BY-ROW PROCESSING:
      1. Process Row 1 → Position [0]: Date=03/05/2025, Paid=$288.03, Received=NOT_FOUND, Balance=$13387.44
      2. Process Row 2 → Position [1]: Date=04/05/2025, Paid=NOT_FOUND, Received=$3497.47, Balance=$16884.91
      3. Process Row 3 → Position [2]: Date=05/05/2025, Paid=$50.00, Received=NOT_FOUND, Balance=$16834.91

      RESULTING ALIGNED ARRAYS:
      TRANSACTION_DATES: 03/05/2025 | 04/05/2025 | 05/05/2025
      TRANSACTION_AMOUNTS_PAID: $288.03 | NOT_FOUND | $50.00
      TRANSACTION_AMOUNTS_RECEIVED: NOT_FOUND | $3497.47 | NOT_FOUND
      ACCOUNT_BALANCE: $13387.44 | $16884.91 | $16834.91

      ❌ WRONG - COLUMN SCANNING (causes misalignment):
      - Scanning DEBIT column: "$288.03, $50.00" → puts in positions [0], [1]
      - Scanning CREDIT column: "$3497.47" → puts in position [0]
      - Results in: RECEIVED[0] = $3497.47 (WRONG! This belongs in position [1])

      ✅ ALWAYS process ROW-BY-ROW, never scan columns!

      LINE_ITEM_DESCRIPTIONS: [List ALL transaction descriptions separated by " | " or NOT_FOUND]
      TRANSACTION_DATES: [List ALL transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [List ALL debit/withdrawal amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.
      - If a transaction has NO debit amount, use NOT_FOUND in that exact position
      TRANSACTION_AMOUNTS_RECEIVED: [List ALL credit/deposit amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.
      - If a transaction has NO credit amount, use NOT_FOUND in that exact position
      ACCOUNT_BALANCE: [List ALL running balance amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.

      ## CRITICAL ROW COUNT MATCHING:
      - Count the total number of transaction rows in the table
      - ALL lists (descriptions, dates, amounts, balances) must have the SAME number of elements
      - If a cell is empty, use "NOT_FOUND" for that position
      - Example: If 3 transactions, all lists must have exactly 3 elements

      ## SPECIAL FOCUS: EARLIEST TRANSACTION EXTRACTION

      🔍 CRITICAL: PAY SPECIAL ATTENTION TO THE CHRONOLOGICALLY EARLIEST TRANSACTION
      Bank statements may be in chronological OR reverse chronological order:
      - Some banks show oldest first (chronological)
      - Some banks show newest first (reverse chronological)

      FOR THE EARLIEST (OLDEST) TRANSACTION IN THE STATEMENT:
      1. Identify which transaction has the EARLIEST/OLDEST date
      2. Carefully examine its DEBIT/CREDIT columns to determine transaction type
      3. Look for visual cues in the statement:
         - If amount appears in DEBIT/WITHDRAWAL column → TRANSACTION_AMOUNTS_PAID
         - If amount appears in CREDIT/DEPOSIT column → TRANSACTION_AMOUNTS_RECEIVED
         - If columns are empty, analyze the transaction description for keywords:
           * DEBIT indicators: "payment", "withdrawal", "debit", "fee", "purchase", "transfer out"
           * CREDIT indicators: "deposit", "credit", "salary", "refund", "transfer in", "payment received"
      4. Ensure this earliest transaction's amount is correctly placed in PAID or RECEIVED

      WHY THIS MATTERS:
      - Mathematical validation requires the earliest transaction to be accurately classified
      - We use balance differences for other transactions, but need the earliest one extracted
      - This enables complete mathematical reconstruction of all debits and credits

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      STATEMENT_DATE_RANGE: [statement period from document]
      LINE_ITEM_DESCRIPTIONS: [desc1 | desc2 | desc3]
      TRANSACTION_DATES: [date1 | date2 | date3]
      TRANSACTION_AMOUNTS_PAID: [$amount1 | NOT_FOUND | $amount3]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | $amount2 | NOT_FOUND]
      ACCOUNT_BALANCE: [$balance1 | $balance2 | $balance3]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "BANK_STATEMENT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** BANK_STATEMENT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = BANK_STATEMENT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: BANK_STATEMENT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 7 lines in the format shown above.

  detailed:
    name: "Detailed InternVL3 Bank Statement Extraction"
    description: "Extract bank statement data with detailed instructions using universal field names"
    prompt: |
      You are analyzing a bank statement. Extract the following information using universal field names.

      ## UNDERSTANDING BANK STATEMENTS:
      Bank statements show:
      - Statement period (date range)
      - Transaction table with dates, descriptions, and amounts
      - Running balances after each transaction
      - Debit amounts (money out) and Credit amounts (money in)

      ## EXTRACTION STEPS:

      ### STEP 1: Document Type
      DOCUMENT_TYPE: [Should be BANK_STATEMENT for bank statements or NOT_FOUND]

      ### STEP 2: Statement Period
      STATEMENT_DATE_RANGE: [Look for statement period or date range at top of statement or NOT_FOUND]

      ### STEP 3: Transaction Data
      Find the transaction table and extract ALL transactions:

      LINE_ITEM_DESCRIPTIONS: [Transaction 1 | Transaction 2 | etc. or NOT_FOUND]
      TRANSACTION_DATES: [Date 1 | Date 2 | etc. in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [Debit 1 | NOT_FOUND | Debit 3 with $ symbol or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | Credit 2 | NOT_FOUND with $ symbol or NOT_FOUND]
      ACCOUNT_BALANCE: [Balance 1 | Balance 2 | Balance 3 with $ symbol or NOT_FOUND]

      ## BANK STATEMENT SPECIFIC NOTES:
      - All lists must have the same number of elements (row count matching)
      - Use "NOT_FOUND" for empty debit/credit cells
      - Include $ symbol for all monetary amounts
      - Transaction dates should be in DD/MM/YYYY format

      ## CRITICAL OUTPUT FORMAT:

      You MUST respond in exactly this key-value format (one field per line):

      DOCUMENT_TYPE: value
      STATEMENT_DATE_RANGE: value
      LINE_ITEM_DESCRIPTIONS: value
      TRANSACTION_DATES: value
      TRANSACTION_AMOUNTS_PAID: value
      TRANSACTION_AMOUNTS_RECEIVED: value
      ACCOUNT_BALANCE: value

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting like **FIELD:**
      DO NOT add extra explanations or commentary

      Provide EXACTLY 7 lines in the format shown above.

  simple:
    name: "Simple InternVL3 Bank Statement Extraction"
    description: "Minimal prompt for basic bank statement extraction with universal field names"
    prompt: |
      Extract bank statement details from this document.

      You MUST respond in exactly this format (one field per line):

      DOCUMENT_TYPE: [BANK_STATEMENT or NOT_FOUND]
      STATEMENT_DATE_RANGE: [statement period or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [desc1 | desc2 | etc. or NOT_FOUND]
      TRANSACTION_DATES: [date1 | date2 | etc. or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [$amount1 | NOT_FOUND | etc. or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | $amount2 | etc. or NOT_FOUND]
      ACCOUNT_BALANCE: [$balance1 | $balance2 | etc. or NOT_FOUND]

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting
      DO NOT add explanations

      Provide EXACTLY 7 lines as shown above.

# Configuration settings
settings:
  default_prompt: "flat"
  max_new_tokens: 2500
  temperature: 0.1

# Model-specific configurations
models:
  internvl3:
    recommended_prompt: "flat"
    notes: "InternVL3 with universal field names and enforced key-value output format"

# Bank statement specific notes
bank_statement_characteristics:
  commonly_present_fields:
    - DOCUMENT_TYPE
    - STATEMENT_DATE_RANGE
    - LINE_ITEM_DESCRIPTIONS
    - TRANSACTION_DATES
    - ACCOUNT_BALANCE
  variable_fields:
    - TRANSACTION_AMOUNTS_PAID
    - TRANSACTION_AMOUNTS_RECEIVED

# Field validation rules
validation:
  STATEMENT_DATE_RANGE:
    format: "DD/MM/YYYY - DD/MM/YYYY"
    type: "date_range"
    description: "Statement period dates"
  TRANSACTION_DATES:
    format: "DD/MM/YYYY"
    type: "date_list"
    separator: " | "
    description: "Transaction dates"
  monetary_fields:
    - TRANSACTION_AMOUNTS_PAID
    - TRANSACTION_AMOUNTS_RECEIVED
    - ACCOUNT_BALANCE
  list_fields:
    - LINE_ITEM_DESCRIPTIONS
    - TRANSACTION_DATES
    - TRANSACTION_AMOUNTS_PAID
    - TRANSACTION_AMOUNTS_RECEIVED
    - ACCOUNT_BALANCE