# InternVL3 Bank Statement Extraction Prompts Configuration
# This file contains InternVL3-specific prompts for extracting data from bank statements
# Based on Llama baseline prompts but with explicit output format enforcement to prevent JSON generation

prompts:
  flat:
    name: "InternVL3 Flat Bank Statement Extraction"
    description: "Single transaction table - best for simple flat statements with enforced key-value format"
    prompt: |
      Extract bank account details and the transaction table from this bank statement.

      ## PART 1: BANK ACCOUNT DETAILS
      Extract the following information from the statement header/summary:

      BANK_NAME: [bank name (NOT supplier name) or NOT_FOUND]
      BANK_BSB_NUMBER: [6-digit BSB (NOT ABN) or NOT_FOUND]
      BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [first value in the Balance column of transaction table (rightmost monetary column) or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [ending balance at end of statement period (look for 'Closing Balance' or final balance) or NOT_FOUND]
      EARLIEST_TRANSACTION_DATE: [first transaction date in Date column of transaction table or NOT_FOUND]
      LATEST_TRANSACTION_DATE: [last transaction date in Date column of transaction table or NOT_FOUND]

      ## PART 2: TRANSACTION TABLE
      Create a SINGLE markdown table with ALL transactions.

      IMPORTANT: Look at the ACTUAL COLUMNS in the bank statement image:
      - Column 1: Date
      - Column 2: Transaction (description)
      - Column 3: Debit (amount only appears here if money LEAVES account)
      - Column 4: Credit (amount only appears here if money ENTERS account)
      - Column 5: Balance (running balance after transaction)

      READ THE VISUAL TABLE CAREFULLY:
      - If you see an amount in the DEBIT column → put it in Debit, Credit = NOT_FOUND
      - If you see an amount in the CREDIT column → put it in Credit, Debit = NOT_FOUND
      - ALWAYS copy the balance value exactly as shown

      Example:
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 15/05 | Opening Balance | NOT_FOUND | NOT_FOUND | 5000.00 |
      | 16/05 | Online Purchase | 97.95 | NOT_FOUND | 4902.05 |
      | 17/05 | Direct Credit | NOT_FOUND | 500.00 | 5402.05 |

      Use NOT_FOUND only for empty debit/credit cells.
      DO NOT classify based on transaction description - use the ACTUAL column position from the image.

      ## CRITICAL OUTPUT FORMAT:

      You MUST respond in exactly this key-value format for the bank details, followed by the markdown table:

      BANK_NAME: value
      BANK_BSB_NUMBER: value
      BANK_ACCOUNT_NUMBER: value
      BANK_ACCOUNT_HOLDER: value
      ACCOUNT_OPENING_BALANCE: value
      ACCOUNT_CLOSING_BALANCE: value
      EARLIEST_TRANSACTION_DATE: value
      LATEST_TRANSACTION_DATE: value

      Then provide the transaction table in markdown format as shown above.

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting like **FIELD:** for the bank details
      DO NOT add extra explanations or commentary

  structured:
    name: "InternVL3 Structured Extraction - Separate Tables per Date"
    description: "Separate table for each date - best for complex statements with enforced format"
    prompt: |
      Extract bank account details and ALL transactions from this bank statement.

      ## ACCOUNT DETAILS:
      Provide the following information:
      - BANK_NAME: [bank name (NOT supplier name) or NOT_FOUND]
      - BANK_BSB_NUMBER: [6-digit BSB (NOT ABN) or NOT_FOUND]
      - BANK_ACCOUNT_NUMBER: [account number or NOT_FOUND]
      - BANK_ACCOUNT_HOLDER: [account holder name or NOT_FOUND]
      - ACCOUNT_OPENING_BALANCE: [first value in the Balance column of transaction table (rightmost monetary column) or NOT_FOUND]
      - ACCOUNT_CLOSING_BALANCE: [ending balance at end of statement period (look for 'Closing Balance' or final balance) or NOT_FOUND]

      ## TRANSACTIONS:
      # CRITICAL: Create a SEPARATE markdown table for EACH DISTINCT DATE.

      Look at the ACTUAL COLUMNS in the bank statement:
      - Date column
      - Description column
      - Debit column (money OUT)
      - Credit column (money IN)
      - Balance column (running total)

      For each unique date in the statement:
      1. Create a heading with the date
      2. Create a new table for all transactions on that date
      3. If multiple transactions occur on the same date, include all in that date's table

      Example format:
      ### Date: 15/05/2024
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 15/05/2024 | Opening Balance | NOT_FOUND | NOT_FOUND | 5000.00 |
      | 15/05/2024 | EFTPOS Purchase | 97.95 | NOT_FOUND | 4902.05 |

      ### Date: 16/05/2024
      | Date | Description | Debit | Credit | Balance |
      |------|-------------|-------|--------|---------|
      | 16/05/2024 | Direct Credit | NOT_FOUND | 500.00 | 5402.05 |

      Important:
      - Extract EVERY transaction visible
      - Use NOT_FOUND for empty debit/credit cells
      - Copy amounts EXACTLY as shown in their columns

      ## CRITICAL OUTPUT FORMAT:

      Start with the bank details in key-value format:

      BANK_NAME: value
      BANK_BSB_NUMBER: value
      BANK_ACCOUNT_NUMBER: value
      BANK_ACCOUNT_HOLDER: value
      ACCOUNT_OPENING_BALANCE: value
      ACCOUNT_CLOSING_BALANCE: value

      Then provide the dated transaction tables as shown above.

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting like **FIELD:** for the bank details
      DO NOT add extra explanations or commentary

  simple:
    name: "Simple InternVL3 Extraction"
    description: "Simplified prompt for basic extraction with format enforcement"
    prompt: |
      Extract bank account details and all transactions from this bank statement image.

      You MUST respond in exactly this format:

      BANK_NAME: [value or NOT_FOUND]
      BANK_BSB_NUMBER: [value or NOT_FOUND]
      BANK_ACCOUNT_NUMBER: [value or NOT_FOUND]
      BANK_ACCOUNT_HOLDER: [value or NOT_FOUND]
      ACCOUNT_OPENING_BALANCE: [value or NOT_FOUND]
      ACCOUNT_CLOSING_BALANCE: [value or NOT_FOUND]

      Then return transactions as a markdown table with columns: Date, Description, Debit, Credit, Balance.
      Use NOT_FOUND for empty cells.

      DO NOT use JSON format like {"field": "value"}
      DO NOT use markdown formatting for the bank details
      DO NOT add explanations

# Configuration settings
settings:
  default_prompt: "flat"
  max_new_tokens: 4000
  temperature: 0.1

# Model-specific configurations
models:
  internvl3:
    recommended_prompt: "flat"
    notes: "InternVL3 with enforced key-value output format to prevent JSON generation"