# InternVL3 Document-Aware Prompts - Complete, Self-Contained Prompts
# Simpler and more concise than Llama prompts for better InternVL3 performance
# NO TEMPLATES - What you see is what gets sent to the model

prompts:
  # ============================================================================
  # INVOICE EXTRACTION - 14 Fields
  # ============================================================================
  invoice:
    name: "Invoice Extraction"
    description: "Extract 14 invoice-specific fields"
    prompt: |
      Extract ALL data from this invoice image. Find each field and respond in EXACT format below.

      DOCUMENT_TYPE: INVOICE
      BUSINESS_ABN: [Find "ABN" followed by 11 digits like "12 345 678 901" or NOT_FOUND]
      SUPPLIER_NAME: [Business name at top of document or NOT_FOUND]
      BUSINESS_ADDRESS: [Full address of business or NOT_FOUND]
      PAYER_NAME: [Customer name from "Bill To" section or NOT_FOUND]
      PAYER_ADDRESS: [Customer address from "Bill To" section or NOT_FOUND]
      INVOICE_DATE: [Date in DD/MM/YYYY format or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [List ALL items separated by " | " like "Item1 | Item2 | Item3" or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List ALL quantities separated by " | " like "1 | 2 | 3" or NOT_FOUND]
      LINE_ITEM_PRICES: [List ALL unit prices with $ separated by " | " like "$10.00 | $20.00" or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List ALL line totals with $ separated by " | " like "$10.00 | $40.00" or NOT_FOUND]
      IS_GST_INCLUDED: [true if GST/tax shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST amount with $ like "$9.50" or NOT_FOUND]
      TOTAL_AMOUNT: [Final total amount with $ like "$104.50" or NOT_FOUND]

  # ============================================================================
  # RECEIPT EXTRACTION - 14 Fields
  # ============================================================================
  receipt:
    name: "Receipt Extraction"
    description: "Extract 14 receipt-specific fields"
    prompt: |
      Extract ALL data from this receipt image. Find each field and respond in EXACT format below.

      DOCUMENT_TYPE: RECEIPT
      BUSINESS_ABN: [Find "ABN" followed by 11 digits like "12 345 678 901" or NOT_FOUND]
      SUPPLIER_NAME: [Store/business name at top or NOT_FOUND]
      BUSINESS_ADDRESS: [Store address or NOT_FOUND]
      PAYER_NAME: [Customer name if shown or NOT_FOUND]
      PAYER_ADDRESS: [Customer address if shown or NOT_FOUND]
      INVOICE_DATE: [Transaction date in DD/MM/YYYY format or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [List ALL items separated by " | " like "Item1 | Item2 | Item3" or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List ALL quantities separated by " | " like "1 | 2 | 3" or NOT_FOUND]
      LINE_ITEM_PRICES: [List ALL unit prices with $ separated by " | " like "$10.00 | $20.00" or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List ALL line totals with $ separated by " | " like "$10.00 | $40.00" or NOT_FOUND]
      IS_GST_INCLUDED: [true if GST/tax shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST amount with $ like "$9.50" or NOT_FOUND]
      TOTAL_AMOUNT: [Final total amount with $ like "$104.50" or NOT_FOUND]

  # ============================================================================
  # BANK STATEMENT EXTRACTION - 7 Fields
  # ============================================================================
  bank_statement:
    name: "Bank Statement Extraction"
    description: "Extract 7 bank statement-specific fields"
    prompt: |
      Extract structured data from this bank statement image.

      OUTPUT FORMAT (7 FIELDS):

      DOCUMENT_TYPE: [Look for BANK STATEMENT or STATEMENT - answer BANK_STATEMENT or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Find statement period dates or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [All transaction descriptions with " | " separator or NOT_FOUND]
      TRANSACTION_DATES: [All transaction dates with " | " separator or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [All debit amounts with $ and " | " separator or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [All credit amounts with $ and " | " separator or NOT_FOUND]
      ACCOUNT_BALANCE: [Running balances with $ and " | " separator or NOT_FOUND]

  # ============================================================================
  # UNIVERSAL EXTRACTION - All 19 Fields
  # ============================================================================
  universal:
    name: "Universal Single-Pass Extraction"
    description: "Extract all 19 fields for any document type"
    prompt: |
      Extract information from this business document.

      OUTPUT FORMAT (19 FIELDS):

      DOCUMENT_TYPE: [INVOICE/RECEIPT/BANK_STATEMENT or NOT_FOUND]
      BUSINESS_ABN: [11-digit ABN or NOT_FOUND]
      SUPPLIER_NAME: [Business name or NOT_FOUND]
      BUSINESS_ADDRESS: [Business address or NOT_FOUND]
      PAYER_NAME: [Customer name or NOT_FOUND]
      PAYER_ADDRESS: [Customer address or NOT_FOUND]
      INVOICE_DATE: [Date DD/MM/YYYY or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Date range for statements or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [Items with " | " separator or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [Quantities with " | " or NOT_FOUND]
      LINE_ITEM_PRICES: [Unit prices with $ and " | " or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [Line totals with $ and " | " or NOT_FOUND]
      IS_GST_INCLUDED: [true/false or NOT_FOUND]
      GST_AMOUNT: [GST with $ or NOT_FOUND]
      TOTAL_AMOUNT: [Total with $ or NOT_FOUND]
      TRANSACTION_DATES: [Dates with " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [Debits with $ and " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [Credits with $ and " | " or NOT_FOUND]
      ACCOUNT_BALANCE: [Balances with $ and " | " or NOT_FOUND]

# Configuration
settings:
  max_tokens: 600
  temperature: 0.0