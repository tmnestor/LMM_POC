# InternVL3 Document-Aware Prompts - Simple, Concrete Instruction Format
# Based on Old_prompts/simple_internvl3_*.yaml - Proven high-accuracy format
# Provides specific, actionable instructions that tell InternVL3 exactly WHERE to look and HOW to extract

prompts:
  # ============================================================================
  # INVOICE EXTRACTION - Enhanced Version (from Old_prompts/simple_internvl3_invoice.yaml)
  # Includes conversation protocol enforcement and detailed field extraction
  # ============================================================================
  invoice:
    name: "Enhanced Invoice Extraction"
    description: "Extract 14 invoice-specific fields with enforced output format"
    prompt: |
      You are an expert document analyzer. Extract structured data from this business document.

      CRITICAL RULE: If you cannot clearly see a field in the document, return "NOT_FOUND"
      DO NOT GUESS or INFER missing information

      EXTRACT THESE 14 FIELDS IN THIS EXACT ORDER:

      DOCUMENT_TYPE: [Look for words like INVOICE, RECEIPT, TAX INVOICE, STATEMENT at the top - answer with INVOICE/RECEIPT/STATEMENT or NOT_FOUND]
      BUSINESS_ABN: [Find 'ABN' label followed by 11 digits (e.g. XX XXX XXX XXX) - usually near business name at top or NOT_FOUND]
      SUPPLIER_NAME: [Look at the TOP/HEADER of document for the LARGEST business/company name text - this is the supplier name or NOT_FOUND]
      BUSINESS_ADDRESS: [Find the street address directly under or near the business name at the TOP of document or NOT_FOUND]
      PAYER_NAME: [Look for 'Bill To:', 'Customer:', 'Sold To:', or 'Payer:' section - extract the person/company name there or NOT_FOUND]
      PAYER_ADDRESS: [Find the address in the 'Bill To:', 'Customer:', or 'Payer:' section (usually middle of document) or NOT_FOUND]
      INVOICE_DATE: [Look for 'Date:', 'Invoice Date:', 'Transaction Date:' label - extract the date value next to it or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [Find the MAIN TABLE/LIST in middle of document - extract ALL product/service names using | character ONLY - format: item1 | item2 | item3 - do NOT use commas or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [In the main table, find 'QTY' or 'Quantity' column - list ALL quantity values separated by ' | ' in same order as items or NOT_FOUND]
      LINE_ITEM_PRICES: [Find 'Unit Price', 'Price Each', or 'Rate' column (NOT the total) - list each price per unit separated by ' | ' or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [Find 'Amount', 'Total', or 'Line Total' column (rightmost in table) - list the calculated totals separated by ' | ' or NOT_FOUND]
      IS_GST_INCLUDED: [Check if document shows 'GST' with a dollar amount anywhere - answer 'true' if GST amount exists, 'false' if not]
      GST_AMOUNT: [Look at BOTTOM section for 'GST:', 'Tax:', or 'GST 10%' - extract the dollar amount next to it (e.g. 8.62 or $8.62) or NOT_FOUND]
      TOTAL_AMOUNT: [Find the LARGEST dollar amount at BOTTOM - look for 'TOTAL:', 'Total Due:', 'Amount Due:' - extract value with 2 decimals or NOT_FOUND]

      CRITICAL EXTRACTION RULES:
      - Each line must be: FIELDNAME: value
      - Copy digits EXACTLY - do not round, truncate, or skip any digits
      - ABN: Must be EXACTLY 11 digits - count them! (e.g., '12 345 678 901' format)
      - ADDRESSES: Copy house/building numbers EXACTLY (e.g., '123' not '1123')
      - PRICES: Include ALL items even if prices repeat (e.g., if two items cost $15.00, list both)
      - Use 'NOT_FOUND' ONLY when the field truly doesn't exist in the document
      - For boolean IS_GST_INCLUDED: answer 'true' if GST amount is shown, 'false' if not
      - Extract monetary values with 2 decimal places (e.g., '$12.50' or '12.50')

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document or NOT_FOUND]
      SUPPLIER_NAME: [supplier name from document]
      BUSINESS_ADDRESS: [business address from document or NOT_FOUND]
      PAYER_NAME: [customer name from document or NOT_FOUND]
      PAYER_ADDRESS: [customer address from document or NOT_FOUND]
      INVOICE_DATE: [invoice date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document or NOT_FOUND]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "INVOICE"} - NO JSON
      ❌ **DOCUMENT_TYPE:** INVOICE - NO MARKDOWN
      ❌ DOCUMENT_TYPE = INVOICE - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: INVOICE - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      OUTPUT EXACTLY 14 LINES. Stop after TOTAL_AMOUNT.

  # ============================================================================
  # RECEIPT EXTRACTION - Enhanced Version (from Old_prompts/internvl3_receipt_extraction.yaml)
  # Includes conversation protocol enforcement and detailed field extraction
  # ============================================================================
  receipt:
    name: "Enhanced Receipt Extraction"
    description: "Extract all relevant fields from receipts with enforced key-value format"
    prompt: |
      Extract structured data from this receipt/payment confirmation document.

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - Receipts often have less detail than invoices - that's normal

      ## RECEIPT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [RECEIPT or NOT_FOUND]
      BUSINESS_ABN: [11-digit Australian Business Number if shown or NOT_FOUND]
      SUPPLIER_NAME: [Store/merchant name at top of receipt or NOT_FOUND]
      BUSINESS_ADDRESS: [Store/merchant address if shown or NOT_FOUND]
      PAYER_NAME: [Customer name if shown (often not on receipts) or NOT_FOUND]
      PAYER_ADDRESS: [Customer address if shown (rarely on receipts) or NOT_FOUND]
      INVOICE_DATE: [Transaction date in DD/MM/YYYY format or NOT_FOUND]

      ## PURCHASED ITEMS:
      Extract all items from the receipt:

      LINE_ITEM_DESCRIPTIONS: [List all item names separated by " | " or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List quantities separated by " | " (default to 1 if not shown) or NOT_FOUND]
      LINE_ITEM_PRICES: [List prices separated by " | " with $ symbol or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List total prices per item separated by " | " with $ symbol or NOT_FOUND]

      ## PAYMENT TOTALS:

      IS_GST_INCLUDED: [true if GST/tax is shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ symbol if shown or NOT_FOUND]
      TOTAL_AMOUNT: [Final total/amount paid with $ symbol or NOT_FOUND]

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document or NOT_FOUND]
      SUPPLIER_NAME: [store name from document]
      BUSINESS_ADDRESS: [store address from document or NOT_FOUND]
      PAYER_NAME: [customer name from document or NOT_FOUND]
      PAYER_ADDRESS: [customer address from document or NOT_FOUND]
      INVOICE_DATE: [transaction date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document or NOT_FOUND]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "RECEIPT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** RECEIPT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = RECEIPT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: RECEIPT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 14 lines in the format shown above.

  # ============================================================================
  # BANK STATEMENT EXTRACTION - Advanced Version (from Old_prompts/internvl3_bank_statement_extraction.yaml)
  # Includes ROW-BY-ROW processing, mathematical enhancement, and conversation protocol
  # ============================================================================
  bank_statement:
    name: "Advanced Bank Statement Extraction"
    description: "Extract bank statement data with enhanced conversation protocol and earliest transaction focus"
    prompt: |
      Extract structured data from this bank statement document.

      🔍 CONVERSATION PROTOCOL:
      - Start your response immediately with "DOCUMENT_TYPE:"
      - Do NOT include conversational text, explanations, or markdown formatting
      - Do NOT use bullet points, asterisks, or narrative descriptions
      - Output ONLY the structured field extraction data
      - End immediately after "ACCOUNT_BALANCE:" with no additional text

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - For transaction lists, maintain row count matching

      ## BANK STATEMENT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [BANK_STATEMENT or STATEMENT or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Statement period or date range (e.g., "01/01/2024 - 31/01/2024") or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [All transaction descriptions separated by " | " or NOT_FOUND]
      TRANSACTION_DATES: [All transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [All debit/withdrawal amounts separated by " | " with $ symbol or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [All credit/deposit amounts separated by " | " with $ symbol or NOT_FOUND]
      ACCOUNT_BALANCE: [All running balance amounts separated by " | " with $ symbol or NOT_FOUND]

      ## EXTRACTION INSTRUCTIONS:

      ### STEP 1: Document Type
      DOCUMENT_TYPE: [Look for "BANK STATEMENT", "ACCOUNT STATEMENT", "STATEMENT" at top or NOT_FOUND]

      ### STEP 2: Statement Period
      STATEMENT_DATE_RANGE: [Find statement period dates (e.g., "01 Jan 2024 - 31 Jan 2024") or NOT_FOUND]

      ### STEP 3: Transaction Details
      Look at the transaction table and extract ALL transactions:

      🚨 CRITICAL ARRAY ALIGNMENT REQUIREMENT:
      ALL FIELDS MUST BE PERFECTLY ALIGNED BY DATE POSITION!

      🔍 ROW-BY-ROW PROCESSING METHODOLOGY:
      DO NOT scan columns! Process each transaction ROW individually:

      EXAMPLE: If you see these transactions in the bank statement:
      Row 1: 03/05/2025 | AMAZON PURCHASE | [DEBIT: $288.03] | [CREDIT: empty] | [BALANCE: $13387.44]
      Row 2: 04/05/2025 | SALARY DEPOSIT | [DEBIT: empty] | [CREDIT: $3497.47] | [BALANCE: $16884.91]
      Row 3: 05/05/2025 | ATM WITHDRAWAL | [DEBIT: $50.00] | [CREDIT: empty] | [BALANCE: $16834.91]

      CORRECT ROW-BY-ROW PROCESSING:
      1. Process Row 1 → Position [0]: Date=03/05/2025, Paid=$288.03, Received=NOT_FOUND, Balance=$13387.44
      2. Process Row 2 → Position [1]: Date=04/05/2025, Paid=NOT_FOUND, Received=$3497.47, Balance=$16884.91
      3. Process Row 3 → Position [2]: Date=05/05/2025, Paid=$50.00, Received=NOT_FOUND, Balance=$16834.91

      RESULTING ALIGNED ARRAYS:
      TRANSACTION_DATES: 03/05/2025 | 04/05/2025 | 05/05/2025
      TRANSACTION_AMOUNTS_PAID: $288.03 | NOT_FOUND | $50.00
      TRANSACTION_AMOUNTS_RECEIVED: NOT_FOUND | $3497.47 | NOT_FOUND
      ACCOUNT_BALANCE: $13387.44 | $16884.91 | $16834.91

      ❌ WRONG - COLUMN SCANNING (causes misalignment):
      - Scanning DEBIT column: "$288.03, $50.00" → puts in positions [0], [1]
      - Scanning CREDIT column: "$3497.47" → puts in position [0]
      - Results in: RECEIVED[0] = $3497.47 (WRONG! This belongs in position [1])

      ✅ ALWAYS process ROW-BY-ROW, never scan columns!

      ## MANDATORY ROW-BY-ROW EXTRACTION PROTOCOL:

      Step 1: Count total transaction rows in the table
      Step 2: For EACH row from top to bottom:
         - Extract the date → add to TRANSACTION_DATES at this position
         - Extract the description → add to LINE_ITEM_DESCRIPTIONS at this position
         - Look at DEBIT cell: if has amount → add to TRANSACTION_AMOUNTS_PAID, if empty → add "NOT_FOUND"
         - Look at CREDIT cell: if has amount → add to TRANSACTION_AMOUNTS_RECEIVED, if empty → add "NOT_FOUND"
         - Extract the balance → add to ACCOUNT_BALANCE at this position
      Step 3: Verify all arrays have same length as row count

      LINE_ITEM_DESCRIPTIONS: [List ALL transaction descriptions separated by " | " or NOT_FOUND]
      TRANSACTION_DATES: [List ALL transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [List ALL debit/withdrawal amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.
      - If a transaction has NO debit amount, use NOT_FOUND in that exact position
      TRANSACTION_AMOUNTS_RECEIVED: [List ALL credit/deposit amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.
      - If a transaction has NO credit amount, use NOT_FOUND in that exact position
      ACCOUNT_BALANCE: [List ALL running balance amounts separated by " | " with $ symbol or NOT_FOUND]
      - CRITICAL: Position [0] must correspond to TRANSACTION_DATES[0], position [1] to TRANSACTION_DATES[1], etc.

      ## CRITICAL ROW COUNT MATCHING:
      - Count the total number of transaction rows in the table
      - ALL lists (descriptions, dates, amounts, balances) must have the SAME number of elements
      - If a cell is empty, use "NOT_FOUND" for that position
      - Example: If 3 transactions, all lists must have exactly 3 elements

      ## SPECIAL FOCUS: EARLIEST TRANSACTION EXTRACTION

      🔍 CRITICAL: PAY SPECIAL ATTENTION TO THE CHRONOLOGICALLY EARLIEST TRANSACTION
      Bank statements may be in chronological OR reverse chronological order:
      - Some banks show oldest first (chronological)
      - Some banks show newest first (reverse chronological)

      FOR THE EARLIEST (OLDEST) TRANSACTION IN THE STATEMENT:
      1. Identify which transaction has the EARLIEST/OLDEST date
      2. Carefully examine its DEBIT/CREDIT columns to determine transaction type
      3. Look for visual cues in the statement:
         - If amount appears in DEBIT/WITHDRAWAL column → TRANSACTION_AMOUNTS_PAID
         - If amount appears in CREDIT/DEPOSIT column → TRANSACTION_AMOUNTS_RECEIVED
         - If columns are empty, analyze the transaction description for keywords:
           * DEBIT indicators: "payment", "withdrawal", "debit", "fee", "purchase", "transfer out"
           * CREDIT indicators: "deposit", "credit", "salary", "refund", "transfer in", "payment received"
      4. Ensure this earliest transaction's amount is correctly placed in PAID or RECEIVED

      WHY THIS MATTERS:
      - Mathematical validation requires the earliest transaction to be accurately classified
      - We use balance differences for other transactions, but need the earliest one extracted
      - This enables complete mathematical reconstruction of all debits and credits

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      STATEMENT_DATE_RANGE: [statement period from document]
      LINE_ITEM_DESCRIPTIONS: [desc1 | desc2 | desc3]
      TRANSACTION_DATES: [date1 | date2 | date3]
      TRANSACTION_AMOUNTS_PAID: [$amount1 | NOT_FOUND | $amount3]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | $amount2 | NOT_FOUND]
      ACCOUNT_BALANCE: [$balance1 | $balance2 | $balance3]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "BANK_STATEMENT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** BANK_STATEMENT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = BANK_STATEMENT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: BANK_STATEMENT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 7 lines in the format shown above.

  # ============================================================================
