# InternVL3 Document-Aware Prompts - Complete, Self-Contained Prompts
# Restored from Old_prompts/ directory - the actual working prompts that had good accuracy
# Based on internvl3_invoice_extraction.yaml, internvl3_receipt_extraction.yaml, internvl3_bank_statement_extraction.yaml

prompts:
  # ============================================================================
  # INVOICE EXTRACTION - 14 Fields (from Old_prompts/internvl3_invoice_extraction.yaml - standard)
  # ============================================================================
  invoice:
    name: "Invoice Extraction"
    description: "Extract 14 invoice-specific fields"
    prompt: |
      Extract structured data from this invoice/bill document.

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information

      ## INVOICE FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [Type of document - INVOICE/BILL/QUOTE/ESTIMATE or NOT_FOUND]
      BUSINESS_ABN: [11-digit Australian Business Number (XX XXX XXX XXX format) or NOT_FOUND]
      SUPPLIER_NAME: [Business/company name at top of invoice or NOT_FOUND]
      BUSINESS_ADDRESS: [Complete supplier address or NOT_FOUND]
      PAYER_NAME: [Customer/Bill To name or NOT_FOUND]
      PAYER_ADDRESS: [Customer/Bill To address or NOT_FOUND]
      INVOICE_DATE: [Invoice date in DD/MM/YYYY format or NOT_FOUND]

      ## LINE ITEMS:
      Extract all items/services from the itemized section:

      LINE_ITEM_DESCRIPTIONS: [List all item/service descriptions separated by " | " or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List quantities for each item separated by " | " or NOT_FOUND]
      LINE_ITEM_PRICES: [List unit prices separated by " | " with $ symbol or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List total prices per item separated by " | " with $ symbol or NOT_FOUND]

      ## FINANCIAL TOTALS:

      IS_GST_INCLUDED: [true if GST/tax amount is shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ symbol (e.g., $12.50) or NOT_FOUND]
      TOTAL_AMOUNT: [Final total amount with $ symbol (e.g., $137.50) or NOT_FOUND]

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document]
      SUPPLIER_NAME: [business name from document]
      BUSINESS_ADDRESS: [business address from document]
      PAYER_NAME: [customer name from document]
      PAYER_ADDRESS: [customer address from document]
      INVOICE_DATE: [invoice date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "INVOICE"} - NO JSON
      ❌ **DOCUMENT_TYPE:** INVOICE - NO MARKDOWN
      ❌ DOCUMENT_TYPE = INVOICE - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: INVOICE - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 14 lines in the format shown above.

  # ============================================================================
  # RECEIPT EXTRACTION - 14 Fields (from Old_prompts/internvl3_receipt_extraction.yaml - standard)
  # ============================================================================
  receipt:
    name: "Receipt Extraction"
    description: "Extract 14 receipt-specific fields"
    prompt: |
      Extract structured data from this receipt/payment confirmation document.

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - Receipts often have less detail than invoices - that's normal

      ## RECEIPT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [RECEIPT or NOT_FOUND]
      BUSINESS_ABN: [11-digit Australian Business Number if shown or NOT_FOUND]
      SUPPLIER_NAME: [Store/merchant name at top of receipt or NOT_FOUND]
      BUSINESS_ADDRESS: [Store/merchant address if shown or NOT_FOUND]
      PAYER_NAME: [Customer name if shown (often not on receipts) or NOT_FOUND]
      PAYER_ADDRESS: [Customer address if shown (rarely on receipts) or NOT_FOUND]
      INVOICE_DATE: [Transaction date in DD/MM/YYYY format or NOT_FOUND]

      ## PURCHASED ITEMS:
      Extract all items from the receipt:

      LINE_ITEM_DESCRIPTIONS: [List all item names separated by " | " or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [List quantities separated by " | " (default to 1 if not shown) or NOT_FOUND]
      LINE_ITEM_PRICES: [List prices separated by " | " with $ symbol or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [List total prices per item separated by " | " with $ symbol or NOT_FOUND]

      ## PAYMENT TOTALS:

      IS_GST_INCLUDED: [true if GST/tax is shown, false if not, or NOT_FOUND]
      GST_AMOUNT: [GST/tax amount with $ symbol if shown or NOT_FOUND]
      TOTAL_AMOUNT: [Final total/amount paid with $ symbol or NOT_FOUND]

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      BUSINESS_ABN: [ABN number from document or NOT_FOUND]
      SUPPLIER_NAME: [store name from document]
      BUSINESS_ADDRESS: [store address from document or NOT_FOUND]
      PAYER_NAME: [customer name from document or NOT_FOUND]
      PAYER_ADDRESS: [customer address from document or NOT_FOUND]
      INVOICE_DATE: [transaction date from document]
      LINE_ITEM_DESCRIPTIONS: [item1 | item2 | item3]
      LINE_ITEM_QUANTITIES: [qty1 | qty2 | qty3]
      LINE_ITEM_PRICES: [$price1 | $price2 | $price3]
      LINE_ITEM_TOTAL_PRICES: [$total1 | $total2 | $total3]
      IS_GST_INCLUDED: [true or false]
      GST_AMOUNT: [$amount from document or NOT_FOUND]
      TOTAL_AMOUNT: [$total from document]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "RECEIPT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** RECEIPT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = RECEIPT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: RECEIPT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 14 lines in the format shown above.

  # ============================================================================
  # BANK STATEMENT EXTRACTION - 7 Fields (from Old_prompts/internvl3_bank_statement_extraction.yaml - flat)
  # ============================================================================
  bank_statement:
    name: "Bank Statement Extraction"
    description: "Extract 7 bank statement-specific fields"
    prompt: |
      Extract structured data from this bank statement document.

      🔍 CONVERSATION PROTOCOL:
      - Start your response immediately with "DOCUMENT_TYPE:"
      - Do NOT include conversational text, explanations, or markdown formatting
      - Do NOT use bullet points, asterisks, or narrative descriptions
      - Output ONLY the structured field extraction data
      - End immediately after "ACCOUNT_BALANCE:" with no additional text

      ## CRITICAL INSTRUCTIONS:
      - Extract ONLY what is visible in the document
      - Use "NOT_FOUND" for any field that is not present
      - Do not guess or infer missing information
      - For transaction lists, maintain row count matching

      ## BANK STATEMENT FIELDS TO EXTRACT:

      DOCUMENT_TYPE: [BANK_STATEMENT or STATEMENT or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Statement period or date range (e.g., "01/01/2024 - 31/01/2024") or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [All transaction descriptions separated by " | " or NOT_FOUND]
      TRANSACTION_DATES: [All transaction dates separated by " | " in DD/MM/YYYY format or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [All debit/withdrawal amounts separated by " | " with $ symbol or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [All credit/deposit amounts separated by " | " with $ symbol or NOT_FOUND]
      ACCOUNT_BALANCE: [All running balance amounts separated by " | " with $ symbol or NOT_FOUND]

      ## MANDATORY ROW-BY-ROW EXTRACTION PROTOCOL:

      🚨 CRITICAL ARRAY ALIGNMENT REQUIREMENT:
      ALL FIELDS MUST BE PERFECTLY ALIGNED BY DATE POSITION!

      🔍 ROW-BY-ROW PROCESSING METHODOLOGY:
      DO NOT scan columns! Process each transaction ROW individually:

      Step 1: Count total transaction rows in the table
      Step 2: For EACH row from top to bottom:
         - Extract the date → add to TRANSACTION_DATES at this position
         - Extract the description → add to LINE_ITEM_DESCRIPTIONS at this position
         - Look at DEBIT cell: if has amount → add to TRANSACTION_AMOUNTS_PAID, if empty → add "NOT_FOUND"
         - Look at CREDIT cell: if has amount → add to TRANSACTION_AMOUNTS_RECEIVED, if empty → add "NOT_FOUND"
         - Extract the balance → add to ACCOUNT_BALANCE at this position
      Step 3: Verify all arrays have same length as row count

      ## CRITICAL ROW COUNT MATCHING:
      - Count the total number of transaction rows in the table
      - ALL lists (descriptions, dates, amounts, balances) must have the SAME number of elements
      - If a cell is empty, use "NOT_FOUND" for that position
      - Example: If 3 transactions, all lists must have exactly 3 elements

      ## CRITICAL OUTPUT FORMAT - READ THIS CAREFULLY:

      ⚠️ ABSOLUTELY NO JSON FORMAT ALLOWED ⚠️
      ⚠️ DO NOT USE CURLY BRACES { } ⚠️
      ⚠️ DO NOT USE QUOTES AROUND FIELD NAMES ⚠️

      You MUST respond in EXACTLY this simple key-value format (one field per line):

      DOCUMENT_TYPE: [document type from image]
      STATEMENT_DATE_RANGE: [statement period from document]
      LINE_ITEM_DESCRIPTIONS: [desc1 | desc2 | desc3]
      TRANSACTION_DATES: [date1 | date2 | date3]
      TRANSACTION_AMOUNTS_PAID: [$amount1 | NOT_FOUND | $amount3]
      TRANSACTION_AMOUNTS_RECEIVED: [NOT_FOUND | $amount2 | NOT_FOUND]
      ACCOUNT_BALANCE: [$balance1 | $balance2 | $balance3]

      FORBIDDEN FORMATS:
      ❌ {"DOCUMENT_TYPE": "BANK_STATEMENT"} - NO JSON
      ❌ **DOCUMENT_TYPE:** BANK_STATEMENT - NO MARKDOWN
      ❌ DOCUMENT_TYPE = BANK_STATEMENT - NO EQUALS
      ❌ Any format with { } quotes or ** formatting

      REQUIRED FORMAT:
      ✅ DOCUMENT_TYPE: BANK_STATEMENT - SIMPLE COLON FORMAT ONLY

      Remember: NO CURLY BRACES, NO QUOTES, NO MARKDOWN - JUST FIELD_NAME: value

      Provide EXACTLY 7 lines in the format shown above.

  # ============================================================================
  # UNIVERSAL EXTRACTION - All 19 Fields
  # ============================================================================
  universal:
    name: "Universal Single-Pass Extraction"
    description: "Extract all 19 fields for any document type"
    prompt: |
      Extract information from this business document.

      CRITICAL RULE: If field not visible, return "NOT_FOUND"
      DO NOT GUESS missing information

      OUTPUT FORMAT (19 FIELDS):

      DOCUMENT_TYPE: [INVOICE/RECEIPT/STATEMENT or NOT_FOUND]
      BUSINESS_ABN: [11-digit ABN or NOT_FOUND]
      SUPPLIER_NAME: [Business name or NOT_FOUND]
      BUSINESS_ADDRESS: [Business address or NOT_FOUND]
      PAYER_NAME: [Customer name or NOT_FOUND]
      PAYER_ADDRESS: [Customer address or NOT_FOUND]
      INVOICE_DATE: [Date DD/MM/YYYY or NOT_FOUND]
      STATEMENT_DATE_RANGE: [Date range for statements or NOT_FOUND]
      LINE_ITEM_DESCRIPTIONS: [Items with " | " separator or NOT_FOUND]
      LINE_ITEM_QUANTITIES: [Quantities with " | " or NOT_FOUND]
      LINE_ITEM_PRICES: [Unit prices with $ and " | " or NOT_FOUND]
      LINE_ITEM_TOTAL_PRICES: [Line totals with $ and " | " or NOT_FOUND]
      IS_GST_INCLUDED: [true/false or NOT_FOUND]
      GST_AMOUNT: [GST with $ or NOT_FOUND]
      TOTAL_AMOUNT: [Total with $ or NOT_FOUND]
      TRANSACTION_DATES: [Dates with " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_PAID: [Debits with $ and " | " or NOT_FOUND]
      TRANSACTION_AMOUNTS_RECEIVED: [Credits with $ and " | " or NOT_FOUND]
      ACCOUNT_BALANCE: [Balances with $ and " | " or NOT_FOUND]

# Configuration
settings:
  max_tokens: 600
  temperature: 0.0